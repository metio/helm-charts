name: Release Charts
on:
  push:
    branches: [main]
    # A README-only edit must not cut a release — the rendered README is a build
    # artifact baked into the next real release's package, not a release trigger.
    paths:
      - "charts/**"
      - "!charts/**/README.md"
      - "!charts/**/README.md.gotmpl"
  workflow_dispatch:
    inputs:
      chart:
        description: Chart to force-release (directory under charts/). Leave empty to release every non-placeholder chart.
        required: false
permissions:
  contents: write   # create tags + GitHub Releases
  packages: write   # push OCI charts to ghcr.io
  id-token: write   # cosign keyless signing
# Serialize release runs. A chart's release notes are scoped to the range since
# its previous tag; two runs that touch the same chart in quick succession would
# otherwise race on creating that tag and produce overlapping notes. Queueing
# (no cancel) lets the earlier run tag first, so the next run's notes start there
# and carry only that chart's own new commits.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  release:
    name: Release changed charts
    runs-on: ubuntu-latest
    env:
      # Tool versions kept current by Renovate via the `# renovate:` markers (the
      # shared metio/renovate-config workflow customManager matches a marker
      # directly above each …_VERSION key in an env block). The literal installs
      # below read them through `env.` indirection so no version is hand-pinned.
      # renovate: datasource=github-releases depName=helm/helm
      HELM_VERSION: 4.2.2
      # renovate: datasource=github-releases depName=orhun/git-cliff
      GIT_CLIFF_VERSION: 2.13.1
      # renovate: datasource=github-releases depName=norwoodj/helm-docs
      HELM_DOCS_VERSION: 1.14.2
      # renovate: datasource=github-releases depName=dadav/helm-schema
      GO_HELM_SCHEMA_VERSION: 0.23.4
      # renovate: datasource=github-releases depName=mikefarah/yq
      YQ_VERSION: 4.53.3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: v${{ env.HELM_VERSION }}
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Install git-cliff
        run: |
          curl -fsSL "https://github.com/orhun/git-cliff/releases/download/v${GIT_CLIFF_VERSION}/git-cliff-${GIT_CLIFF_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar -xz -C /tmp
          sudo mv "/tmp/git-cliff-${GIT_CLIFF_VERSION}/git-cliff" /usr/local/bin/git-cliff
      - name: Install helm-docs
        run: |
          curl -fsSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" | tar -xz -C /usr/local/bin helm-docs
      - name: Install helm-schema
        run: |
          curl -fsSL "https://github.com/dadav/helm-schema/releases/download/${GO_HELM_SCHEMA_VERSION}/helm-schema_${GO_HELM_SCHEMA_VERSION}_Linux_x86_64.tar.gz" | tar -xz -C /usr/local/bin helm-schema
      - name: Install yq
        run: |
          curl -fsSL -o /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/v${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq
      - name: Log in to GHCR (Helm OCI)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
      # cosign reads registry credentials from ~/.docker/config.json, which
      # `helm registry login` does not populate (it writes its own config).
      # Authenticate via docker so cosign can push signature layers to ghcr.io.
      - name: Log in to GHCR (cosign)
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: changed
        name: Determine charts to release
        env:
          # Via env, never inlined into the script: a dispatch input containing a
          # single quote would otherwise close the shell string and inject
          # arbitrary commands into a job holding contents/packages/id-token write.
          CHART_INPUT: ${{ github.event.inputs.chart }}
        run: |
          # All chart dirs except the never-published common library chart.
          all_charts() { find charts -mindepth 1 -maxdepth 1 -type d -printf '%f\n' 2>/dev/null | grep -v '^common$' || true; }
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            sel="$CHART_INPUT"
            # Empty input releases every chart (the package loop skips any whose
            # appVersion is still the 0.0.0 placeholder), which flushes a backlog
            # of already-bumped charts in one run.
            [ -n "$sel" ] || sel="$(all_charts | tr '\n' ' ')"
            echo "charts=$sel" >> "$GITHUB_OUTPUT"
          else
            before='${{ github.event.before }}'
            # On the first push to the branch `before` is the all-zeros SHA (and
            # the commit isn't present), so the diff would fail and silently
            # release nothing. Fall back to treating every chart as changed.
            if [ -z "$before" ] || ! git rev-parse -q --verify "${before}^{commit}" >/dev/null 2>&1; then
              changed="$(all_charts)"
            else
              # chart dirs touched by this push, excluding the never-published
              # common library chart. The pathspec is `charts/` (not `charts/*/`,
              # which a git pathspec does NOT expand like a shell glob — it
              # matches nothing, silently releasing nothing on every push).
              # READMEs are excluded: the rendered README is a build artifact and
              # README.md.gotmpl is docs-only, so a docs change must not trigger a
              # release on its own (it re-renders into the next real release).
              changed="$(git diff --name-only "$before" '${{ github.sha }}' -- 'charts/' \
                ':(exclude)charts/*/README.md' ':(exclude)charts/*/README.md.gotmpl' \
                | awk -F/ '{print $2}' | sort -u | grep -v '^common$' || true)"
            fi
            echo "charts=$(echo "$changed" | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
          fi

      - id: version
        name: Compute the next version
        if: steps.changed.outputs.charts != ''
        # Shared metio CalVer: YYYY.M.D with the UTC time-of-day appended to the
        # day (e.g. 2026.6.20143022). Every chart released in one push shares this
        # version. Unlike a SemVer '+build' suffix — which SemVer ignores for
        # precedence, so two same-day releases would rank equal — the time lands
        # in the patch component, so a later release always sorts higher.
        uses: metio/ci/calver@553c5f3c3d2693c7ef182954136bdfac7b25b80e # 2026.7.2101318
      - name: Package, push, sign, and release each chart
        if: steps.changed.outputs.charts != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # git-cliff reads GITHUB_TOKEN (not GH_TOKEN) for its remote API calls;
          # without it the calls are unauthenticated (60/hr) and rate-limit out,
          # so release notes render without their PR/contributor enrichment.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          for name in ${{ steps.changed.outputs.charts }}; do
            chart="charts/$name"
            [ -f "$chart/Chart.yaml" ] || { echo "no such chart: $name"; continue; }
            appVersion="$(grep -oP '^appVersion:\s*"?\K[^"]+' "$chart/Chart.yaml")"

            # The committed 0.0.0 placeholder means the controller image isn't
            # released yet, so the chart would deploy a non-existent image.
            # Don't publish it until Renovate bumps appVersion to a real release.
            if [ "$appVersion" = "0.0.0" ]; then
              echo "::notice::$name appVersion is the 0.0.0 placeholder — skipping release until its image is published."
              continue
            fi

            echo "::group::release $name $version (appVersion $appVersion)"
            # CRDs aren't committed — vendor this chart's CRDs from its controller
            # release so they're baked into the .tgz, matching the appVersion the
            # chart deploys. No-ops for charts without a release image.
            hack/vendor-chart-crds.sh "$chart"
            helm dependency build "$chart"
            # Render the README from its template so it lands inside the .tgz.
            # The rendered README is gitignored (a build artifact); it only ever
            # exists for the lifetime of a package run.
            if [ -f "$chart/README.md.gotmpl" ]; then
              helm-docs --chart-search-root "$chart"
            fi
            # Generate values.schema.json into the chart dir so Helm's install-time
            # value validation ships inside the .tgz. Like the README, it's
            # generated per-run and never committed (gitignored), so there's no
            # drift gate to maintain.
            helm-schema -c "$chart" -k additionalProperties

            # This chart's last tag bounds both the Artifact Hub changelog and the
            # GitHub release notes below — compute it once. Empty on a first release.
            prev="$(git tag --list "${name}-*" --sort=-creatordate | head -1)"

            # Inject an Artifact Hub `artifacthub.io/changes` annotation, computed by
            # git-cliff over this chart's commit range (the same range the release
            # notes use). The shared cliff-artifacthub.toml renders a YAML list of {kind,
            # description}; the edit is to the ephemeral CI checkout's Chart.yaml only
            # (never committed) so the annotation ships inside the packaged .tgz. An
            # empty range (no new commits) yields no annotation, which is correct.
            changes="$(CHART="$name" VERSION="$version" git-cliff --config-url "https://raw.githubusercontent.com/metio/git-cliff-config/16dc9654e9eb431d6169059509ce5552912a14ad/cliff-artifacthub.toml" --include-path "charts/${name}/**" --tag-pattern "^${name}-" ${prev:+"${prev}..HEAD"} 2>/dev/null | sed '/^[[:space:]]*$/d')"
            if [ -n "$changes" ]; then
              CHANGES="$changes" yq -i '.annotations."artifacthub.io/changes" = strenv(CHANGES)' "$chart/Chart.yaml"
            fi

            helm package "$chart" --version "$version" --app-version "$appVersion"
            pkg="${name}-${version}.tgz"

            # Push and capture the pushed digest for keyless signing.
            push_out="$(helm push "$pkg" oci://ghcr.io/metio/helm-charts 2>&1)"
            echo "$push_out"
            # A failed grep in a command substitution does NOT trip set -e (the
            # assignment masks the exit status), so validate explicitly — otherwise
            # a changed helm-push output format would leave digest empty and we'd
            # sign a malformed "...@" reference.
            digest="$(printf '%s\n' "$push_out" | grep -oP 'Digest:\s*\K\S+' || true)"
            [ -n "$digest" ] || { echo "::error::could not parse digest from helm push output for $name"; exit 1; }
            cosign sign --yes \
              --annotations "repo=${{ github.repository }}" \
              --annotations "chart=$name" \
              "ghcr.io/metio/helm-charts/${name}@${digest}"

            # Per-chart, path-scoped release notes since this chart's last tag
            # ($prev, computed above). --tag labels the (still uncreated) release so
            # the shared cliff.toml header renders this chart+version; --tag-pattern scopes
            # release boundaries to this chart so another chart's tag inside the range
            # can't split the notes into multiple sections.
            cliff_args=(--config-url "https://raw.githubusercontent.com/metio/git-cliff-config/16dc9654e9eb431d6169059509ce5552912a14ad/cliff.toml" --include-path "charts/${name}/**"
              --tag "${name}-${version}" --tag-pattern "^${name}-")
            # A bare "HEAD" positional is rejected as a range; for the first
            # release omit the positional so git-cliff walks full history.
            [ -n "$prev" ] && cliff_args+=("${prev}..HEAD")
            CHART="$name" VERSION="$version" git-cliff "${cliff_args[@]}" > notes.md

            # Static footer: cosign verification + migration notes link.
            hack/release-footer.sh "$name" "$version" "${{ github.repository }}" >> notes.md

            tag="${name}-${version}"
            git tag "$tag" "${{ github.sha }}"
            git push origin "$tag"
            gh release create "$tag" --title "$tag" --notes-file notes.md
            rm -f "$pkg" notes.md
            echo "::endgroup::"
          done
