name: REUSE compliance
on:
  pull_request:
    branches: [main]
# Least privilege: the check only reads the tree (matches the other PR gates,
# which all drop the token to contents: read).
permissions:
  contents: read
jobs:
  reuse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: metio/ci/nix-devshell@cc725e2e1fbc779fda95050562d702128ad6e998 # 2026.7.6083955
      - run: nix develop --command reuse lint
