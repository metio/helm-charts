# Keep charts/joi/values.yaml in sync with the jsonnet-oci-images library set
# with zero manual work: pull JOI's published libraries.json (the single source
# of truth), regenerate the chart's library map + schema, and commit any change.
# Runs daily (after JOI's discovery) and on demand; a repository_dispatch from
# JOI makes it near-instant if a cross-repo token is configured there.
name: Sync joi chart
on:
  schedule:
    - cron: "47 6 * * *"
  repository_dispatch:
    types: [joi-manifest-updated]
  workflow_dispatch:
    inputs:
      allow_shrink:
        description: Permit the sync to drop libraries present in the committed chart (set only when libraries were genuinely removed from the JOI manifest upstream)
        type: boolean
        default: false
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: v4.2.1
      - name: Regenerate charts/joi from the JOI manifest
        env:
          ALLOW_SHRINK: ${{ github.event.inputs.allow_shrink }}
        run: |
          if ! curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 https://raw.githubusercontent.com/metio/jsonnet-oci-images/main/libraries.json -o /tmp/libraries.json; then
            echo "JOI manifest not published yet — nothing to sync"; exit 0
          fi
          # Library names currently shipped by the chart (2-space keys under
          # `libraries:`), captured before the file is overwritten.
          libnames() { awk '/^libraries:/{f=1;next} f && /^  [A-Za-z0-9]/{sub(/:[[:space:]]*$/,"");gsub(/^[[:space:]]+/,"");print}' "$1" | sort; }
          libnames charts/joi/values.yaml > /tmp/old-libs.txt
          bash hack/gen-joi-values.sh /tmp/libraries.json > charts/joi/values.yaml
          # Per-library helm-unittest coverage from the same source — one
          # automated path (libraries.json -> values.yaml -> test) so the cases
          # can't drift from the shipped set; no separate drift gate needed.
          bash hack/gen-joi-tests.sh /tmp/libraries.json > charts/joi/tests/libraries-generated_test.yaml
          # Shrink-guard: a transient discovery failure upstream can leave the
          # JOI manifest missing healthy libraries; mirroring it would silently
          # drop them from the chart. Abort if any currently-shipped library
          # disappears, unless allow_shrink acknowledges a real upstream removal.
          libnames charts/joi/values.yaml > /tmp/new-libs.txt
          dropped="$(comm -23 /tmp/old-libs.txt /tmp/new-libs.txt)"
          if [ -n "$dropped" ] && [ "$ALLOW_SHRINK" != "true" ]; then
            echo "::error::sync would drop libraries the chart currently ships:"
            while IFS= read -r lib; do
              echo "::error::  - $lib"
            done <<< "$dropped"
            echo "::error::if these were genuinely removed from the JOI manifest, re-run with allow_shrink=true; otherwise this is a transient upstream discovery failure — fix JOI and re-run."
            git checkout -- charts/joi/values.yaml charts/joi/tests/libraries-generated_test.yaml
            exit 1
          fi
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 https://github.com/dadav/helm-schema/releases/download/0.23.4/helm-schema_0.23.4_Linux_x86_64.tar.gz | tar -xz -C /usr/local/bin helm-schema
          helm-schema -c charts/joi -k additionalProperties >/dev/null
      - name: Commit if the library set changed
        run: |
          if ! git diff --quiet -- charts/joi/values.yaml charts/joi/values.schema.json charts/joi/tests/libraries-generated_test.yaml; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add charts/joi/values.yaml charts/joi/values.schema.json charts/joi/tests/libraries-generated_test.yaml
            git commit -m 'chore: sync joi chart with jsonnet-oci-images library set'
            git push
          fi
