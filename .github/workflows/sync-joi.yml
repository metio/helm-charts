# Keep charts/joi/values.yaml in sync with the jsonnet-oci-images library set
# with zero manual work: pull JOI's published libraries.json (the single source
# of truth), regenerate the chart's library map + schema, and commit any change.
# Runs daily (after JOI's discovery) and on demand; a repository_dispatch from
# JOI makes it near-instant if a cross-repo token is configured there.
name: Sync joi chart
on:
  schedule:
    - cron: "47 6 * * *"
  repository_dispatch:
    types: [joi-manifest-updated]
  workflow_dispatch:
    inputs:
      allow_shrink:
        description: Permit the sync to drop libraries present in the committed chart (set only when libraries were genuinely removed from the JOI manifest upstream)
        type: boolean
        default: false
permissions:
  contents: write
# The three triggers (cron, JOI repository_dispatch, manual) all push to main; a
# dispatch firing during a cron run would otherwise race two pushes and the
# loser fails on a non-fast-forward. Queue rather than cancel so a dispatch that
# arrives mid-run still applies its update afterward.
concurrency:
  group: sync-joi
  cancel-in-progress: false
jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: metio/ci/nix-devshell@cc725e2e1fbc779fda95050562d702128ad6e998 # 2026.7.6083955
      - name: Regenerate charts/joi from the JOI manifest
        env:
          ALLOW_SHRINK: ${{ github.event.inputs.allow_shrink }}
        run: nix develop --command sync-joi
      - name: Commit if the library set changed
        run: |
          # values.schema.json is a gitignored build artifact (generated at
          # package time); helm-schema above only render-validates it. Committing
          # it would fail `git add` on an ignored path and abort the whole sync —
          # so the commit tracks only values.yaml + the generated tests.
          if ! git diff --quiet -- charts/joi/values.yaml charts/joi/tests/libraries-generated_test.yaml; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add charts/joi/values.yaml charts/joi/tests/libraries-generated_test.yaml
            git commit -m 'chore: sync joi chart with jsonnet-oci-images library set'
            git push
          fi
