name: Verify Charts
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  changed:
    name: Detect changed charts
    runs-on: ubuntu-latest
    outputs:
      charts: ${{ steps.list.outputs.charts }}
      any: ${{ steps.list.outputs.any }}
      installable_any: ${{ steps.list.outputs.installable_any }}
      excluded: ${{ steps.list.outputs.excluded }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2
      - id: list
        name: List changed charts
        run: |
          changed="$(ct list-changed --config ct.yaml || true)"
          if [ -z "$changed" ]; then
            {
              echo "any=false"
              echo "charts=[]"
              echo "installable_any=false"
              echo "excluded="
            } >> "$GITHUB_OUTPUT"
          else
            echo "any=true" >> "$GITHUB_OUTPUT"
            # chart dir paths -> JSON array of chart names
            names="$(echo "$changed" | xargs -n1 basename | jq -R . | jq -cs .)"
            echo "charts=$names" >> "$GITHUB_OUTPUT"
            # A chart whose committed appVersion is the 0.0.0 placeholder has no
            # released image to deploy, so `ct install` can't pull it. Exclude
            # those (and skip the whole install job if nothing else is left)
            # until the source repo cuts its first release.
            excluded=""; installable_any=false
            for dir in $changed; do
              name="$(basename "$dir")"
              av="$(grep -oP '^appVersion:\s*"?\K[^"]+' "$dir/Chart.yaml" || echo "")"
              if [ "$av" = "0.0.0" ]; then
                echo "::notice::$name appVersion is the 0.0.0 placeholder (image not released) — excluding from ct install."
                excluded="${excluded:+$excluded,}$name"
              else
                installable_any=true
              fi
            done
            echo "installable_any=$installable_any" >> "$GITHUB_OUTPUT"
            echo "excluded=$excluded" >> "$GITHUB_OUTPUT"
          fi

  static:
    # One independent job per changed chart, so a failing gate in one chart
    # never blocks an unrelated chart's PR.
    name: Static gates (${{ matrix.chart }})
    needs: changed
    if: needs.changed.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart: ${{ fromJSON(needs.changed.outputs.charts) }}
    env:
      # Tool versions kept current by Renovate via the `# renovate:` markers (the
      # shared metio/renovate-config workflow customManager matches a marker
      # directly above each …_VERSION key in an env block). The literal installs
      # below read them through `env.` indirection so no version is hand-pinned.
      # renovate: datasource=github-releases depName=helm/helm
      HELM_VERSION: 4.2.2
      # renovate: datasource=github-releases depName=helm-unittest/helm-unittest
      HELM_UNITTEST_VERSION: 1.1.1
      # renovate: datasource=github-releases depName=norwoodj/helm-docs
      HELM_DOCS_VERSION: 1.14.2
      # renovate: datasource=github-releases depName=zegl/kube-score
      KUBE_SCORE_VERSION: 1.20.0
      # renovate: datasource=github-releases depName=yannh/kubeconform
      KUBECONFORM_VERSION: 0.8.0
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: v${{ env.HELM_VERSION }}
      - uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2
      - name: Vendor CRDs (build artifact, regenerated per run)
        # CRDs aren't committed; the chart's CRDs are vendored from its
        # controller release on the fly so every gate below (unittest, kube-score,
        # kubeconform) renders against the same CRDs the package ships.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: hack/vendor-chart-crds.sh "charts/${{ matrix.chart }}"
      - id: ct_lint
        name: ct lint
        run: ct lint --config ct.yaml --charts "charts/${{ matrix.chart }}"
      - id: unittest
        name: helm-unittest
        run: |
          # helm v4 verifies plugin provenance on install; the helm-unittest
          # plugin ships none, so pass --verify=false (>= 1.1.0 installs on v4).
          helm plugin install https://github.com/helm-unittest/helm-unittest --version "v${HELM_UNITTEST_VERSION}" --verify=false
          c="charts/${{ matrix.chart }}/"
          if [ -d "${c}tests" ]; then
            helm unittest "$c"
          fi
      - id: docs_render
        name: helm-docs render check
        run: |
          curl -fsSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" | tar -xz -C /usr/local/bin helm-docs
          c="charts/${{ matrix.chart }}/"
          # The README is rendered into the package at release time, not committed,
          # so there's nothing to drift. This step only proves the template still
          # renders cleanly — a broken README.md.gotmpl fails here. The rendered
          # README.md is gitignored, so it never shows up as a diff.
          if [ -f "${c}README.md.gotmpl" ]; then
            helm-docs --chart-search-root "$c"
          fi
      - id: kube_score
        name: kube-score (default + every ci/ variant, CRITICAL fails)
        run: |
          curl -fsSL "https://github.com/zegl/kube-score/releases/download/v${KUBE_SCORE_VERSION}/kube-score_${KUBE_SCORE_VERSION}_linux_amd64.tar.gz" | tar -xz -C /usr/local/bin kube-score
          set -e
          c="charts/${{ matrix.chart }}/"
          name="${{ matrix.chart }}"
          render() {
            label="$1"; shift
            echo "::group::kube-score $name ${label:-default}"
            helm template release-x "$c" "$@" | kube-score score - --exit-one-on-warning=false
            echo "::endgroup::"
          }
          render default
          for vf in "$c"ci/*-values.yaml; do
            [ -e "$vf" ] || continue
            render "$(basename "$vf")" -f "$vf"
          done
      - id: kubeconform
        name: kubeconform (rendered manifests, incl. CRDs)
        run: |
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | tar -xz -C /usr/local/bin kubeconform
          c="charts/${{ matrix.chart }}/"
          echo "::group::kubeconform ${{ matrix.chart }}"
          helm template release-x "$c" \
            | kubeconform -strict -summary -ignore-missing-schemas \
                -schema-location default \
                -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
          echo "::endgroup::"

  k8s-matrix:
    name: Compute Kubernetes matrix
    needs: changed
    if: needs.changed.outputs.installable_any == 'true'
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.compute.outputs.versions }}
    steps:
      - id: compute
        name: Newest N minors of kindest/node, latest patch each
        run: |
          N=4
          versions=$(
            curl -fsSL "https://hub.docker.com/v2/repositories/kindest/node/tags?page_size=100" \
            | jq -r '.results[].name' \
            | grep -E '^v1\.[0-9]+\.[0-9]+$' \
            | awk -F. '{print $1"."$2" "$0}' \
            | sort -k1,1V -k2,2V \
            | awk '{latest[$1]=$2} END {for (m in latest) print latest[m]}' \
            | sort -V | tail -n "$N" \
            | jq -R . | jq -cs .
          )
          echo "versions=$versions" >> "$GITHUB_OUTPUT"
          echo "matrix: $versions"

  install:
    name: ct install (k8s ${{ matrix.k8s }})
    needs: [changed, k8s-matrix]
    if: needs.changed.outputs.installable_any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        k8s: ${{ fromJSON(needs.k8s-matrix.outputs.versions) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Vendor CRDs for all charts (build artifact)
        # The prerequisite step below provisions every chart's CRDs from disk,
        # and ct install needs each chart's CRDs present, so regenerate them all
        # before either runs. The wrapper no-ops on charts without a release.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for c in charts/*/; do
            hack/vendor-chart-crds.sh "${c%/}"
          done
      - uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          node_image: kindest/node:${{ matrix.k8s }}
      - name: Install cluster prerequisites
        # cert-manager (webhook cert-manager mode), the Flux source-controller
        # CRDs (ExternalArtifact, the artifact type both controllers integrate
        # with), and the Prometheus-Operator CRDs (ServiceMonitor / PrometheusRule,
        # rendered by the metrics-enabled ci values) must all exist before a chart
        # installs cleanly.
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
          kubectl -n cert-manager rollout status deploy/cert-manager-webhook --timeout=300s
          # ServiceMonitor / PrometheusRule live in monitoring.coreos.com; charts
          # render them when metrics scraping is enabled (stageset's
          # networkpolicy-values, any jaas values that opt in), so the kinds must
          # resolve at install time even though no Prometheus Operator runs here.
          kubectl apply -f https://github.com/prometheus-operator/prometheus-operator/releases/latest/download/stripped-down-crds.yaml --server-side
          # The stageset-controller cert-manager-values.yaml drives the webhook in
          # cert-manager mode against a ClusterIssuer named stageset-selfsigned. A
          # cluster-scoped (not namespaced) issuer is required because ct installs
          # into a fresh random namespace each run, so a namespaced Issuer couldn't
          # be pre-created there. A self-signed ClusterIssuer is enough to sign the
          # webhook serving cert.
          kubectl apply -f - <<'EOF'
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: stageset-selfsigned
          spec:
            selfSigned: {}
          EOF
          kubectl apply -f https://github.com/fluxcd/source-controller/releases/latest/download/source-controller.crds.yaml
          # Charts install with crds.create=false in CI (their ci values), because
          # ct installs each chart once per ci values file and a kept, cluster-
          # scoped CRD owned by the first release can't be re-adopted by the next.
          # So provision every chart's CRDs once here. They're cluster-scoped and
          # idempotent, and the joi chart also needs jaas's JsonnetLibrary CRD
          # present, so applying all of them unconditionally is correct + harmless.
          for crd in charts/*/templates/crd-*.yaml; do
            chart="$(dirname "$(dirname "$crd")")"
            helm template release-x "$chart" --set crds.create=true --show-only "templates/$(basename "$crd")" \
              | kubectl apply --server-side -f -
          done
          # The watch-namespaces ci values set operator.watchNamespaces=[team-a,
          # team-b], so the chart renders a RoleBinding into each of those
          # namespaces — they must exist before ct installs that values file
          # (ct only creates the release's own namespace).
          for ns in team-a team-b; do
            kubectl create namespace "$ns" --dry-run=client -o yaml | kubectl apply -f -
          done
      - name: ct install (changed charts)
        run: |
          # Skip charts whose appVersion is the 0.0.0 placeholder (image not
          # released yet); the changed job computed the exclude list.
          excluded="${{ needs.changed.outputs.excluded }}"
          if [ -n "$excluded" ]; then
            ct install --config ct.yaml --excluded-charts "$excluded"
          else
            ct install --config ct.yaml
          fi

  yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Lint YAML (yamllint)
        run: pipx install yamllint && yamllint .
  github-actions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Lint workflows (actionlint)
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1
        with:
          fail_on_error: true
          filter_mode: nofilter
  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Lint Markdown (markdownlint)
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23
        with:
          globs: "**/*.md"
  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Spell check (typos)
        uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1

  # Single, stably-named aggregate of every job above. Matrix jobs (install,
  # static) report one rolled-up result here — success only if every
  # leg passed — so this is the one and only check to mark "required" in branch
  # protection. It replaces having to enumerate matrix legs whose names change
  # with the discovered k8s versions / chart set.
  all-green:
    name: Verify — all checks passed
    needs:
      - changed
      - static
      - k8s-matrix
      - install
      - yaml
      - github-actions
      - markdown
      - typos
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail unless every dependency succeeded or was skipped
        env:
          # toJSON(needs) is {<job>: {result: success|failure|cancelled|skipped, ...}}.
          # Passing it through env avoids interpolating untrusted text into the script.
          NEEDS: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS" | jq -r 'to_entries[] | "\(.key): \(.value.result)"'
          # Skipped is allowed (jobs gate themselves on changed-chart / release
          # conditions); any real failure still propagates because the failing
          # job is a direct dependency here. Fail on failure or cancelled.
          bad=$(echo "$NEEDS" | jq -r '
            to_entries[]
            | select(.value.result != "success" and .value.result != "skipped")
            | "\(.key)=\(.value.result)"')
          if [ -n "$bad" ]; then
            echo "::error::Required jobs did not pass:"
            echo "$bad"
            exit 1
          fi
          echo "All required jobs passed (or were intentionally skipped)."
