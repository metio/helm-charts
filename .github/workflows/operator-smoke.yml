name: jaas operator smoke
on:
  # Runs on every PR (no paths filter) so the `all-green` aggregate always
  # reports a status and can be a required check. The expensive kind jobs are
  # gated internally on `discover.outputs.relevant` (did this PR touch the jaas
  # chart or this workflow?), so cost stays the same as the old paths filter.
  pull_request:
    branches: [main]
  workflow_dispatch:

# Angle 2 of the two-angle e2e strategy: the DEV jaas chart (this PR's
# charts/jaas) deploys the LATEST RELEASED jaas binary, and the SAME operator
# scenarios as the jaas repo run against it — the shared hack/smoke/*.sh scripts,
# checked out from metio/jaas at the released tag so the assertions match that
# binary's contract. The companion angle (dev binary × released chart) lives in
# the jaas repo. Only the deploy differs; the scenario logic is shared.
#
# The "released binary" is the chart's own appVersion (Renovate keeps it at the
# latest published image). Until a real jaas image is released the committed
# appVersion is the `0.0.0` placeholder, so `discover` emits an empty version and
# every smoke job skips (green). They activate once appVersion advances.
#
# No image build/load here: the released image is pulled from ghcr by kind. Each
# install vendors the chart's CRDs from its appVersion image first, so they match
# the deployed binary — no separate CRD overlay needed (unlike the jaas-repo angle).

permissions:
  contents: read

jobs:
  discover:
    name: Discover released jaas image + test versions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      image_version: ${{ steps.find.outputs.version }}
      k8s_latest: ${{ steps.versions.outputs.k8s_latest }}
      flux_latest: ${{ steps.versions.outputs.flux_latest }}
      k8s_imagevolume: ${{ steps.versions.outputs.k8s_imagevolume }}
      kind_latest: ${{ steps.versions.outputs.kind_latest }}
      relevant: ${{ steps.scope.outputs.relevant }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - id: scope
        name: Did this PR touch the jaas chart or this workflow?
        env:
          # Via env, never inlined into the script: event payload fields are
          # attacker-influenced text and must not expand directly into the shell.
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          # Replaces the old `paths:` trigger: the heavy kind jobs run only when
          # something they exercise changed. workflow_dispatch always counts.
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          base="$BASE_SHA"
          if git diff --name-only "$base" HEAD \
               | grep -qE '^charts/jaas/|^\.github/workflows/operator-smoke\.yml$'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No jaas-chart / operator-smoke changes in this PR — kind jobs skip (gate stays green)."
          fi
      - id: find
        name: Read charts/jaas appVersion
        run: |
          v="$(grep -oP '^appVersion:\s*"?\K[^"]+' charts/jaas/Chart.yaml || true)"
          if [ -z "$v" ] || [ "$v" = "0.0.0" ]; then
            echo "::notice::charts/jaas appVersion is the ${v:-empty} placeholder — no released jaas image yet; smoke jobs skip until appVersion advances."
            v=""
          else
            echo "released jaas image (appVersion): $v"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - id: versions
        name: Discover newest Kubernetes + Flux versions to test against
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          # Newest kindest/node minor, latest patch. A new k8s release is tested
          # automatically; if kind can't run a brand-new minor yet, that surfaces
          # as a failure — the signal to bump kind, not silent staleness.
          k8s_all=$(curl -fsSL "https://hub.docker.com/v2/repositories/kindest/node/tags?page_size=100" \
            | jq -r '.results[].name' | grep -E '^v1\.[0-9]+\.[0-9]+$' \
            | awk -F. '{print $1"."$2" "$0}' | sort -k1,1V -k2,2V \
            | awk '{l[$1]=$2} END{for(m in l)print l[m]}' | sort -V)
          k8s=$(printf '%s\n' "$k8s_all" | tail -1)
          # Fail loudly on a discovery miss rather than substituting a stale
          # constant — a frozen fallback would silently downgrade the matrix and
          # mask exactly the staleness this dynamic discovery exists to surface.
          [ -n "$k8s" ] || { echo "::error::kindest/node version discovery failed"; exit 1; }
          # Subset that reliably supports image volumes on kind: k8s >= 1.33,
          # where ImageVolume is beta and the node images ship containerd 2.x with
          # image-volume CRI support. The gate is known there, so enabling it can't
          # error; newer minors are picked up automatically. Empty => the
          # image-volumes job skips (its if: guards on != '[]').
          k8s_iv=$(printf '%s\n' "$k8s_all" | awk -F. '$2>=33' | jq -R 'select(length>0)' | jq -cs . 2>/dev/null || echo '[]')
          [ -n "$k8s_iv" ] || k8s_iv='[]'
          # Newest Flux at or above the ExternalArtifact floor (v2.7.0 /
          # source-controller v1.7.0); below that the publish path has no CRD. The
          # major>2 clause keeps a future v3.x in range without a manual edit.
          flux=$(gh release list --repo fluxcd/flux2 --limit 60 --json tagName,isPrerelease \
                   --jq '.[] | select(.isPrerelease==false) | .tagName' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | awk -F. '{m=$1;sub(/^v/,"",m); if(m>2||(m==2&&$2>=7))print}' \
            | awk -F. '{print $1"."$2" "$0}' | sort -k1,1V -k2,2V \
            | awk '{l[$1]=$2} END{for(m in l)print l[m]}' | sort -V | tail -1)
          # Fail loudly on a discovery miss rather than freezing at the floor —
          # a silent fallback masks a broken query (the floor is already enforced
          # by the awk filter above, so a non-empty result is always >= v2.7.0).
          [ -n "$flux" ] || { echo "::error::Flux release discovery failed"; exit 1; }
          # Newest kind release — the pinned helm/kind-action's bundled kind can
          # lag new node images ("unknown containerd config version: N"); pin the
          # binary to the node image. Empty falls back to the action default.
          kind=$(gh release list --repo kubernetes-sigs/kind --limit 30 \
                   --json tagName,isPrerelease \
                   --jq '.[] | select(.isPrerelease==false) | .tagName' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          {
            echo "k8s_latest=$k8s"
            echo "flux_latest=$flux"
            echo "k8s_imagevolume=$k8s_iv"
            echo "kind_latest=$kind"
          } >> "$GITHUB_OUTPUT"
          echo "k8s_latest=$k8s  flux_latest=$flux  k8s_imagevolume=$k8s_iv  kind_latest=$kind"

  basic:
    name: basic + cert-manager webhook
    needs: discover
    if: needs.discover.outputs.image_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout helm-charts (dev chart)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Checkout jaas at the released tag (shared smoke scripts)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: metio/jaas
          ref: ${{ needs.discover.outputs.image_version }}
          path: jaas-src
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: jaas-chart-smoke
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Cluster prereqs (cert-manager + Flux + issuer)
        run: |
          jaas-src/hack/smoke/setup-cert-manager.sh
          jaas-src/hack/smoke/setup-flux.sh ${{ needs.discover.outputs.flux_latest }}
          jaas-src/hack/smoke/setup-selfsigned-issuer.sh
      - name: Install the dev chart with the released image
        run: |
          # CRDs aren't committed; vendor them from the chart's released jaas
          # image so the install ships its CRDs (gated on crds.create) at the
          # schema matching the deployed binary.
          GH_TOKEN='${{ github.token }}' hack/vendor-chart-crds.sh charts/jaas
          helm dependency build charts/jaas
          # kind has no ImageVolume feature gate enabled, so the chart's default
          # JOI library image-volumes (volumes[].image) can't mount and wedge the
          # pod in ContainerCreating. Disable them: these operator scenarios use
          # inline files / a Bucket source, not grafonnet/docsonnet/xtd.
          helm upgrade --install jaas charts/jaas \
            --namespace jaas-system \
            --set operator.enabled=true \
            --set operator.defaultServiceAccount=default \
            --set libraries.grafonnet.enabled=false \
            --set libraries.docsonnet.enabled=false \
            --set libraries.xtd.enabled=false \
            --set operator.webhook.enabled=true \
            --set operator.webhook.certManager.issuerRef.kind=Issuer \
            --set operator.webhook.certManager.issuerRef.name=jaas-selfsigned \
            --wait --timeout 5m
      - name: Grant tenant publish RBAC (test fixture)
        # operator-smoke pins the smoke scripts to the released jaas tag, whose
        # in-script RBAC setup can lag HEAD. Provision the tenant SA's publish +
        # source-read RBAC here so this angle stays robust to released-script
        # version skew; idempotent with any grant the script also applies.
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata: { namespace: default, name: jaas-tenant-publish }
          rules:
            - apiGroups: ["source.toolkit.fluxcd.io"]
              resources: ["externalartifacts", "externalartifacts/status"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            - apiGroups: ["source.toolkit.fluxcd.io"]
              resources: ["buckets", "gitrepositories", "ocirepositories"]
              verbs: ["get", "list", "watch"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata: { namespace: default, name: jaas-tenant-publish }
          subjects:
            - { kind: ServiceAccount, name: default, namespace: default }
          roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: jaas-tenant-publish }
          EOF
      - name: Wait for the admission webhook to accept calls
        # /ready (port 8081) is independent of the controller-runtime webhook
        # server (port 9443), so `helm --wait` can see the pod Ready before
        # admission is serving — the apiserver then gets "connection refused".
        # A server-side dry-run apply exercises the validating webhook without
        # persisting; retry until it answers, so the scenario's apply won't race
        # webhook startup (the released scripts predate the in-script apply-retry).
        run: |
          cat > /tmp/webhook-warmup.yaml <<'EOF'
          apiVersion: jaas.metio.wtf/v1
          kind: JsonnetSnippet
          metadata: { name: webhook-warmup, namespace: default }
          spec:
            serviceAccountName: default
            entryFile: main.jsonnet
            files: { main.jsonnet: "{ ok: true }" }
          EOF
          for i in $(seq 1 40); do
            if kubectl apply --dry-run=server -f /tmp/webhook-warmup.yaml >/dev/null 2>&1; then
              echo "admission webhook is serving (after $i attempts)"; exit 0
            fi
            sleep 3
          done
          echo "::warning::admission webhook never became reachable in time"
      - name: Operator scenario — basic
        run: jaas-src/hack/smoke/scenario-basic.sh
      - name: Uninstall hygiene — pre-delete hook drops finalizers
        run: |
          helm uninstall jaas -n jaas-system --wait --timeout 5m
          if kubectl get jsonnetsnippet smoke 2>/dev/null; then echo "ERROR: snippet survived uninstall"; exit 1; fi
          if kubectl get externalartifact smoke 2>/dev/null; then echo "ERROR: ExternalArtifact survived uninstall"; exit 1; fi
          echo "Uninstall hygiene verified."
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n jaas-system get all || true
          kubectl -n jaas-system logs deploy/jaas --tail=300 || true
          kubectl describe jsonnetsnippet smoke || true
          kubectl describe externalartifact smoke || true

  selfsigned:
    name: self-signed webhook (cert-manager-free)
    needs: discover
    if: needs.discover.outputs.image_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout helm-charts (dev chart)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Checkout jaas at the released tag (shared smoke scripts)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: metio/jaas
          ref: ${{ needs.discover.outputs.image_version }}
          path: jaas-src
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: jaas-chart-ss
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Cluster prereqs (Flux)
        run: jaas-src/hack/smoke/setup-flux.sh ${{ needs.discover.outputs.flux_latest }}
      - name: Install the dev chart (self-signed cert mode) with the released image
        run: |
          kubectl create namespace jaas-system
          # CRDs aren't committed; vendor them from the chart's released jaas
          # image so the install ships its CRDs (gated on crds.create) at the
          # schema matching the deployed binary.
          GH_TOKEN='${{ github.token }}' hack/vendor-chart-crds.sh charts/jaas
          helm dependency build charts/jaas
          # kind has no ImageVolume feature gate enabled, so the chart's default
          # JOI library image-volumes (volumes[].image) can't mount and wedge the
          # pod in ContainerCreating. Disable them: these operator scenarios use
          # inline files / a Bucket source, not grafonnet/docsonnet/xtd.
          helm upgrade --install jaas charts/jaas \
            --namespace jaas-system \
            --set operator.enabled=true \
            --set operator.defaultServiceAccount=default \
            --set libraries.grafonnet.enabled=false \
            --set libraries.docsonnet.enabled=false \
            --set libraries.xtd.enabled=false \
            --set operator.webhook.enabled=true \
            --set operator.webhook.certMode=self-signed \
            --set operator.webhook.selfSignedValidity=24h \
            --wait --timeout 5m
      - name: Grant tenant publish RBAC (test fixture)
        # See the basic job — released scripts can lag HEAD's in-script grant.
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata: { namespace: default, name: jaas-tenant-publish }
          rules:
            - apiGroups: ["source.toolkit.fluxcd.io"]
              resources: ["externalartifacts", "externalartifacts/status"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata: { namespace: default, name: jaas-tenant-publish }
          subjects:
            - { kind: ServiceAccount, name: default, namespace: default }
          roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: jaas-tenant-publish }
          EOF
      - name: Wait for the admission webhook to accept calls
        # See the basic job: /ready is independent of the :9443 webhook server,
        # so wait for admission to actually answer before the scenario applies.
        run: |
          cat > /tmp/webhook-warmup.yaml <<'EOF'
          apiVersion: jaas.metio.wtf/v1
          kind: JsonnetSnippet
          metadata: { name: webhook-warmup, namespace: default }
          spec:
            serviceAccountName: default
            entryFile: main.jsonnet
            files: { main.jsonnet: "{ ok: true }" }
          EOF
          for i in $(seq 1 40); do
            if kubectl apply --dry-run=server -f /tmp/webhook-warmup.yaml >/dev/null 2>&1; then
              echo "admission webhook is serving (after $i attempts)"; exit 0
            fi
            sleep 3
          done
          echo "::warning::admission webhook never became reachable in time"
      - name: Operator scenario — self-signed webhook
        run: jaas-src/hack/smoke/scenario-selfsigned-webhook.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n jaas-system get all || true
          kubectl -n jaas-system logs deploy/jaas --tail=300 || true
          kubectl get validatingwebhookconfiguration jaas-jsonnetsnippet -o yaml || true
          kubectl describe jsonnetsnippet smoke-ss || true

  new-fields:
    name: spec.suspend + spec.history + Events
    needs: discover
    if: needs.discover.outputs.image_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout helm-charts (dev chart)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Checkout jaas at the released tag (shared smoke scripts)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: metio/jaas
          ref: ${{ needs.discover.outputs.image_version }}
          path: jaas-src
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: jaas-chart-fields
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Cluster prereqs (Flux)
        run: jaas-src/hack/smoke/setup-flux.sh ${{ needs.discover.outputs.flux_latest }}
      - name: Install the dev chart (no webhook) with the released image
        run: |
          kubectl create namespace jaas-system
          # CRDs aren't committed; vendor them from the chart's released jaas
          # image so the install ships its CRDs (gated on crds.create) at the
          # schema matching the deployed binary.
          GH_TOKEN='${{ github.token }}' hack/vendor-chart-crds.sh charts/jaas
          helm dependency build charts/jaas
          # kind has no ImageVolume feature gate enabled, so the chart's default
          # JOI library image-volumes (volumes[].image) can't mount and wedge the
          # pod in ContainerCreating. Disable them: these operator scenarios use
          # inline files / a Bucket source, not grafonnet/docsonnet/xtd.
          helm upgrade --install jaas charts/jaas \
            --namespace jaas-system \
            --set operator.enabled=true \
            --set operator.defaultServiceAccount=default \
            --set libraries.grafonnet.enabled=false \
            --set libraries.docsonnet.enabled=false \
            --set libraries.xtd.enabled=false \
            --wait --timeout 5m
      - name: Grant tenant publish RBAC (test fixture)
        # See the basic job — released scripts can lag HEAD's in-script grant.
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata: { namespace: default, name: jaas-tenant-publish }
          rules:
            - apiGroups: ["source.toolkit.fluxcd.io"]
              resources: ["externalartifacts", "externalartifacts/status"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata: { namespace: default, name: jaas-tenant-publish }
          subjects:
            - { kind: ServiceAccount, name: default, namespace: default }
          roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: jaas-tenant-publish }
          EOF
      - name: Operator scenario — new CR fields
        run: jaas-src/hack/smoke/scenario-fields.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n jaas-system get all || true
          kubectl -n jaas-system logs deploy/jaas --tail=300 || true
          kubectl describe jsonnetsnippet fields-demo || true
          kubectl get events --field-selector involvedObject.name=fields-demo || true

  source-chain:
    name: sourceRef chain (Bucket → Snippet)
    needs: discover
    if: needs.discover.outputs.image_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout helm-charts (dev chart)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Checkout jaas at the released tag (shared smoke scripts)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: metio/jaas
          ref: ${{ needs.discover.outputs.image_version }}
          path: jaas-src
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: jaas-chart-chain
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Cluster prereqs (Flux + SeaweedFS bucket)
        run: |
          jaas-src/hack/smoke/setup-flux.sh ${{ needs.discover.outputs.flux_latest }}
          jaas-src/hack/smoke/setup-seaweedfs.sh
      - name: Open source-controller artifact port across namespaces
        # Release-lag bridge: the released setup-flux.sh predates this policy.
        # Flux's default NetworkPolicies admit ingress to source-controller only
        # from flux-system (and port 8080 for scraping); the artifact server is on
        # 9090, so the operator in jaas-system can't fetch once kindnet enforces
        # policies. Folded into setup-flux.sh at HEAD; drop once jaas re-releases.
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: allow-artifact-fetch
            namespace: flux-system
          spec:
            podSelector:
              matchLabels:
                app: source-controller
            policyTypes:
              - Ingress
            ingress:
              - from:
                  - namespaceSelector: {}
                ports:
                  - port: 9090
                    protocol: TCP
          EOF
      - name: Install the dev chart (no webhook) with the released image
        run: |
          kubectl create namespace jaas-system
          # CRDs aren't committed; vendor them from the chart's released jaas
          # image so the install ships its CRDs (gated on crds.create) at the
          # schema matching the deployed binary.
          GH_TOKEN='${{ github.token }}' hack/vendor-chart-crds.sh charts/jaas
          helm dependency build charts/jaas
          # kind has no ImageVolume feature gate enabled, so the chart's default
          # JOI library image-volumes (volumes[].image) can't mount and wedge the
          # pod in ContainerCreating. Disable them: these operator scenarios use
          # inline files / a Bucket source, not grafonnet/docsonnet/xtd.
          helm upgrade --install jaas charts/jaas \
            --namespace jaas-system \
            --set operator.enabled=true \
            --set operator.defaultServiceAccount=default \
            --set libraries.grafonnet.enabled=false \
            --set libraries.docsonnet.enabled=false \
            --set libraries.xtd.enabled=false \
            --wait --timeout 5m
      - name: Grant tenant publish RBAC (test fixture)
        # See the basic job — released scripts can lag HEAD's in-script grant.
        # The chain scenario also reads a Bucket sourceRef, so include the Flux
        # source-read verbs here too.
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata: { namespace: default, name: jaas-tenant-publish }
          rules:
            - apiGroups: ["source.toolkit.fluxcd.io"]
              resources: ["externalartifacts", "externalartifacts/status"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            - apiGroups: ["source.toolkit.fluxcd.io"]
              resources: ["buckets", "gitrepositories", "ocirepositories"]
              verbs: ["get", "list", "watch"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata: { namespace: default, name: jaas-tenant-publish }
          subjects:
            - { kind: ServiceAccount, name: default, namespace: default }
          roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: jaas-tenant-publish }
          EOF
      - name: Operator scenario — sourceRef chain
        run: jaas-src/hack/smoke/scenario-chain.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n flux-system logs deploy/source-controller --tail=300 || true
          kubectl -n minio logs deploy/minio --tail=200 || true
          kubectl -n jaas-system logs deploy/jaas --tail=300 || true
          kubectl describe bucket dashboards || true
          kubectl describe jsonnetsnippet chain-demo || true
          kubectl describe externalartifact chain-demo || true
          # source-controller reachability surface.
          kubectl -n flux-system get svc source-controller -o wide || true
          kubectl -n flux-system get endpoints source-controller -o wide || true
          # The operator fetches the Bucket's artifact URL, which source-controller
          # advertises with a trailing FQDN-root dot (…svc.cluster.local.). Curl it
          # from a throwaway pod BOTH as-advertised and with the dot stripped: if
          # the dotted form hangs while the plain form works, the trailing dot is
          # the culprit (operator bug); if both hang, it's network/source-controller;
          # if both work, the operator fetch logic is at fault some other way.
          url=$(kubectl -n default get bucket dashboards -o jsonpath='{.status.artifact.url}' 2>/dev/null || true)
          echo "bucket artifact url (as advertised): ${url:-<none>}"
          if [ -n "$url" ]; then
            url_nodot=$(printf '%s' "$url" | sed 's#\.svc\.cluster\.local\.#.svc.cluster.local#')
            kubectl -n default run chain-curl --image=docker.io/curlimages/curl:latest \
              --restart=Never --rm -i --command -- sh -c "
                echo '--- WITH trailing dot (as operator dials) ---'
                curl -sS -v --max-time 20 -o /dev/null '$url' 2>&1 | tail -25
                echo '--- WITHOUT trailing dot ---'
                curl -sS -v --max-time 20 -o /dev/null '$url_nodot' 2>&1 | tail -25
              " || true
          fi
          # The ClusterIP curl above times out (SYN dropped) despite a healthy
          # endpoint. Split kube-proxy (service VIP) from pod-to-pod CNI: curl the
          # endpoint pod IP directly. If THIS works, kube-proxy isn't programming
          # the VIP; if it also times out, pod-to-pod routing to that pod is broken.
          ep=$(kubectl -n flux-system get endpoints source-controller \
                 -o jsonpath='{.subsets[0].addresses[0].ip}:{.subsets[0].ports[0].port}' 2>/dev/null || true)
          echo "source-controller endpoint (pod IP:port): ${ep:-<none>}"
          if [ -n "$ep" ] && [ "$ep" != ":" ]; then
            kubectl -n default run chain-curl-direct --image=docker.io/curlimages/curl:latest \
              --restart=Never --rm -i --command -- \
              curl -sS -v --max-time 15 -o /dev/null "http://$ep/" 2>&1 | tail -15 || true
          fi
          # kube-proxy mode + recent logs — nftables vs iptables on a brand-new
          # k8s minor is a prime suspect for VIP programming gaps.
          kubectl -n kube-system get ds kube-proxy -o jsonpath='{.spec.template.spec.containers[0].args}' 2>/dev/null; echo
          kubectl -n kube-system logs ds/kube-proxy --tail=40 2>/dev/null || true
          kubectl -n flux-system get pod -l app=source-controller -o wide || true
          # Flux's default NetworkPolicies admit ingress to source-controller's
          # artifact port (9090) only from flux-system; a drop here (not the VIP)
          # explains a SYN timeout to a healthy, Ready pod.
          kubectl -n flux-system get networkpolicy -o wide || true

  scale-smoke:
    name: scale-smoke (N=50 snippets converge)
    needs: discover
    if: needs.discover.outputs.image_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout helm-charts (dev chart)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Checkout jaas at the released tag (shared smoke scripts)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: metio/jaas
          ref: ${{ needs.discover.outputs.image_version }}
          path: jaas-src
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: jaas-chart-scale
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Cluster prereqs (Flux)
        run: jaas-src/hack/smoke/setup-flux.sh ${{ needs.discover.outputs.flux_latest }}
      - name: Install the dev chart (no webhook) with the released image
        run: |
          kubectl create namespace jaas-system
          # CRDs aren't committed; vendor them from the chart's released jaas
          # image so the install ships its CRDs (gated on crds.create) at the
          # schema matching the deployed binary.
          GH_TOKEN='${{ github.token }}' hack/vendor-chart-crds.sh charts/jaas
          helm dependency build charts/jaas
          # kind has no ImageVolume feature gate enabled, so the chart's default
          # JOI library image-volumes (volumes[].image) can't mount and wedge the
          # pod in ContainerCreating. Disable them: these operator scenarios use
          # inline files / a Bucket source, not grafonnet/docsonnet/xtd.
          helm upgrade --install jaas charts/jaas \
            --namespace jaas-system \
            --set operator.enabled=true \
            --set operator.defaultServiceAccount=default \
            --set libraries.grafonnet.enabled=false \
            --set libraries.docsonnet.enabled=false \
            --set libraries.xtd.enabled=false \
            --wait --timeout 5m
      - name: Grant tenant publish RBAC (test fixture)
        # See the basic job — released scripts can lag HEAD's in-script grant.
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata: { namespace: default, name: jaas-tenant-publish }
          rules:
            - apiGroups: ["source.toolkit.fluxcd.io"]
              resources: ["externalartifacts", "externalartifacts/status"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata: { namespace: default, name: jaas-tenant-publish }
          subjects:
            - { kind: ServiceAccount, name: default, namespace: default }
          roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: jaas-tenant-publish }
          EOF
      - name: Operator scenario — scale (N=50 converge)
        run: jaas-src/hack/smoke/scenario-scale.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n jaas-system get all || true
          kubectl -n jaas-system logs deploy/jaas --tail=500 || true
          kubectl get jsonnetsnippet -n default -o wide || true

  image-volumes:
    name: image-volume libraries (k8s ${{ matrix.k8s_version }})
    needs: discover
    # Only the k8s minors where ImageVolume works on kind (>= 1.33; see discover).
    # The other jobs disable the JOI library image-volumes to stay portable —
    # this one is the dedicated coverage that they mount and the operator reads
    # them, run against exactly the versions that support the feature.
    if: needs.discover.outputs.image_version != '' && needs.discover.outputs.k8s_imagevolume != '[]' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        k8s_version: ${{ fromJSON(needs.discover.outputs.k8s_imagevolume) }}
    steps:
      - name: Checkout helm-charts (dev chart)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Write kind config enabling the ImageVolume feature gate
        # kind does not enable ImageVolume by default; turn it on for apiserver
        # (so the volumes[].image field survives admission) and kubelet (so it
        # mounts). The node image carries the matching containerd.
        run: |
          cat > /tmp/kind-imagevolume.yaml <<EOF
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          featureGates:
            ImageVolume: true
          nodes:
            - role: control-plane
              image: kindest/node:${{ matrix.k8s_version }}
          EOF
          cat /tmp/kind-imagevolume.yaml
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: jaas-chart-imagevolume
          config: /tmp/kind-imagevolume.yaml
          wait: 180s
      - name: Install the dev chart with library image-volumes ENABLED
        run: |
          kubectl create namespace jaas-system
          # CRDs aren't committed; vendor them from the chart's released jaas
          # image so the install ships its CRDs (gated on crds.create) at the
          # schema matching the deployed binary.
          GH_TOKEN='${{ github.token }}' hack/vendor-chart-crds.sh charts/jaas
          helm dependency build charts/jaas
          # No --set libraries.*.enabled=false here: the whole point is to mount
          # the JOI library image-volumes. A failed mount wedges the pod, so
          # --wait timing out IS the negative signal.
          helm upgrade --install jaas charts/jaas \
            --namespace jaas-system \
            --set operator.enabled=true \
            --set operator.defaultServiceAccount=default \
            --set libraries.grafonnet.enabled=true \
            --set libraries.docsonnet.enabled=true \
            --set libraries.xtd.enabled=true \
            --wait --timeout 5m
      - name: Assert the library image-volumes actually mounted
        run: |
          kubectl -n jaas-system rollout status deploy/jaas --timeout=120s
          pod=$(kubectl -n jaas-system get pod -l app.kubernetes.io/name=jaas -o name | head -1)
          echo "pod: $pod"
          kubectl -n jaas-system get "$pod" \
            -o jsonpath='{range .spec.volumes[*]}{.name}{" image="}{.image.reference}{"\n"}{end}'
          # The apiserver prunes volumes[].image when the gate is off, so a
          # non-zero count proves the feature is effective and the pod mounted it.
          n=$(kubectl -n jaas-system get "$pod" -o jsonpath='{.spec.volumes[*].image.reference}' | wc -w)
          [ "$n" -ge 1 ] || { echo "ERROR: no image-volume sources on the running pod — ImageVolume not effective"; exit 1; }
          echo "image-volume library sources mounted: $n"
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n jaas-system get pods -o wide || true
          kubectl -n jaas-system describe pod -l app.kubernetes.io/name=jaas || true
          kubectl -n jaas-system logs deploy/jaas --tail=200 || true

  # Single stably-named aggregate — the only check to mark "required". It always
  # runs (if: always()) so it reports on every PR, including ones where the kind
  # jobs skip (not jaas-relevant, or no release yet) — those count as passed.
  all-green:
    name: Operator smoke — all checks passed
    needs:
      - discover
      - basic
      - selfsigned
      - new-fields
      - source-chain
      - scale-smoke
      - image-volumes
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Fail unless every dependency succeeded or was skipped
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS" | jq -r 'to_entries[] | "\(.key): \(.value.result)"'
          bad=$(echo "$NEEDS" | jq -r '
            to_entries[]
            | select(.value.result != "success" and .value.result != "skipped")
            | "\(.key)=\(.value.result)"')
          if [ -n "$bad" ]; then
            echo "::error::Required jobs did not pass:"; echo "$bad"; exit 1
          fi
          echo "All required jobs passed (or were intentionally skipped)."
