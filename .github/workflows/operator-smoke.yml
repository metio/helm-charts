name: jaas operator smoke
on:
  pull_request:
    paths:
      - charts/jaas/**
      - .github/workflows/operator-smoke.yml
  workflow_dispatch:

# Angle 2 of the two-angle e2e strategy: the DEV jaas chart (this PR's
# charts/jaas) deploys the LATEST RELEASED jaas binary, and the SAME operator
# scenarios as the jaas repo run against it — the shared hack/smoke/*.sh scripts,
# checked out from metio/jaas at the released tag so the assertions match that
# binary's contract. The companion angle (dev binary × released chart) lives in
# the jaas repo. Only the deploy differs; the scenario logic is shared.
#
# The "released binary" is the chart's own appVersion (Renovate keeps it at the
# latest published image). Until a real jaas image is released the committed
# appVersion is the `0.0.0` placeholder, so `discover` emits an empty version and
# every smoke job skips (green). They activate once appVersion advances.
#
# No image build/load here: the released image is pulled from ghcr by kind. The
# dev chart vendors its CRDs at its appVersion, so they already match the
# deployed binary — no CRD overlay needed (unlike the jaas-repo angle).

permissions:
  contents: read

jobs:
  discover:
    name: Discover released jaas image + test versions
    runs-on: ubuntu-latest
    outputs:
      image_version: ${{ steps.find.outputs.version }}
      k8s_latest: ${{ steps.versions.outputs.k8s_latest }}
      flux_latest: ${{ steps.versions.outputs.flux_latest }}
      k8s_imagevolume: ${{ steps.versions.outputs.k8s_imagevolume }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - id: find
        name: Read charts/jaas appVersion
        run: |
          v="$(grep -oP '^appVersion:\s*"?\K[^"]+' charts/jaas/Chart.yaml || true)"
          if [ -z "$v" ] || [ "$v" = "0.0.0" ]; then
            echo "::notice::charts/jaas appVersion is the ${v:-empty} placeholder — no released jaas image yet; smoke jobs skip until appVersion advances."
            v=""
          else
            echo "released jaas image (appVersion): $v"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - id: versions
        name: Discover newest Kubernetes + Flux versions to test against
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          # Newest kindest/node minor, latest patch. A new k8s release is tested
          # automatically; if kind can't run a brand-new minor yet, that surfaces
          # as a failure — the signal to bump kind, not silent staleness.
          k8s_all=$(curl -fsSL "https://hub.docker.com/v2/repositories/kindest/node/tags?page_size=100" \
            | jq -r '.results[].name' | grep -E '^v1\.[0-9]+\.[0-9]+$' \
            | awk -F. '{print $1"."$2" "$0}' | sort -k1,1V -k2,2V \
            | awk '{l[$1]=$2} END{for(m in l)print l[m]}' | sort -V)
          k8s=$(printf '%s\n' "$k8s_all" | tail -1)
          [ -n "$k8s" ] || k8s=v1.33.1
          # Subset that reliably supports image volumes on kind: k8s >= 1.33,
          # where ImageVolume is beta and the node images ship containerd 2.x with
          # image-volume CRI support. The gate is known there, so enabling it can't
          # error; newer minors are picked up automatically. Empty => the
          # image-volumes job skips (its if: guards on != '[]').
          k8s_iv=$(printf '%s\n' "$k8s_all" | awk -F. '$2>=33' | jq -R . | jq -cs . 2>/dev/null || echo '[]')
          [ -n "$k8s_iv" ] || k8s_iv='[]'
          # Newest Flux at or above the ExternalArtifact floor (v2.7.0 /
          # source-controller v1.7.0); below that the publish path has no CRD. The
          # major>2 clause keeps a future v3.x in range without a manual edit.
          flux=$(gh release list --repo fluxcd/flux2 --limit 60 --json tagName,isPrerelease \
                   --jq '.[] | select(.isPrerelease==false) | .tagName' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | awk -F. '{m=$1;sub(/^v/,"",m); if(m>2||(m==2&&$2>=7))print}' \
            | awk -F. '{print $1"."$2" "$0}' | sort -k1,1V -k2,2V \
            | awk '{l[$1]=$2} END{for(m in l)print l[m]}' | sort -V | tail -1)
          [ -n "$flux" ] || flux=v2.7.0
          {
            echo "k8s_latest=$k8s"
            echo "flux_latest=$flux"
            echo "k8s_imagevolume=$k8s_iv"
          } >> "$GITHUB_OUTPUT"
          echo "k8s_latest=$k8s  flux_latest=$flux  k8s_imagevolume=$k8s_iv"

  basic:
    name: basic + cert-manager webhook
    needs: discover
    if: needs.discover.outputs.image_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout helm-charts (dev chart)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Checkout jaas at the released tag (shared smoke scripts)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: metio/jaas
          ref: ${{ needs.discover.outputs.image_version }}
          path: jaas-src
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          cluster_name: jaas-chart-smoke
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Cluster prereqs (cert-manager + Flux + issuer)
        run: |
          jaas-src/hack/smoke/setup-cert-manager.sh
          jaas-src/hack/smoke/setup-flux.sh ${{ needs.discover.outputs.flux_latest }}
          jaas-src/hack/smoke/setup-selfsigned-issuer.sh
      - name: Install the dev chart with the released image
        run: |
          helm dependency build charts/jaas
          # kind has no ImageVolume feature gate enabled, so the chart's default
          # JOI library image-volumes (volumes[].image) can't mount and wedge the
          # pod in ContainerCreating. Disable them: these operator scenarios use
          # inline files / a Bucket source, not grafonnet/docsonnet/xtd.
          helm upgrade --install jaas charts/jaas \
            --namespace jaas-system \
            --set operator.enabled=true \
            --set operator.defaultServiceAccount=default \
            --set libraries.grafonnet.enabled=false \
            --set libraries.docsonnet.enabled=false \
            --set libraries.xtd.enabled=false \
            --set operator.webhook.enabled=true \
            --set operator.webhook.certManager.issuerRef.kind=Issuer \
            --set operator.webhook.certManager.issuerRef.name=jaas-selfsigned \
            --wait --timeout 5m
      - name: Grant tenant publish RBAC (test fixture)
        # operator-smoke pins the smoke scripts to the released jaas tag, whose
        # in-script RBAC setup can lag HEAD. Provision the tenant SA's publish +
        # source-read RBAC here so this angle stays robust to released-script
        # version skew; idempotent with any grant the script also applies.
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata: { namespace: default, name: jaas-tenant-publish }
          rules:
            - apiGroups: ["source.toolkit.fluxcd.io"]
              resources: ["externalartifacts", "externalartifacts/status"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            - apiGroups: ["source.toolkit.fluxcd.io"]
              resources: ["buckets", "gitrepositories", "ocirepositories"]
              verbs: ["get", "list", "watch"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata: { namespace: default, name: jaas-tenant-publish }
          subjects:
            - { kind: ServiceAccount, name: default, namespace: default }
          roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: jaas-tenant-publish }
          EOF
      - name: Operator scenario — basic
        run: jaas-src/hack/smoke/scenario-basic.sh
      - name: Uninstall hygiene — pre-delete hook drops finalizers
        run: |
          helm uninstall jaas -n jaas-system --wait --timeout 5m
          if kubectl get jsonnetsnippet smoke 2>/dev/null; then echo "ERROR: snippet survived uninstall"; exit 1; fi
          if kubectl get externalartifact smoke 2>/dev/null; then echo "ERROR: ExternalArtifact survived uninstall"; exit 1; fi
          echo "Uninstall hygiene verified."
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n jaas-system get all || true
          kubectl -n jaas-system logs deploy/jaas --tail=300 || true
          kubectl describe jsonnetsnippet smoke || true
          kubectl describe externalartifact smoke || true

  selfsigned:
    name: self-signed webhook (cert-manager-free)
    needs: discover
    if: needs.discover.outputs.image_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout helm-charts (dev chart)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Checkout jaas at the released tag (shared smoke scripts)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: metio/jaas
          ref: ${{ needs.discover.outputs.image_version }}
          path: jaas-src
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          cluster_name: jaas-chart-ss
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Cluster prereqs (Flux)
        run: jaas-src/hack/smoke/setup-flux.sh ${{ needs.discover.outputs.flux_latest }}
      - name: Install the dev chart (self-signed cert mode) with the released image
        run: |
          kubectl create namespace jaas-system
          helm dependency build charts/jaas
          # kind has no ImageVolume feature gate enabled, so the chart's default
          # JOI library image-volumes (volumes[].image) can't mount and wedge the
          # pod in ContainerCreating. Disable them: these operator scenarios use
          # inline files / a Bucket source, not grafonnet/docsonnet/xtd.
          helm upgrade --install jaas charts/jaas \
            --namespace jaas-system \
            --set operator.enabled=true \
            --set operator.defaultServiceAccount=default \
            --set libraries.grafonnet.enabled=false \
            --set libraries.docsonnet.enabled=false \
            --set libraries.xtd.enabled=false \
            --set operator.webhook.enabled=true \
            --set operator.webhook.certMode=self-signed \
            --set operator.webhook.selfSignedValidity=24h \
            --wait --timeout 5m
      - name: Grant tenant publish RBAC (test fixture)
        # See the basic job — released scripts can lag HEAD's in-script grant.
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata: { namespace: default, name: jaas-tenant-publish }
          rules:
            - apiGroups: ["source.toolkit.fluxcd.io"]
              resources: ["externalartifacts", "externalartifacts/status"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata: { namespace: default, name: jaas-tenant-publish }
          subjects:
            - { kind: ServiceAccount, name: default, namespace: default }
          roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: jaas-tenant-publish }
          EOF
      - name: Operator scenario — self-signed webhook
        run: jaas-src/hack/smoke/scenario-selfsigned-webhook.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n jaas-system get all || true
          kubectl -n jaas-system logs deploy/jaas --tail=300 || true
          kubectl get validatingwebhookconfiguration jaas-jsonnetsnippet -o yaml || true
          kubectl describe jsonnetsnippet smoke-ss || true

  new-fields:
    name: spec.suspend + spec.history + Events
    needs: discover
    if: needs.discover.outputs.image_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout helm-charts (dev chart)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Checkout jaas at the released tag (shared smoke scripts)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: metio/jaas
          ref: ${{ needs.discover.outputs.image_version }}
          path: jaas-src
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          cluster_name: jaas-chart-fields
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Cluster prereqs (Flux)
        run: jaas-src/hack/smoke/setup-flux.sh ${{ needs.discover.outputs.flux_latest }}
      - name: Install the dev chart (no webhook) with the released image
        run: |
          kubectl create namespace jaas-system
          helm dependency build charts/jaas
          # kind has no ImageVolume feature gate enabled, so the chart's default
          # JOI library image-volumes (volumes[].image) can't mount and wedge the
          # pod in ContainerCreating. Disable them: these operator scenarios use
          # inline files / a Bucket source, not grafonnet/docsonnet/xtd.
          helm upgrade --install jaas charts/jaas \
            --namespace jaas-system \
            --set operator.enabled=true \
            --set operator.defaultServiceAccount=default \
            --set libraries.grafonnet.enabled=false \
            --set libraries.docsonnet.enabled=false \
            --set libraries.xtd.enabled=false \
            --wait --timeout 5m
      - name: Grant tenant publish RBAC (test fixture)
        # See the basic job — released scripts can lag HEAD's in-script grant.
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata: { namespace: default, name: jaas-tenant-publish }
          rules:
            - apiGroups: ["source.toolkit.fluxcd.io"]
              resources: ["externalartifacts", "externalartifacts/status"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata: { namespace: default, name: jaas-tenant-publish }
          subjects:
            - { kind: ServiceAccount, name: default, namespace: default }
          roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: jaas-tenant-publish }
          EOF
      - name: Operator scenario — new CR fields
        run: jaas-src/hack/smoke/scenario-fields.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n jaas-system get all || true
          kubectl -n jaas-system logs deploy/jaas --tail=300 || true
          kubectl describe jsonnetsnippet fields-demo || true
          kubectl get events --field-selector involvedObject.name=fields-demo || true

  source-chain:
    name: sourceRef chain (Bucket → Snippet)
    needs: discover
    if: needs.discover.outputs.image_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout helm-charts (dev chart)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Checkout jaas at the released tag (shared smoke scripts)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: metio/jaas
          ref: ${{ needs.discover.outputs.image_version }}
          path: jaas-src
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          cluster_name: jaas-chart-chain
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Cluster prereqs (Flux + MinIO bucket)
        run: |
          jaas-src/hack/smoke/setup-flux.sh ${{ needs.discover.outputs.flux_latest }}
          jaas-src/hack/smoke/setup-minio.sh
      - name: Install the dev chart (no webhook) with the released image
        run: |
          kubectl create namespace jaas-system
          helm dependency build charts/jaas
          # kind has no ImageVolume feature gate enabled, so the chart's default
          # JOI library image-volumes (volumes[].image) can't mount and wedge the
          # pod in ContainerCreating. Disable them: these operator scenarios use
          # inline files / a Bucket source, not grafonnet/docsonnet/xtd.
          helm upgrade --install jaas charts/jaas \
            --namespace jaas-system \
            --set operator.enabled=true \
            --set operator.defaultServiceAccount=default \
            --set libraries.grafonnet.enabled=false \
            --set libraries.docsonnet.enabled=false \
            --set libraries.xtd.enabled=false \
            --wait --timeout 5m
      - name: Grant tenant publish RBAC (test fixture)
        # See the basic job — released scripts can lag HEAD's in-script grant.
        # The chain scenario also reads a Bucket sourceRef, so include the Flux
        # source-read verbs here too.
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata: { namespace: default, name: jaas-tenant-publish }
          rules:
            - apiGroups: ["source.toolkit.fluxcd.io"]
              resources: ["externalartifacts", "externalartifacts/status"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            - apiGroups: ["source.toolkit.fluxcd.io"]
              resources: ["buckets", "gitrepositories", "ocirepositories"]
              verbs: ["get", "list", "watch"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata: { namespace: default, name: jaas-tenant-publish }
          subjects:
            - { kind: ServiceAccount, name: default, namespace: default }
          roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: jaas-tenant-publish }
          EOF
      - name: Operator scenario — sourceRef chain
        run: jaas-src/hack/smoke/scenario-chain.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n flux-system logs deploy/source-controller --tail=300 || true
          kubectl -n minio logs deploy/minio --tail=200 || true
          kubectl -n jaas-system logs deploy/jaas --tail=300 || true
          kubectl describe bucket dashboards || true
          kubectl describe jsonnetsnippet chain-demo || true
          kubectl describe externalartifact chain-demo || true
          # Reachability probe: the operator fetches the Bucket's artifact URL.
          # Curling it from a throwaway pod isolates an operator fetch bug (this
          # succeeds, operator fails) from a network/source-controller issue
          # (this also hangs). -v shows whether it connects then stalls on headers.
          url=$(kubectl -n default get bucket dashboards -o jsonpath='{.status.artifact.url}' 2>/dev/null || true)
          echo "bucket artifact url: ${url:-<none>}"
          if [ -n "$url" ]; then
            kubectl -n default run chain-curl --image=docker.io/curlimages/curl:latest \
              --restart=Never --rm -i --command -- \
              curl -sS -v --max-time 25 -o /dev/null "$url" || true
          fi

  scale-smoke:
    name: scale-smoke (N=50 snippets converge)
    needs: discover
    if: needs.discover.outputs.image_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout helm-charts (dev chart)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Checkout jaas at the released tag (shared smoke scripts)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: metio/jaas
          ref: ${{ needs.discover.outputs.image_version }}
          path: jaas-src
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          cluster_name: jaas-chart-scale
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Cluster prereqs (Flux)
        run: jaas-src/hack/smoke/setup-flux.sh ${{ needs.discover.outputs.flux_latest }}
      - name: Install the dev chart (no webhook) with the released image
        run: |
          kubectl create namespace jaas-system
          helm dependency build charts/jaas
          # kind has no ImageVolume feature gate enabled, so the chart's default
          # JOI library image-volumes (volumes[].image) can't mount and wedge the
          # pod in ContainerCreating. Disable them: these operator scenarios use
          # inline files / a Bucket source, not grafonnet/docsonnet/xtd.
          helm upgrade --install jaas charts/jaas \
            --namespace jaas-system \
            --set operator.enabled=true \
            --set operator.defaultServiceAccount=default \
            --set libraries.grafonnet.enabled=false \
            --set libraries.docsonnet.enabled=false \
            --set libraries.xtd.enabled=false \
            --wait --timeout 5m
      - name: Grant tenant publish RBAC (test fixture)
        # See the basic job — released scripts can lag HEAD's in-script grant.
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata: { namespace: default, name: jaas-tenant-publish }
          rules:
            - apiGroups: ["source.toolkit.fluxcd.io"]
              resources: ["externalartifacts", "externalartifacts/status"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata: { namespace: default, name: jaas-tenant-publish }
          subjects:
            - { kind: ServiceAccount, name: default, namespace: default }
          roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: jaas-tenant-publish }
          EOF
      - name: Operator scenario — scale (N=50 converge)
        run: jaas-src/hack/smoke/scenario-scale.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n jaas-system get all || true
          kubectl -n jaas-system logs deploy/jaas --tail=500 || true
          kubectl get jsonnetsnippet -n default -o wide || true

  image-volumes:
    name: image-volume libraries (k8s ${{ matrix.k8s_version }})
    needs: discover
    # Only the k8s minors where ImageVolume works on kind (>= 1.33; see discover).
    # The other jobs disable the JOI library image-volumes to stay portable —
    # this one is the dedicated coverage that they mount and the operator reads
    # them, run against exactly the versions that support the feature.
    if: needs.discover.outputs.image_version != '' && needs.discover.outputs.k8s_imagevolume != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        k8s_version: ${{ fromJSON(needs.discover.outputs.k8s_imagevolume) }}
    steps:
      - name: Checkout helm-charts (dev chart)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Write kind config enabling the ImageVolume feature gate
        # kind does not enable ImageVolume by default; turn it on for apiserver
        # (so the volumes[].image field survives admission) and kubelet (so it
        # mounts). The node image carries the matching containerd.
        run: |
          cat > /tmp/kind-imagevolume.yaml <<EOF
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          featureGates:
            ImageVolume: true
          nodes:
            - role: control-plane
              image: kindest/node:${{ matrix.k8s_version }}
          EOF
          cat /tmp/kind-imagevolume.yaml
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          cluster_name: jaas-chart-imagevolume
          config: /tmp/kind-imagevolume.yaml
          wait: 180s
      - name: Install the dev chart with library image-volumes ENABLED
        run: |
          kubectl create namespace jaas-system
          helm dependency build charts/jaas
          # No --set libraries.*.enabled=false here: the whole point is to mount
          # the JOI library image-volumes. A failed mount wedges the pod, so
          # --wait timing out IS the negative signal.
          helm upgrade --install jaas charts/jaas \
            --namespace jaas-system \
            --set operator.enabled=true \
            --set operator.defaultServiceAccount=default \
            --set libraries.grafonnet.enabled=true \
            --set libraries.docsonnet.enabled=true \
            --set libraries.xtd.enabled=true \
            --wait --timeout 5m
      - name: Assert the library image-volumes actually mounted
        run: |
          kubectl -n jaas-system rollout status deploy/jaas --timeout=120s
          pod=$(kubectl -n jaas-system get pod -l app.kubernetes.io/name=jaas -o name | head -1)
          echo "pod: $pod"
          kubectl -n jaas-system get "$pod" \
            -o jsonpath='{range .spec.volumes[*]}{.name}{" image="}{.image.reference}{"\n"}{end}'
          # The apiserver prunes volumes[].image when the gate is off, so a
          # non-zero count proves the feature is effective and the pod mounted it.
          n=$(kubectl -n jaas-system get "$pod" -o jsonpath='{.spec.volumes[*].image.reference}' | wc -w)
          [ "$n" -ge 1 ] || { echo "ERROR: no image-volume sources on the running pod — ImageVolume not effective"; exit 1; }
          echo "image-volume library sources mounted: $n"
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n jaas-system get pods -o wide || true
          kubectl -n jaas-system describe pod -l app.kubernetes.io/name=jaas || true
          kubectl -n jaas-system logs deploy/jaas --tail=200 || true
