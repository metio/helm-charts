# Zero-manual maintenance for the flake's from-source package. dadav/helm-schema
# is not in nixpkgs, so Renovate's nix manager — which only bumps flake inputs —
# cannot update it, and it cannot recompute nix hashes for a Go package.
# nix-update does both (version + src hash + vendorHash), so this scheduled run
# keeps it current and opens a PR: no version or hash is ever hand-edited.
# nixpkgs itself stays Renovate's job (the nix lock-file maintenance in the org
# preset), and every nixpkgs-provided tool rides that.
name: Update flake packages
on:
  schedule:
    - cron: 30 5 * * MON
  workflow_dispatch:
permissions:
  contents: read
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # push the update branch
      pull-requests: write # open the PR
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: metio/ci/nix-devshell@50117191bb36382ab22777be480c539fc4c37fed # 2026.7.5211151
      - name: Bump the from-source flake package (version + hashes)
        run: nix run nixpkgs#nix-update -- --flake --version=stable helm-schema || echo "::warning::nix-update helm-schema made no change or failed"
      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: flake-packages-update
          title: "chore(deps): update the from-source flake package"
          commit-message: "chore(deps): update the from-source flake package"
          body: |
            Automated `nix-update` of helm-schema (the flake package nixpkgs does
            not ship) — version, source hash, and vendorHash. Merge once the
            Verify gate is green.
          labels: dependencies
          delete-branch: true
