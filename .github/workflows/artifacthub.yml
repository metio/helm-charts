# Push each chart's Artifact Hub repository metadata to the OCI registry under the
# special `:artifacthub.io` tag, so Artifact Hub marks the repos as Verified
# Publisher. Runs automatically whenever an artifacthub-repo.yml changes (a new
# chart, or an updated repositoryID), so there is nothing to trigger by hand; the
# push is idempotent. Uses the built-in GITHUB_TOKEN (packages: write) — no PAT to
# create or renew. workflow_dispatch is kept as a manual fallback.
name: Push Artifact Hub metadata
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "charts/*/artifacthub-repo.yml"
permissions:
  packages: write
jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Tool version kept current by Renovate via the `# renovate:` marker (the
      # shared metio/renovate-config workflow customManager matches a marker
      # directly above the …_VERSION key in an env block). The install below
      # reads it through `env.` indirection so the version is not hand-pinned.
      # renovate: datasource=github-releases depName=oras-project/oras
      ORAS_VERSION: 1.3.2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install oras
        run: |
          curl -fsSL "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin oras
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Push repository metadata
        run: hack/push-artifacthub-metadata.sh
