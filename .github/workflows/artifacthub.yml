# One-off: push each chart's Artifact Hub repository metadata to the OCI registry
# under the special `:artifacthub.io` tag, so Artifact Hub marks the repos as
# Verified Publisher. The repositoryID is static, so trigger this once from the
# Actions tab; re-run only if a registry repo is recreated. Uses the built-in
# GITHUB_TOKEN (packages: write) — no PAT to create or renew.
name: Push Artifact Hub metadata
on:
  workflow_dispatch:
permissions:
  packages: write
jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install oras
        run: |
          curl -fsSL https://github.com/oras-project/oras/releases/download/v1.2.3/oras_1.2.3_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin oras
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Push repository metadata
        run: hack/push-artifacthub-metadata.sh
