# When Renovate bumps a chart's appVersion, re-vendor that release's CRDs into
# the chart on the same branch, so the bump PR carries matching CRDs and the
# verify.yml CRD-sync gate passes. Hosted Renovate cannot run the vendor script
# itself (no postUpgradeTasks), so this workflow does it.
name: Sync CRDs on appVersion bump
on:
  push:
    branches: ["renovate/**"]
    paths: ["charts/*/Chart.yaml"]
permissions:
  contents: write
jobs:
  vendor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.ref_name }}
      - name: Re-vendor CRDs at the bumped appVersion
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          for cf in charts/*/Chart.yaml; do
            image="$(grep -oP '#\s*renovate:\s*image=\K\S+' "$cf" || true)"
            [ -n "$image" ] || continue
            appVersion="$(grep -oP '^appVersion:\s*"?\K[^"]+' "$cf")"
            # Sibling charts may still be on the 0.0.0 placeholder (no released
            # image yet); there is no such tag to vendor from, so skip them —
            # otherwise the one bumped chart's run dies on a sibling's 404.
            # Mirrors the same skip in verify.yml's CRD-sync gate.
            [ "$appVersion" = "0.0.0" ] && continue
            hack/vendor-crds.sh "$image" "$appVersion"
          done
      - name: Commit any CRD changes back to the branch
        run: |
          if ! git diff --quiet -- 'charts/*/templates/crd-*.yaml'; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add charts/*/templates/crd-*.yaml
            git commit -m 'chore: re-vendor CRDs for appVersion bump'
            git push origin HEAD:${{ github.ref_name }}
          fi
