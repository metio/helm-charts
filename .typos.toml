[files]
extend-exclude = ["LICENSES/", "charts/*/tests/__snapshot__/"]

[default.extend-words]
# EDN (Extensible Data Notation) and the `.edn` file extension — tik's config
# format — are real words, not misspellings of "end".
edn = "edn"
EDN = "EDN"
