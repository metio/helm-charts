suite: test joi OCIRepository + JsonnetLibrary rendering
templates:
  - templates/ocirepository.yaml
  - templates/jsonnetlibrary.yaml
tests:
  - it: renders an OCIRepository per enabled library with the oci:// url and tag
    template: templates/ocirepository.yaml
    set:
      libraries.grafonnet.enabled: true
    documentSelector:
      path: metadata.name
      value: grafonnet
    asserts:
      - equal:
          path: kind
          value: OCIRepository
      - equal:
          path: spec.url
          value: oci://ghcr.io/metio/joi-grafana-grafonnet
      - equal:
          path: spec.ref.tag
          value: latest
      - notExists:
          path: spec.secretRef
  - it: renders a JsonnetLibrary per enabled library sourcing the matching OCIRepository
    template: templates/jsonnetlibrary.yaml
    set:
      libraries.xtd.enabled: true
    documentSelector:
      path: metadata.name
      value: xtd
    asserts:
      - equal:
          path: kind
          value: JsonnetLibrary
      - equal:
          path: spec.sourceRef.kind
          value: OCIRepository
      - equal:
          path: spec.sourceRef.name
          value: xtd
      - notExists:
          path: spec.sourceRef.path  # empty path -> whole vendor tree exposed
  - it: sets sourceRef.path only when a library narrows it
    template: templates/jsonnetlibrary.yaml
    set:
      libraries.xtd.enabled: true
      libraries.xtd.path: github.com/jsonnet-libs/xtd
    documentSelector:
      path: metadata.name
      value: xtd
    asserts:
      - equal:
          path: spec.sourceRef.path
          value: github.com/jsonnet-libs/xtd
  - it: rewrites the registry host to the mirror when set
    template: templates/ocirepository.yaml
    set:
      registryMirror: registry.internal:5000
      libraries.grafonnet.enabled: true
    documentSelector:
      path: metadata.name
      value: grafonnet
    asserts:
      - equal:
          path: spec.url
          value: oci://registry.internal:5000/metio/joi-grafana-grafonnet
  - it: sets secretRef when an imagePullSecret is configured
    template: templates/ocirepository.yaml
    set:
      imagePullSecret: mirror-creds
      libraries.docsonnet.enabled: true
    documentSelector:
      path: metadata.name
      value: docsonnet
    asserts:
      - equal:
          path: spec.secretRef.name
          value: mirror-creds
  - it: renders nothing by default — operators must enable libraries explicitly
    asserts:
      # The generated values.yaml is a pure catalog: every library ships
      # enabled:false, so a stock install emits no OCIRepository/JsonnetLibrary.
      # This pins the zero-default contract against an accidental re-introduction
      # of a curated default-enabled set.
      - hasDocuments:
          count: 0
        template: templates/ocirepository.yaml
      - hasDocuments:
          count: 0
        template: templates/jsonnetlibrary.yaml
  - it: renders the docsonnet OCIRepository when enabled
    template: templates/ocirepository.yaml
    set:
      libraries.docsonnet.enabled: true
    documentSelector:
      path: metadata.name
      value: docsonnet
    asserts:
      - equal:
          path: spec.url
          value: oci://ghcr.io/metio/joi-jsonnet-libs-docsonnet
  - it: renders the grafonnet OCIRepository when enabled
    template: templates/ocirepository.yaml
    set:
      libraries.grafonnet.enabled: true
    documentSelector:
      path: metadata.name
      value: grafonnet
    asserts:
      - equal:
          path: spec.url
          value: oci://ghcr.io/metio/joi-grafana-grafonnet
  - it: renders the xtd OCIRepository when enabled
    template: templates/ocirepository.yaml
    set:
      libraries.xtd.enabled: true
    documentSelector:
      path: metadata.name
      value: xtd
    asserts:
      - equal:
          path: spec.url
          value: oci://ghcr.io/metio/joi-jsonnet-libs-xtd
  - it: renders the OCIRepository for a closure dep that itself ships disabled
    template: templates/ocirepository.yaml
    set:
      libraries.grafonnet.enabled: true
    documentSelector:
      path: metadata.name
      value: testonnet
    asserts:
      # testonnet is enabled:false in values; enabling grafonnet (closure:
      # [docsonnet, testonnet, xtd]) pulls it in via the effective-set
      # expansion, so its OCIRepository must still render.
      - equal:
          path: spec.url
          value: oci://ghcr.io/metio/joi-jsonnet-libs-testonnet
  - it: renders the JsonnetLibrary for a closure dep that itself ships disabled
    template: templates/jsonnetlibrary.yaml
    set:
      libraries.grafonnet.enabled: true
    documentSelector:
      path: metadata.name
      value: testonnet
    asserts:
      - equal:
          path: spec.sourceRef.kind
          value: OCIRepository
      - equal:
          path: spec.sourceRef.name
          value: testonnet
  - it: renders a disabled library once it is enabled
    template: templates/ocirepository.yaml
    set:
      libraries.cilium-libsonnet.enabled: true
    documentSelector:
      path: metadata.name
      value: cilium-libsonnet
    asserts:
      - equal:
          path: spec.url
          value: oci://ghcr.io/metio/joi-jsonnet-libs-cilium-libsonnet
  - it: auto-renders a library's dependency closure
    template: templates/ocirepository.yaml
    set:
      # cilium (disabled by default) enabled with a dep on argo-cd (also disabled);
      # both must render via the effective-set expansion.
      libraries.cilium-libsonnet.enabled: true
      libraries.cilium-libsonnet.closure:
        - argo-cd-libsonnet
    documentSelector:
      path: metadata.name
      value: argo-cd-libsonnet
    asserts:
      - equal:
          path: spec.url
          value: oci://ghcr.io/metio/joi-jsonnet-libs-argo-cd-libsonnet
  - it: resolves the dependency closure transitively (a -> b -> c)
    # Enabling only `a` must pull in `b` (a's closure) AND `c` (b's closure) —
    # the closure is resolved to a fixpoint, not one level deep. Synthetic
    # libraries: the shipped catalog ships pre-flattened closures, so a crafted
    # chain is needed to exercise transitivity. The default catalog stays
    # disabled, so exactly a/b/c render.
    template: templates/jsonnetlibrary.yaml
    set:
      libraries:
        a: { enabled: true, image: ghcr.io/x/a, tag: latest, closure: [b] }
        b: { enabled: false, image: ghcr.io/x/b, tag: latest, closure: [c] }
        c: { enabled: false, image: ghcr.io/x/c, tag: latest, closure: [] }
    asserts:
      - hasDocuments:
          count: 3
      - matchRegex:
          path: metadata.name
          pattern: ^(a|b|c)$
  - it: honors a namespace override on the JsonnetLibrary
    template: templates/jsonnetlibrary.yaml
    set:
      namespace: platform
      libraries.docsonnet.enabled: true
    documentSelector:
      path: metadata.name
      value: docsonnet
    asserts:
      - equal:
          path: metadata.namespace
          value: platform
  - it: honors a namespace override on the OCIRepository
    template: templates/ocirepository.yaml
    set:
      namespace: platform
      libraries.docsonnet.enabled: true
    documentSelector:
      path: metadata.name
      value: docsonnet
    asserts:
      - equal:
          path: metadata.namespace
          value: platform
  - it: renders an OCIRepository and JsonnetLibrary for a user-added library entry
    set:
      libraries.mylib:
        enabled: true
        image: ghcr.io/acme/x
        tag: "1.2.3"
        path: sub/dir
    documentSelector:
      path: metadata.name
      value: mylib
    asserts:
      - equal:
          path: spec.url
          value: oci://ghcr.io/acme/x
        template: templates/ocirepository.yaml
      - equal:
          path: spec.ref.tag
          value: "1.2.3"
        template: templates/ocirepository.yaml
      - equal:
          path: spec.sourceRef.kind
          value: OCIRepository
        template: templates/jsonnetlibrary.yaml
      - equal:
          path: spec.sourceRef.name
          value: mylib
        template: templates/jsonnetlibrary.yaml
      - equal:
          path: spec.sourceRef.path
          value: sub/dir
        template: templates/jsonnetlibrary.yaml
  - it: uses the global interval default on the OCIRepository
    template: templates/ocirepository.yaml
    set:
      libraries.grafonnet.enabled: true
    documentSelector:
      path: metadata.name
      value: grafonnet
    asserts:
      - equal:
          path: spec.interval
          value: 60m
  - it: lets a per-library interval override win over the global default
    template: templates/ocirepository.yaml
    set:
      libraries.grafonnet.enabled: true
      libraries.grafonnet.interval: 5m
    documentSelector:
      path: metadata.name
      value: grafonnet
    asserts:
      - equal:
          path: spec.interval
          value: 5m
  - it: pins a non-default tag into ref.tag
    template: templates/ocirepository.yaml
    set:
      libraries.grafonnet.enabled: true
      libraries.grafonnet.tag: 2026.6.16
    documentSelector:
      path: metadata.name
      value: grafonnet
    asserts:
      - equal:
          path: spec.ref.tag
          value: "2026.6.16"
