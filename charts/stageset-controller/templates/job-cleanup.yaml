{{- if .Values.cleanupOnDelete.enabled -}}
# pre-delete hook: bulk-delete every StageSet so the controller's finalizer
# (stages.metio.wtf/finalizer) runs — tearing down the objects each StageSet
# applied — BEFORE Helm removes the controller itself. Otherwise the controller
# goes away first, its finalizer never runs, and every StageSet is stuck in
# Terminating, which hangs `helm uninstall`.
#
# Lives as a pre-delete hook so the controller pod is still alive when the
# StageSets get deleted. The RBAC objects carry hook-weight -10 so they are
# created before the Job (weight 0) that consumes them; lower weights run first
# within the pre-delete batch.
#
# If the controller is already unreachable when uninstall runs, the kubectl
# delete waits out --timeout and the Job fails. A failed pre-delete hook blocks
# the uninstall, so the StageSets keep their finalizers. Recover by stripping
# them, then re-run `helm uninstall` (the same procedure is printed in NOTES):
#
#   kubectl get stageset --all-namespaces -o name | xargs -I{} \
#     kubectl patch {} --type=merge -p '{"metadata":{"finalizers":[]}}'
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "stageset.name" . }}-cleanup
  namespace: {{ include "stageset.namespace" . }}
  labels:
    {{- include "stageset.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
{{- if .Values.controller.watchNamespaces }}
{{- /* Watch-scoped install: grant + delete only in the watched namespaces, via
       a Role + RoleBinding per namespace. A cluster-wide grant here would let an
       uninstall of one scoped instance delete EVERY tenant's StageSets and fire
       their finalizers — destroying other tenants' workloads. */ -}}
{{- range $ns := .Values.controller.watchNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "stageset.name" $ }}-cleanup
  namespace: {{ $ns }}
  labels:
    {{- include "stageset.labels" $ | nindent 4 }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
  - apiGroups:
      - stages.metio.wtf
    resources:
      - stagesets
    verbs:
      - get
      - list
      - delete
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "stageset.name" $ }}-cleanup
  namespace: {{ $ns }}
  labels:
    {{- include "stageset.labels" $ | nindent 4 }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: {{ include "stageset.name" $ }}-cleanup
    namespace: {{ include "stageset.namespace" $ }}
roleRef:
  kind: Role
  name: {{ include "stageset.name" $ }}-cleanup
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- else }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "stageset.name" . }}-{{ include "stageset.namespace" . }}-cleanup
  labels:
    {{- include "stageset.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
  - apiGroups:
      - stages.metio.wtf
    resources:
      - stagesets
    verbs:
      - get
      - list
      - delete
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "stageset.name" . }}-{{ include "stageset.namespace" . }}-cleanup
  labels:
    {{- include "stageset.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: {{ include "stageset.name" . }}-cleanup
    namespace: {{ include "stageset.namespace" . }}
roleRef:
  kind: ClusterRole
  name: {{ include "stageset.name" . }}-{{ include "stageset.namespace" . }}-cleanup
  apiGroup: rbac.authorization.k8s.io
{{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "stageset.name" . }}-cleanup
  namespace: {{ include "stageset.namespace" . }}
  labels:
    {{- include "stageset.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    # kube-score ignores:
    #   container-image-pull-policy — kubectl image is tagged; IfNotPresent
    #     avoids a registry round-trip on every uninstall.
    #   pod-networkpolicy — the cleanup Job runs briefly during uninstall
    #     and the chart's NetworkPolicy doesn't (and shouldn't) target it.
    kube-score/ignore: container-image-pull-policy,pod-networkpolicy
spec:
  backoffLimit: {{ .Values.cleanupOnDelete.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.cleanupOnDelete.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "stageset.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "stageset.name" . }}-cleanup
      # Pod-level securityContext for PSS restricted compliance — mirrors the
      # container-level fields so admission controllers validate the pod outright
      # instead of recursing into the container set.
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
          {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        # Writable cache for kubectl's discovery client. The container's root
        # filesystem is read-only, so without this kubectl cannot write its
        # cache and the run errors instead of cleaning up.
        - name: cache
          emptyDir: {}
      # --wait lets the controller's finalizer tear down each StageSet's applied
      # objects before Helm removes the controller; --ignore-not-found makes the
      # no-StageSet case (and any re-run) a clean no-op. If the controller is
      # already unreachable the delete times out and the container fails, which
      # fails the Job and blocks the uninstall — recover by stripping finalizers
      # as documented in the chart NOTES. A watch-scoped install runs one
      # container per watched namespace (the distroless kubectl image has no
      # shell to loop), each scoped with --namespace; a cluster-wide install uses
      # a single --all-namespaces container.
      containers:
        {{- if .Values.controller.watchNamespaces }}
        {{- range $i, $ns := .Values.controller.watchNamespaces }}
        {{- include "stageset.cleanupContainer" (dict "root" $ "name" (printf "cleanup-%s" $ns | trunc 63 | trimSuffix "-") "scopeArg" (printf "--namespace=%s" $ns) "cacheDir" (printf "/tmp/kubecache-%d" $i)) | nindent 8 }}
        {{- end }}
        {{- else }}
        {{- include "stageset.cleanupContainer" (dict "root" . "name" "cleanup" "scopeArg" "--all-namespaces" "cacheDir" "/tmp/kubecache") | nindent 8 }}
        {{- end }}
{{- end }}
