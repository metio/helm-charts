apiVersion: v1
kind: Service
metadata:
  name: {{ include "stageset.name" . }}-metrics
  namespace: {{ include "stageset.namespace" . }}
  labels:
    {{- include "stageset.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "stageset.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.ports.metrics }}
      targetPort: metrics
      protocol: TCP
