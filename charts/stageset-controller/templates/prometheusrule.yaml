{{- if .Values.metrics.prometheusRule.enabled -}}
{{- $rbKey := .Values.metrics.prometheusRule.runbookAnnotationKey -}}
{{- $rbBase := "https://stageset.projects.metio.wtf/runbooks" -}}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "stageset.name" . }}-alerts
  namespace: {{ include "stageset.namespace" . }}
  labels:
    {{- include "stageset.labels" . | nindent 4 }}
    {{- with .Values.metrics.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.metrics.prometheusRule.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  groups:
    - name: stageset-health
      interval: {{ .Values.metrics.prometheusRule.interval }}
      rules:

        - alert: StageSetReconcileErrorsHigh
          # stageset_reconcile_total is labelled by terminal Ready reason; the
          # happy reasons (Succeeded, Suspended — happyReasonsNoRunbook in the
          # controller) are excluded so intentional/steady states never page.
          expr: |
            sum by (namespace, name, reason) (
              rate(stageset_reconcile_total{reason!~"Succeeded|Suspended"}[5m])
            ) > {{ .Values.metrics.prometheusRule.thresholds.reconcileErrorRate }}
          for: {{ .Values.metrics.prometheusRule.thresholds.reconcileErrorDuration }}
          labels:
            severity: warning
            {{- with .Values.metrics.prometheusRule.extraAlertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: 'StageSet {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.name {{ "}}" }} failing (reason: {{ "{{" }} $labels.reason {{ "}}" }})'
            description: |
              The StageSet has been settling to Ready=False for the alert window.
              Each Ready reason has a runbook page; the URL is templated on
              $labels.reason and lands in the {{ $rbKey }} annotation.
            {{ $rbKey }}: {{ printf "%s/{{ $labels.reason | toLower }}/" $rbBase | quote }}

    - name: stageset-availability
      interval: {{ .Values.metrics.prometheusRule.interval }}
      rules:

        - alert: StageSetControllerWorkqueueDepthHigh
          expr: |
            workqueue_depth{controller="stageset"} > {{ .Values.metrics.prometheusRule.thresholds.workqueueDepth }}
          for: {{ .Values.metrics.prometheusRule.thresholds.workqueueDuration }}
          labels:
            severity: warning
            {{- with .Values.metrics.prometheusRule.extraAlertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: 'StageSet controller workqueue saturated'
            description: |
              The controller cannot drain its reconcile queue. Likely apiserver
              slowness, a slow source/artifact fetch, or a stuck stage action.
            {{ $rbKey }}: {{ printf "%s/workqueue-saturation/" $rbBase | quote }}

        - alert: StageSetReconcileLatencyHigh
          expr: |
            histogram_quantile(0.99,
              sum by (le, controller) (
                rate(controller_runtime_reconcile_time_seconds_bucket{controller="stageset"}[10m])
              )
            ) > {{ .Values.metrics.prometheusRule.thresholds.reconcileLatencySeconds }}
          for: {{ .Values.metrics.prometheusRule.thresholds.reconcileLatencyDuration }}
          labels:
            severity: warning
            {{- with .Values.metrics.prometheusRule.extraAlertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: 'StageSet reconcile p99 latency high'
            description: |
              Reconcile p99 latency for the StageSet controller exceeded the
              threshold — large artifacts, many objects per stage, or slow actions.
            {{ $rbKey }}: {{ printf "%s/reconcile-latency/" $rbBase | quote }}

        - alert: StageSetControllerPodDown
          # Select this release's controller pods by their kube-state-metrics
          # labels rather than a name prefix: a release installed under a
          # non-default name has pods named "<release>-..." (so a chart-name
          # regex misses it), and the short-lived pre-delete cleanup Job pod
          # (stageset-controller-cleanup-*) would otherwise false-page during
          # uninstall.
          expr: |
            kube_pod_status_ready{namespace="{{ include "stageset.namespace" . }}",condition="true"} == 0
            and on (namespace, pod)
            kube_pod_labels{namespace="{{ include "stageset.namespace" . }}",label_app_kubernetes_io_name="{{ .Chart.Name }}",label_app_kubernetes_io_instance="{{ .Release.Name }}",label_app_kubernetes_io_component="controller"}
          for: {{ .Values.metrics.prometheusRule.thresholds.podDownDuration }}
          labels:
            severity: critical
            {{- with .Values.metrics.prometheusRule.extraAlertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: 'StageSet controller pod not ready'
            description: |
              A controller pod in {{ include "stageset.namespace" . }} has been
              NotReady for the alert window; StageSets are not reconciled until a
              replica recovers.
            {{ $rbKey }}: {{ printf "%s/controller-pod-down/" $rbBase | quote }}

        - alert: StageSetWebhookCertRenewalFailing
          # Only meaningful in self-signed webhook mode. The current cert keeps
          # working until natural expiry, so the signal must fire well before that
          # — cluster-wide admission breaks at expiry.
          expr: |
            increase(stageset_webhook_cert_renewal_failures_total[1h]) > {{ .Values.metrics.prometheusRule.thresholds.webhookCertRenewalFailuresPerHour }}
          for: {{ .Values.metrics.prometheusRule.thresholds.webhookCertRenewalFailuresDuration }}
          labels:
            severity: critical
            {{- with .Values.metrics.prometheusRule.extraAlertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: 'StageSet self-signed webhook cert rotation is failing'
            description: |
              stageset_webhook_cert_renewal_failures_total has been increasing. The
              renewer cannot refresh the self-signed serving cert; the current cert
              works until its natural expiry, which is the deadline.
            {{ $rbKey }}: {{ printf "%s/webhook-cert-renewal/" $rbBase | quote }}

        - alert: StageSetWatchEngagementFailing
          # When a previously-missing producer source CRD becomes
          # Established, the watcher engages a runtime watch on it. If
          # that engagement keeps failing, the apiextensions informer
          # fires no further events on a stable CRD, so the watch stays
          # un-engaged. Dependent StageSets stop re-triggering on
          # upstream republishes of that producer kind, with no
          # per-StageSet signal.
          expr: |
            increase(stageset_watch_engagement_failures_total[1h]) > {{ .Values.metrics.prometheusRule.thresholds.watchEngagementFailuresPerHour }}
          for: {{ .Values.metrics.prometheusRule.thresholds.watchEngagementFailuresDuration }}
          labels:
            severity: warning
            {{- with .Values.metrics.prometheusRule.extraAlertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: 'StageSet cannot engage producer watch for {{ "{{" }} $labels.gvk {{ "}}" }}'
            description: |
              stageset_watch_engagement_failures_total has been
              increasing for {{ "{{" }} $labels.gvk {{ "}}" }}. The
              producer source CRD is installed and Established but the
              controller's attempt to register the watch keeps erroring
              (transient controller-runtime cache reconnect, or a missing
              ClusterRole verb on the source kind). StageSets depending on
              this kind aren't re-triggering on upstream producer updates.
            {{ $rbKey }}: {{ printf "%s/watch-engagement/" $rbBase | quote }}

    - name: stageset-rollout-gates
      interval: {{ .Values.metrics.prometheusRule.interval }}
      rules:

        - alert: StageSetBudgetFrozen
          # stageset_budget_frozen is 1 only while a non-dryRun rollout-wide
          # error-budget freeze is actively holding new revisions; it self-clears
          # when the budget recovers and is evicted when the StageSet is deleted.
          expr: |
            stageset_budget_frozen == 1
          for: {{ .Values.metrics.prometheusRule.thresholds.budgetFrozenDuration }}
          labels:
            severity: warning
            {{- with .Values.metrics.prometheusRule.extraAlertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: 'StageSet {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.name {{ "}}" }} rollouts frozen out of error budget'
            description: |
              A rollout-wide error-budget freeze has held new revisions for the
              alert window. Deploys resume automatically when the budget recovers;
              ship a reliability fix sooner with the budget-override break-glass.
            {{ $rbKey }}: {{ printf "%s/budgetexhausted/" $rbBase | quote }}

        - alert: StageSetStageBudgetFrozen
          expr: |
            stageset_stage_budget_frozen == 1
          for: {{ .Values.metrics.prometheusRule.thresholds.budgetFrozenDuration }}
          labels:
            severity: warning
            {{- with .Values.metrics.prometheusRule.extraAlertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: 'StageSet {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.stageset {{ "}}" }} stage {{ "{{" }} $labels.stage {{ "}}" }} frozen out of error budget'
            description: |
              A new revision is held out of stage {{ "{{" }} $labels.stage {{ "}}" }}
              by that stage's own error budget. Earlier stages keep rolling; the
              stage resumes when its budget recovers.
            {{ $rbKey }}: {{ printf "%s/budgetexhausted/" $rbBase | quote }}

        - alert: StageSetPromotionBlocked
          # stageset_stage_promotion_blocked is 1 only on a real analysis failure
          # (breached past failureLimit), distinct from a healthy soak/manual hold.
          expr: |
            stageset_stage_promotion_blocked == 1
          for: {{ .Values.metrics.prometheusRule.thresholds.promotionBlockedDuration }}
          labels:
            severity: warning
            {{- with .Values.metrics.prometheusRule.extraAlertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: 'StageSet {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.stageset {{ "}}" }} stage {{ "{{" }} $labels.stage {{ "}}" }} promotion analysis failing'
            description: |
              A promotion analysis check has breached its threshold past
              failureLimit, so the rollout will not advance past stage
              {{ "{{" }} $labels.stage {{ "}}" }}. Inspect the failing check and
              fix forward, or promote past the gate once it is healthy.
            {{ $rbKey }}: {{ printf "%s/promotionblocked/" $rbBase | quote }}

        - alert: StageSetPromotionStuck
          # stageset_stage_promotion_pending covers healthy holds (soak/analysis/
          # manual), which are intentional and usually brief — so the default
          # duration is long, catching a forgotten manual gate or a misconfigured
          # soak rather than a normal short hold.
          expr: |
            stageset_stage_promotion_pending == 1
          for: {{ .Values.metrics.prometheusRule.thresholds.promotionPendingDuration }}
          labels:
            severity: warning
            {{- with .Values.metrics.prometheusRule.extraAlertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: 'StageSet {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.stageset {{ "}}" }} parked at stage {{ "{{" }} $labels.stage {{ "}}" }}'
            description: |
              The rollout has been holding at stage {{ "{{" }} $labels.stage {{ "}}" }}
              for the alert window — a soak running long, or a manual promotion
              that no one has actioned. Raise the threshold if long holds are
              expected here.
            {{ $rbKey }}: {{ printf "%s/awaitingpromotion/" $rbBase | quote }}

        - alert: StageSetMetricSourceUnavailable
          # A gate running blind on its onSourceError policy: the error-budget
          # freeze fails open by default, so a quietly-broken source disables the
          # gate while looking installed. This is the loud signal for that hole.
          expr: |
            increase(stageset_metric_source_errors_total[1h]) > {{ .Values.metrics.prometheusRule.thresholds.metricSourceErrorsPerHour }}
          for: {{ .Values.metrics.prometheusRule.thresholds.metricSourceErrorsDuration }}
          labels:
            severity: warning
            {{- with .Values.metrics.prometheusRule.extraAlertLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          annotations:
            summary: 'StageSet {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.name {{ "}}" }} metric source unavailable'
            description: |
              An error-budget or promotion-analysis metric source has been
              failing to return a usable scalar. A fail-open freeze is then
              running with no protection; a fail-closed gate is holding. Check the
              source address/query and any bearer-token Secret.
            {{ $rbKey }}: {{ printf "%s/budgetsourceunavailable/" $rbBase | quote }}

    {{- with .Values.metrics.prometheusRule.extraRules }}
    - name: stageset-extras
      interval: {{ $.Values.metrics.prometheusRule.interval }}
      rules:
        {{- toYaml . | nindent 8 }}
    {{- end }}
{{- end }}
