# Always bound cluster-wide: the cluster-scoped ClusterRole grants access to the
# cluster-scoped FleetRollout and ImageVerificationPolicy CRDs (and, in
# self-signed cert mode, the VWC caBundle patch), none of which a per-namespace
# RoleBinding can convey. Independent of controller.watchNamespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "stageset.name" . }}-cluster
  labels:
    {{- include "stageset.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "stageset.name" . }}-cluster
subjects:
  - kind: ServiceAccount
    name: {{ include "stageset.name" . }}
    namespace: {{ include "stageset.namespace" . }}
