apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "stageset.name" . }}
  namespace: {{ include "stageset.namespace" . }}
  labels:
    {{- include "stageset.labels" . | nindent 4 }}
    {{- with .Values.deployment.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    # kube-score ignores for design-deliberate choices:
    #   container-image-pull-policy — IfNotPresent is correct for tagged release
    #     images; mutable-tag operators flip to Always via image.pullPolicy.
    #   pod-networkpolicy — the chart's NetworkPolicy is opt-in via
    #     networkPolicy.enabled (inert without a NetworkPolicy controller).
    #   deployment-has-host-podantiaffinity — spreading is via
    #     topologySpreadConstraints, not host podAntiAffinity.
    #   deployment-replicas — single replica is the safe default; scale via
    #     replicas.min.
    #   deployment-has-poddisruptionbudget — the PDB renders only when
    #     replicas.max > replicas.min.
    kube-score/ignore: container-image-pull-policy,pod-networkpolicy,deployment-has-host-podantiaffinity,deployment-replicas,deployment-has-poddisruptionbudget
spec:
  {{- /* When autoscaling (replicas.max > replicas.min) the HPA owns the replica
         count starting at replicas.min, so spec.replicas is omitted to avoid
         fighting the HPA on every apply. Otherwise replicas.min is a fixed
         count and must be set explicitly — at the 1/1 default that is a single
         replica; replicas.min/max=2 pins two. */}}
  {{- if not (include "stageset.scaling" .) }}
  replicas: {{ .Values.replicas.min }}
  {{- end }}
  revisionHistoryLimit: {{ .Values.deployment.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "stageset.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "stageset.labels" . | nindent 8 }}
        {{- with .Values.pod.additionalLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "stageset.name" . }}
      terminationGracePeriodSeconds: 60
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: {{ include "stageset.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --metrics-bind-address=:{{ .Values.ports.metrics }}
            - --health-probe-bind-address=:{{ .Values.ports.health }}
            {{- if .Values.controller.leaderElect }}
            - --leader-elect
            {{- end }}
            - --log-level={{ .Values.controller.logLevel }}
            - --log-format={{ .Values.controller.logFormat }}
            - --default-interval={{ .Values.controller.defaultInterval }}
            - --inventory-shard-cap={{ .Values.controller.inventoryShardCap }}
            {{- range .Values.controller.allowedActionHosts }}
            - --allowed-action-hosts={{ . }}
            {{- end }}
            {{- if .Values.controller.noCrossNamespaceRefs }}
            - --no-cross-namespace-refs
            {{- end }}
            {{- if .Values.controller.objectLevelKMS }}
            - --object-level-kms
            {{- end }}
            {{- if .Values.controller.requireVerifiedMigrationSources }}
            - --require-verified-migration-sources
            {{- end }}
            {{- if .Values.controller.requirePinnedMigrationSources }}
            - --require-pinned-migration-sources
            {{- end }}
            {{- if .Values.controller.watchNamespaces }}
            - --watch-namespaces={{ join "," .Values.controller.watchNamespaces }}
            {{- end }}
            {{- with .Values.controller.tracing.endpoint }}
            - --tracing-endpoint={{ . }}
            - --tracing-insecure={{ $.Values.controller.tracing.insecure }}
            - --tracing-sample-ratio={{ $.Values.controller.tracing.sampleRatio }}
            {{- end }}
            {{- if .Values.gate.enabled }}
            - --gate-bind-address=:{{ .Values.ports.gate }}
            {{- else }}
            - --gate-bind-address=
            {{- end }}
            {{- if .Values.mcp.enabled }}
            - --enable-mcp
            - --mcp-bind-address=:{{ .Values.ports.mcp }}
            {{- if .Values.mcp.allowMutations }}
            - --mcp-allow-mutations
            {{- end }}
            {{- end }}
            - --enable-webhook={{ .Values.webhook.enabled }}
            {{- if .Values.webhook.enabled }}
            - --webhook-cert-mode={{ .Values.webhook.certMode }}
            - --webhook-cert-dir=/etc/webhook/certs
            - --webhook-port={{ .Values.ports.webhook }}
            {{- if eq .Values.webhook.certMode "self-signed" }}
            - --webhook-cert-validity={{ .Values.webhook.certValidity }}
            - --webhook-service-name={{ include "stageset.name" . }}-webhook
            - --webhook-service-namespace={{ include "stageset.namespace" . }}
            - --webhook-validating-config-name={{ include "stageset.name" . }}-{{ include "stageset.namespace" . }}
            {{- end }}
            {{- end }}
            {{- if eq .Values.rollbackStore.backend "pvc" }}
            - --rollback-store-path={{ .Values.rollbackStore.pvc.mountPath }}
            {{- else if eq .Values.rollbackStore.backend "s3" }}
            - --rollback-store-s3-endpoint={{ required "rollbackStore.s3.endpoint is required when rollbackStore.backend is \"s3\"" .Values.rollbackStore.s3.endpoint }}
            - --rollback-store-s3-bucket={{ required "rollbackStore.s3.bucket is required when rollbackStore.backend is \"s3\"" .Values.rollbackStore.s3.bucket }}
            {{- with .Values.rollbackStore.s3.prefix }}
            - --rollback-store-s3-prefix={{ . }}
            {{- end }}
            {{- with .Values.rollbackStore.s3.region }}
            - --rollback-store-s3-region={{ . }}
            {{- end }}
            - --rollback-store-s3-use-ssl={{ .Values.rollbackStore.s3.useSSL }}
            - --rollback-store-s3-anonymous={{ .Values.rollbackStore.s3.anonymous }}
            - --rollback-store-s3-sse={{ .Values.rollbackStore.s3.sse }}
            {{- with .Values.rollbackStore.s3.sseKmsKeyId }}
            - --rollback-store-s3-sse-kms-key={{ . }}
            {{- end }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.ports.metrics }}
            - name: health
              containerPort: {{ .Values.ports.health }}
            {{- if .Values.gate.enabled }}
            - name: gate
              containerPort: {{ .Values.ports.gate }}
            {{- end }}
            {{- if .Values.mcp.enabled }}
            - name: mcp
              containerPort: {{ .Values.ports.mcp }}
            {{- end }}
            {{- if .Values.webhook.enabled }}
            - name: webhook
              containerPort: {{ .Values.ports.webhook }}
            {{- end }}
          {{- if and (eq .Values.rollbackStore.backend "s3") .Values.rollbackStore.s3.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.rollbackStore.s3.existingSecret }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.ports.health }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.ports.health }}
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            requests:
              cpu: {{ .Values.resources.cpu }}
              memory: {{ .Values.resources.memory }}
              ephemeral-storage: {{ .Values.resources.ephemeralStorage }}
            limits:
              cpu: {{ .Values.resources.cpu }}
              memory: {{ .Values.resources.memory }}
              ephemeral-storage: {{ .Values.resources.ephemeralStorage }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.webhook.enabled }}
            - name: webhook-certs
              mountPath: /etc/webhook/certs
              readOnly: {{ eq .Values.webhook.certMode "cert-manager" }}
            {{- end }}
            {{- if eq .Values.rollbackStore.backend "pvc" }}
            - name: rollback-store
              mountPath: {{ .Values.rollbackStore.pvc.mountPath }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir:
            # Holds the streamed compressed artifact (capped at the binary's
            # 64Mi download limit) plus the decrypted kustomize build tree. The
            # sizeLimit stays below resources.ephemeralStorage so this volume is
            # the bound that trips — with a clear message — before the kubelet's
            # ephemeral-storage eviction.
            sizeLimit: {{ .Values.tmpSizeLimit }}
        {{- if .Values.webhook.enabled }}
        - name: webhook-certs
          {{- if eq .Values.webhook.certMode "cert-manager" }}
          secret:
            secretName: {{ include "stageset.name" . }}-webhook-cert
          {{- else }}
          emptyDir:
            sizeLimit: 1Mi
          {{- end }}
        {{- end }}
        {{- if eq .Values.rollbackStore.backend "pvc" }}
        - name: rollback-store
          persistentVolumeClaim:
            claimName: {{ include "stageset.name" . }}-rollback
        {{- end }}
