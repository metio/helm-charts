apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "stageset.name" . }}
  labels:
    {{- include "stageset.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "stageset.name" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "stageset.name" . }}
    namespace: {{ include "stageset.namespace" . }}
