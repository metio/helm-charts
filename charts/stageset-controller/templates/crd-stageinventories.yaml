{{- /*
SPDX-FileCopyrightText: The helm-charts Authors
SPDX-License-Identifier: 0BSD

CRDs live under templates/ (not crds/) so `helm upgrade` applies schema
changes automatically. The `helm.sh/resource-policy: keep` annotation keeps
`helm uninstall` from wiping the CRD (and every bound custom resource) — an
operator who genuinely wants them gone deletes the CRD by hand. Vendored from
the source repo by hack/vendor-crds.sh and pinned to the chart's appVersion;
the verify.yml CRD-sync gate fails on drift. Gated on .Values.crds.create
(default true) so the CRDs can be managed out-of-band — e.g. CI's chart-testing
installs the same chart once per ci values file, and a cluster-scoped
keep-policy CRD owned by the first release can't be re-adopted by the next.
*/ -}}
{{- if .Values.crds.create }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
    helm.sh/resource-policy: keep
  name: stageinventories.stages.metio.wtf
spec:
  group: stages.metio.wtf
  names:
    kind: StageInventory
    listKind: StageInventoryList
    plural: stageinventories
    singular: stageinventory
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.labels.stages\.metio\.wtf/stage
      name: Stage
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: StageInventory is one shard of a stage's recorded inventory.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              StageInventorySpec holds one shard of a stage's inventory. Entries live
              in spec (not status) deliberately: backup tooling restores spec, so prune
              history survives disaster recovery. Shard zero additionally acts as the
              ApplySet (KEP-3659) parent object for the stage.
            properties:
              entries:
                description: Entries lists the objects this shard accounts for.
                items:
                  description: InventoryEntry identifies one tracked object.
                  properties:
                    id:
                      description: ID in the form namespace_name_group_kind.
                      type: string
                    v:
                      description: V is the API version the object was last applied
                        with.
                      type: string
                  required:
                  - id
                  - v
                  type: object
                type: array
              stagePosition:
                description: |-
                  StagePosition records the stage's position in spec.stages at write
                  time, used for reverse-order teardown of removed stages.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources: {}
{{- end }}
