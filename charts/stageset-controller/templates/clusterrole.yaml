# Mirrors config/rbac/role.yaml (controller-gen) from the source repo. The
# permissions to apply the manifests a StageSet renders are deliberately NOT
# granted here: the controller impersonates spec.serviceAccountName for cluster
# writes, so each tenant's RBAC bounds what its StageSets can touch. Events are
# added on top of controller-gen's set so the EventRecorder can annotate
# StageSets in any namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "stageset.name" . }}
  labels:
    {{- include "stageset.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [serviceaccounts]
    verbs: [impersonate]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [admissionregistration.k8s.io]
    resources: [validatingwebhookconfigurations]
    verbs: [get, update]
  - apiGroups: [source.toolkit.fluxcd.io]
    resources: [externalartifacts]
    verbs: [get, list, watch]
  - apiGroups: [stages.metio.wtf]
    resources: [stageinventories]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [stages.metio.wtf]
    resources: [stagesets]
    verbs: [get, list, patch, update, watch]
  - apiGroups: [stages.metio.wtf]
    resources: [stagesets/finalizers]
    verbs: [update]
  - apiGroups: [stages.metio.wtf]
    resources: [stagesets/status]
    verbs: [get, patch, update]
