# Tenant-scope ClusterRole. Every resource here is namespaced, so when
# controller.watchNamespaces is set this role is bound per-namespace via
# RoleBindings (rolebinding-tenants.yaml) instead of a cluster-wide
# ClusterRoleBinding. The cluster-scoped grants (the FleetRollout and
# ImageVerificationPolicy CRDs, and the ValidatingWebhookConfiguration caBundle
# patch) live in clusterrole-cluster.yaml, which always binds cluster-wide.
#
# Mirrors config/rbac/role.yaml (controller-gen) from the source repo. The
# permissions to apply the manifests a StageSet renders are deliberately NOT
# granted here: for local-cluster writes the controller mints a short-lived
# TokenRequest token for spec.serviceAccountName and authenticates as that SA,
# so each tenant's RBAC bounds what its StageSets can touch — least privilege,
# no `impersonate` verb. (Remote-cluster apply via spec.kubeConfig authenticates
# with the provided kubeconfig and is unaffected by this ClusterRole.) Events are
# added on top of controller-gen's set so the EventRecorder can annotate
# StageSets in any namespace.
#
# There is deliberately no secrets/configmaps rule. Every Secret and ConfigMap
# the controller reads is one a StageSet named in its own spec — postBuild
# substituteFrom, the metric-source bearer token, decryption keys, action
# secretRefs, spec.kubeConfig — and each is read as that StageSet's
# serviceAccountName, so the tenant's RBAC bounds it. A cluster-wide read here
# would let any StageSet author reach any Secret in their namespace, because
# they choose the names. It would also back those reads with cluster-wide Secret
# and ConfigMap informers. Grant the tenant ServiceAccounts `get` on the objects
# their StageSets reference instead; rbac.clusterAdmin covers the single-tenant
# install.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "stageset.name" . }}
  labels:
    {{- include "stageset.labels" . | nindent 4 }}
rules:
  # --object-level-kms resolves the tenant ServiceAccount (cloud workload
  # identity annotations) through the same cached client, so the SA read needs
  # the informer verbs too.
  - apiGroups: [""]
    resources: [serviceaccounts]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [serviceaccounts/token]
    verbs: [create]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, list, patch]
  # The EventRecorder (controller-runtime mgr.GetEventRecorder) emits through
  # the events.k8s.io/v1 API; RBAC authorizes per request group, so the
  # core-group events rule above does not cover these writes. The core-group
  # rule stays for the promotion event gate's corev1 Events list.
  - apiGroups: [events.k8s.io]
    resources: [events]
    verbs: [create, patch]
  # The promotion restart/event gates read pods and Warning events on the
  # apply-target cluster (the events list above, the pods list below) to decide
  # whether a stage may advance. In single-tenant mode — a StageSet omits
  # spec.serviceAccountName — that read runs under the controller's own identity
  # via an uncached reader, so list alone suffices: no informer, no watch. A
  # multi-tenant StageSet reads under its impersonated spec.serviceAccountName,
  # whose own RBAC must grant pods/events read, and a spec.kubeConfig target reads
  # under that kubeconfig's identity — neither is covered by this ClusterRole.
  # (When controller.watchNamespaces is set this role is bound per-namespace, so
  # the read is scoped to those namespaces rather than cluster-wide.)
  - apiGroups: [""]
    resources: [pods]
    verbs: [list]
  - apiGroups: [source.toolkit.fluxcd.io]
    resources: [externalartifacts]
    verbs: [get, list, watch]
  # Producer kinds whose failures the controller surfaces via dynamic watches
  # (Flux artifact sources + the JaaS snippet producer). A custom producer kind
  # still resolves via the EA back-pointer; add its RBAC here for fast-failure
  # watching.
  - apiGroups: [source.toolkit.fluxcd.io]
    resources: [gitrepositories, ocirepositories, buckets]
    verbs: [get, list, watch]
  - apiGroups: [jaas.metio.wtf]
    resources: [jsonnetsnippets]
    verbs: [get, list, watch]
  - apiGroups: [stages.metio.wtf]
    resources: [stageinventories]
    verbs: [create, delete, get, list, patch, update, watch]
  # The scope: Lifetime action ledger. The controller get/list/watch/creates it
  # and writes only its status; spec.baseline is author/operator-owned (via
  # `stagesetctl baseline`), so no update on the object itself. Not owner-
  # referenced, so no finalizers rule.
  - apiGroups: [stages.metio.wtf]
    resources: [stageledgers]
    verbs: [create, get, list, watch]
  - apiGroups: [stages.metio.wtf]
    resources: [stageledgers/status]
    verbs: [get, patch, update]
  - apiGroups: [stages.metio.wtf]
    resources: [stagesets]
    verbs: [get, list, patch, update, watch]
  - apiGroups: [stages.metio.wtf]
    resources: [stagesets/finalizers]
    verbs: [update]
  - apiGroups: [stages.metio.wtf]
    resources: [stagesets/status]
    verbs: [get, patch, update]
