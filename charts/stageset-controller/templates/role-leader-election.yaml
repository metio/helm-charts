{{- if .Values.controller.leaderElect }}
# Leader-election lease access, scoped to the controller's own namespace. Not
# part of controller-gen's ClusterRole — controller-runtime's lease-based lock
# needs these verbs on coordination.k8s.io/leases in the install namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "stageset.name" . }}-leader-election
  namespace: {{ include "stageset.namespace" . }}
  labels:
    {{- include "stageset.labels" . | nindent 4 }}
rules:
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "stageset.name" . }}-leader-election
  namespace: {{ include "stageset.namespace" . }}
  labels:
    {{- include "stageset.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "stageset.name" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "stageset.name" . }}
    namespace: {{ include "stageset.namespace" . }}
{{- end }}
