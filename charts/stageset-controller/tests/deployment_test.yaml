suite: test stageset deployment
templates:
  - templates/deployment.yaml
tests:
  - it: renders the image as registry/repository:appVersion
    asserts:
      # Match the shape, not the literal tag: the tag defaults to
      # .Chart.AppVersion, which Renovate bumps to the released calendar
      # version, so pinning an exact value breaks on every release bump.
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ^ghcr\.io/metio/stageset-controller:[0-9.]+$
  - it: pins spec.replicas to replicas.min at the non-autoscaling default
    asserts:
      # replicas.min is the fixed Deployment count unless an HPA is rendered
      # (replicas.max > replicas.min). At the 1/1 default that is one replica.
      - equal:
          path: spec.replicas
          value: 1
  - it: pins spec.replicas to replicas.min for a fixed multi-replica install
    set:
      replicas.min: 2
      replicas.max: 2
    asserts:
      # min == max: no HPA, so the Deployment owns a fixed count. This is what
      # an HA (leader-election failover) install relies on — two pods.
      - equal:
          path: spec.replicas
          value: 2
  - it: omits spec.replicas when autoscaling so the HPA owns the count
    set:
      replicas.min: 2
      replicas.max: 5
    asserts:
      # max > min renders the HPA, which owns the replica count from
      # minReplicas; the Deployment must not set spec.replicas and fight it.
      - notExists:
          path: spec.replicas
  - it: passes the core controller flags
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --leader-elect
      - contains:
          path: spec.template.spec.containers[0].args
          content: --inventory-mode=hybrid
      - contains:
          path: spec.template.spec.containers[0].args
          content: --gate-bind-address=:8082
      - contains:
          path: spec.template.spec.containers[0].args
          content: --enable-webhook=true
  - it: passes the default controller.logLevel and logFormat
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --log-level=info
      - contains:
          path: spec.template.spec.containers[0].args
          content: --log-format=json
  - it: honors a controller.logLevel override
    set:
      controller.logLevel: debug
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --log-level=debug
  - it: honors a controller.logFormat override
    set:
      controller.logFormat: text
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --log-format=text
  - it: defaults to self-signed webhook flags
    release:
      namespace: stageset-system
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --webhook-cert-mode=self-signed
      - contains:
          path: spec.template.spec.containers[0].args
          content: --webhook-validating-config-name=stageset-controller-stageset-system
  - it: disables the gate endpoint with an empty bind address
    set:
      gate.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --gate-bind-address=
  - it: drops leader-elect when disabled
    set:
      controller.leaderElect: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --leader-elect
  - it: applies a hardened container securityContext
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 65532
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
  - it: sets cpu, memory, and ephemeral-storage on both requests and limits
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.ephemeral-storage
          value: 32Mi
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 50m
  - it: mounts a writable tmp and the cert dir
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tmp
            mountPath: /tmp
      - contains:
          path: spec.template.spec.volumes
          content:
            name: webhook-certs
            emptyDir: {}
  - it: mounts a cert-manager Secret read-only when in cert-manager mode
    set:
      webhook.certMode: cert-manager
      webhook.certManager.issuerRef.name: my-issuer
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: webhook-certs
            secret:
              secretName: stageset-controller-webhook-cert
  - it: wires the S3 rollback flags and creds Secret
    set:
      rollbackStore.backend: s3
      rollbackStore.s3.endpoint: minio:9000
      rollbackStore.s3.bucket: rb
      rollbackStore.s3.existingSecret: rb-creds
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --rollback-store-s3-endpoint=minio:9000
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: rb-creds
  - it: fails when S3 backend is selected without an endpoint
    set:
      rollbackStore.backend: s3
      rollbackStore.s3.bucket: rb
    asserts:
      - failedTemplate:
          errorMessage: rollbackStore.s3.endpoint is required when rollbackStore.backend is "s3"
  - it: fails when S3 backend is selected without a bucket
    set:
      rollbackStore.backend: s3
      rollbackStore.s3.endpoint: minio:9000
    asserts:
      - failedTemplate:
          errorMessage: rollbackStore.s3.bucket is required when rollbackStore.backend is "s3"
  - it: defaults S3 server-side encryption on (SSE-S3)
    set:
      rollbackStore.backend: s3
      rollbackStore.s3.endpoint: minio:9000
      rollbackStore.s3.bucket: rb
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --rollback-store-s3-sse=s3
      # No KMS key flag unless sse=kms with a key set.
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --rollback-store-s3-sse-kms-key=
  - it: wires SSE-KMS with a key ARN
    set:
      rollbackStore.backend: s3
      rollbackStore.s3.endpoint: minio:9000
      rollbackStore.s3.bucket: rb
      rollbackStore.s3.sse: kms
      rollbackStore.s3.sseKmsKeyId: arn:aws:kms:eu-west-1:111:key/abc
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --rollback-store-s3-sse=kms
      - contains:
          path: spec.template.spec.containers[0].args
          content: --rollback-store-s3-sse-kms-key=arn:aws:kms:eu-west-1:111:key/abc

  # ------------------------------------------------------------------
  # Metrics + health bind addresses
  # ------------------------------------------------------------------
  - it: binds metrics on the configured port
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --metrics-bind-address=:8080
  - it: honors a custom metrics port for --metrics-bind-address
    set:
      ports:
        metrics: 9090
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --metrics-bind-address=:9090

  # ------------------------------------------------------------------
  # watchNamespaces
  # ------------------------------------------------------------------
  - it: omits --watch-namespaces when watchNamespaces is empty (cluster-wide)
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --watch-namespaces=
  - it: joins watchNamespaces into a comma-separated --watch-namespaces
    set:
      controller:
        watchNamespaces:
          - team-a
          - team-b
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --watch-namespaces=team-a,team-b

  # ------------------------------------------------------------------
  # allowedActionHosts (repeated --allowed-action-hosts)
  # ------------------------------------------------------------------
  - it: omits --allowed-action-hosts when allowedActionHosts is empty
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --allowed-action-hosts=
  - it: renders one --allowed-action-hosts per entry
    set:
      controller:
        allowedActionHosts:
          - "*.example.com"
          - hooks.internal
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --allowed-action-hosts=*.example.com
      - contains:
          path: spec.template.spec.containers[0].args
          content: --allowed-action-hosts=hooks.internal

  # ------------------------------------------------------------------
  # noCrossNamespaceRefs
  # ------------------------------------------------------------------
  - it: omits --no-cross-namespace-refs by default
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --no-cross-namespace-refs
  - it: adds --no-cross-namespace-refs when enabled
    set:
      controller:
        noCrossNamespaceRefs: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --no-cross-namespace-refs

  # ------------------------------------------------------------------
  # OpenTelemetry tracing — args render only when an endpoint is set
  # ------------------------------------------------------------------
  - it: omits the tracing args when no endpoint is configured (default)
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --tracing-endpoint=
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --tracing-insecure=false
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --tracing-sample-ratio=1
  - it: renders all three tracing args when an endpoint is set
    set:
      controller:
        tracing:
          endpoint: otel-collector.observability.svc:4317
          insecure: true
          sampleRatio: 0.25
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --tracing-endpoint=otel-collector.observability.svc:4317
      - contains:
          path: spec.template.spec.containers[0].args
          content: --tracing-insecure=true
      - contains:
          path: spec.template.spec.containers[0].args
          content: --tracing-sample-ratio=0.25
