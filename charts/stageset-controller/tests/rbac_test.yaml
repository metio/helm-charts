suite: test stageset RBAC
templates:
  - templates/clusterrole.yaml
  - templates/clusterrole-cluster.yaml
  - templates/clusterrolebinding.yaml
  - templates/clusterrolebinding-cluster.yaml
  - templates/clusterrolebinding-cluster-admin.yaml
  - templates/rolebinding-tenants.yaml
  - templates/role-leader-election.yaml
  - templates/serviceaccount.yaml
tests:
  - it: grants token mint, events, stagesets, and externalartifacts
    template: templates/clusterrole.yaml
    asserts:
      # Local-cluster writes mint a TokenRequest token for the tenant SA and
      # authenticate as it — least privilege, no impersonate verb.
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [serviceaccounts/token]
            verbs: [create]
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [events]
            verbs: [create, list, patch]
      - contains:
          path: rules
          content:
            apiGroups: [source.toolkit.fluxcd.io]
            resources: [externalartifacts]
            verbs: [get, list, watch]
  - it: grants pod and event reads for the promotion restart/event gates
    template: templates/clusterrole.yaml
    asserts:
      # Single-tenant StageSets (no spec.serviceAccountName) run the restart/event
      # gates under the controller's own identity, which reads pods and Warning
      # events on the apply-target cluster through an uncached reader — list only,
      # no informer/watch.
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [pods]
            verbs: [list]
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [events]
            verbs: [create, list, patch]
  - it: grants no secret or configmap access at all
    template: templates/clusterrole.yaml
    asserts:
      # Every Secret/ConfigMap the controller reads is one a StageSet named in
      # its own spec (postBuild.substituteFrom, the metric-source bearer token,
      # decryption keys, action secretRefs, spec.kubeConfig), and each is read as
      # that StageSet's serviceAccountName. A grant here would let any StageSet
      # author reach any Secret in their namespace, since they pick the names —
      # and would back the reads with cluster-wide informers. Mirrors
      # config/rbac/role.yaml, which controller-gen renders without this rule.
      - notContains:
          path: rules
          content:
            apiGroups: [""]
            resources: [configmaps, secrets]
            verbs: [get, list, watch]
  - it: grants the serviceaccounts read for object-level KMS tenant credential lookup
    template: templates/clusterrole.yaml
    asserts:
      # --object-level-kms resolves the tenant ServiceAccount through the cached
      # client (fluxcd/pkg/auth), so the read needs list+watch for the informer.
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [serviceaccounts]
            verbs: [get, list, watch]
          count: 1
  - it: grants events.k8s.io writes for the events.v1 EventRecorder
    template: templates/clusterrole.yaml
    asserts:
      # controller-runtime's mgr.GetEventRecorder emits through the events.k8s.io/v1
      # API; RBAC is authorized per request group, so the core-group events rule
      # does not cover these writes.
      - contains:
          path: rules
          content:
            apiGroups: [events.k8s.io]
            resources: [events]
            verbs: [create, patch]
          count: 1
      # The core-group rule stays: the promotion event gate lists corev1 Events.
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [events]
            verbs: [create, list, patch]
          count: 1
  - it: does not grant secret or configmap writes
    template: templates/clusterrole.yaml
    asserts:
      # Reads are refused outright by the test above; these pin that no write
      # shape slips in either. Rendered-manifest writes run as the tenant SA,
      # never through this role.
      - notContains:
          path: rules
          content:
            apiGroups: [""]
            resources: [configmaps, secrets]
            verbs: [create, update, patch, delete]
      - notContains:
          path: rules
          content:
            apiGroups: [""]
            resources: [secrets]
            verbs: ["*"]
  - it: does not grant events.k8s.io reads (the event gate lists core-group events)
    template: templates/clusterrole.yaml
    asserts:
      - notContains:
          path: rules
          content:
            apiGroups: [events.k8s.io]
            resources: [events]
            verbs: [create, list, patch]
  - it: tenant role keeps its grants — and its secret refusal — under a scoped watch
    template: templates/clusterrole.yaml
    set:
      controller.watchNamespaces: [team-a, team-b]
    asserts:
      # The per-namespace RoleBinding pivot binds this same ClusterRole, so the
      # rules must not change shape when the watch is scoped — including the
      # absence of a secrets/configmaps grant.
      - notContains:
          path: rules
          content:
            apiGroups: [""]
            resources: [configmaps, secrets]
            verbs: [get, list, watch]
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: [serviceaccounts]
            verbs: [get, list, watch]
          count: 1
      - contains:
          path: rules
          content:
            apiGroups: [events.k8s.io]
            resources: [events]
            verbs: [create, patch]
          count: 1
  - it: does not grant the impersonate verb (token mint replaces it)
    template: templates/clusterrole.yaml
    asserts:
      - notContains:
          path: rules
          content:
            apiGroups: [""]
            resources: [serviceaccounts]
            verbs: [impersonate]
  - it: does not grant blanket write access (apply is performed as the tenant SA)
    template: templates/clusterrole.yaml
    asserts:
      - notContains:
          path: rules
          content:
            apiGroups: ["*"]
            resources: ["*"]
            verbs: ["*"]
      # The cluster-scoped VWC grant lives in clusterrole-cluster.yaml, not here,
      # so the tenant role stays bindable per-namespace.
      - notContains:
          path: rules
          content:
            apiGroups: [admissionregistration.k8s.io]
            resources: [validatingwebhookconfigurations]
            verbs: [get, update]
  - it: cluster-wide tenant binding is rendered by default
    template: templates/clusterrolebinding.yaml
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: ClusterRoleBinding
      - equal:
          path: roleRef.name
          value: stageset-controller
  - it: tenant binding pivots to per-namespace RoleBindings when scoped
    set:
      controller.watchNamespaces: [team-a, team-b]
    asserts:
      # The cluster-wide tenant ClusterRoleBinding disappears.
      - hasDocuments:
          count: 0
        template: templates/clusterrolebinding.yaml
      # One RoleBinding per watched namespace, each referencing the tenant role.
      - hasDocuments:
          count: 2
        template: templates/rolebinding-tenants.yaml
      - equal:
          path: kind
          value: RoleBinding
        template: templates/rolebinding-tenants.yaml
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: team-a
        template: templates/rolebinding-tenants.yaml
        documentIndex: 0
      - equal:
          path: roleRef.name
          value: stageset-controller
        template: templates/rolebinding-tenants.yaml
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: team-b
        template: templates/rolebinding-tenants.yaml
        documentIndex: 1
  - it: no per-namespace RoleBindings when watch scope is cluster-wide
    template: templates/rolebinding-tenants.yaml
    asserts:
      - hasDocuments:
          count: 0
  - it: cluster-scope VWC role is bound cluster-wide in self-signed mode
    set:
      webhook.certMode: self-signed
    asserts:
      - hasDocuments:
          count: 1
        template: templates/clusterrole-cluster.yaml
      - contains:
          path: rules
          content:
            apiGroups: [admissionregistration.k8s.io]
            resources: [validatingwebhookconfigurations]
            resourceNames:
              - stageset-controller-NAMESPACE
            verbs: [get, update]
        template: templates/clusterrole-cluster.yaml
      - hasDocuments:
          count: 1
        template: templates/clusterrolebinding-cluster.yaml
  - it: cluster-scope VWC role is omitted in cert-manager mode
    set:
      webhook.certMode: cert-manager
    asserts:
      - hasDocuments:
          count: 0
        template: templates/clusterrole-cluster.yaml
      - hasDocuments:
          count: 0
        template: templates/clusterrolebinding-cluster.yaml
  - it: cluster-admin binding is omitted by default
    template: templates/clusterrolebinding-cluster-admin.yaml
    asserts:
      - hasDocuments:
          count: 0
  - it: cluster-admin binding is rendered for single-tenant mode
    template: templates/clusterrolebinding-cluster-admin.yaml
    set:
      rbac.clusterAdmin: true
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: kind
          value: ClusterRoleBinding
      - equal:
          path: roleRef.name
          value: cluster-admin
      - equal:
          path: subjects[0].name
          value: stageset-controller
  - it: renders the leader-election Role only when leader election is on
    template: templates/role-leader-election.yaml
    set:
      controller.leaderElect: false
    asserts:
      - hasDocuments:
          count: 0
  - it: leader-election Role grants leases in the install namespace
    template: templates/role-leader-election.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: kind
          value: Role
      - contains:
          path: rules
          content:
            apiGroups: [coordination.k8s.io]
            resources: [leases]
            verbs: [get, list, watch, create, update, patch, delete]
