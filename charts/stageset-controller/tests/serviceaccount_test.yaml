suite: test stageset ServiceAccount
templates:
  - templates/serviceaccount.yaml
tests:
  - it: has no annotations by default
    asserts:
      - notExists:
          path: metadata.annotations

  - it: carries the IRSA role annotation when set
    set:
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/stageset-controller
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789012:role/stageset-controller
