suite: test stageset NOTES
templates:
  - NOTES.txt
tests:
  - it: warns the controller impersonates the deployer SA and links the tenancy docs
    asserts:
      - matchRegexRaw:
          pattern: it impersonates
      - matchRegexRaw:
          pattern: https://stageset\.projects\.metio\.wtf/usage/multi-cluster/
  - it: mentions the pre-delete cleanup Job when cleanup is enabled
    asserts:
      - matchRegexRaw:
          pattern: pre-delete Job that bulk-deletes the\n?\s*StageSets
  - it: gives manual uninstall steps when cleanup is disabled
    set:
      cleanupOnDelete:
        enabled: false
    asserts:
      - matchRegexRaw:
          pattern: kubectl delete stageset --all
      - matchRegexRaw:
          pattern: strip the finalizers by hand
