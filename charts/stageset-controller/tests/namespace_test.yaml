suite: test stageset namespace
templates:
  - namespace.yaml
tests:
  - it: is empty when namespace.create is false (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: renders the install namespace when enabled
    release:
      namespace: stageset-system
    set:
      namespace:
        create: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Namespace
      - equal:
          path: metadata.name
          value: stageset-system

  - it: stamps the linkerd default-inbound-policy when serviceMesh defaultDeny is on for linkerd
    set:
      namespace:
        create: true
      serviceMesh:
        enabled: true
        engine: linkerd
        defaultDeny:
          enabled: true
    asserts:
      - equal:
          path: metadata.annotations["config.linkerd.io/default-inbound-policy"]
          value: deny

  - it: does not stamp the linkerd annotation for the istio engine
    set:
      namespace:
        create: true
      serviceMesh:
        enabled: true
        engine: istio
        defaultDeny:
          enabled: true
    asserts:
      - notExists:
          path: metadata.annotations["config.linkerd.io/default-inbound-policy"]

  - it: does not stamp the linkerd annotation when defaultDeny is off
    set:
      namespace:
        create: true
      serviceMesh:
        enabled: true
        engine: linkerd
        defaultDeny:
          enabled: false
    asserts:
      - notExists:
          path: metadata.annotations
