# Multi-replica HA: leader election + HPA + PDB + topology spread.
replicas:
  min: 2
  max: 4
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: stageset-controller
        app.kubernetes.io/component: controller
