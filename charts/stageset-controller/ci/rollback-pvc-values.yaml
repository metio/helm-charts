# PVC rollback store. Uses ReadWriteOnce: kind's local-path provisioner rejects
# ReadWriteMany ("NodePath only supports ReadWriteOnce"), and a single-replica ct
# install doesn't need RWX. RWX is only required to share the store across HA
# replicas — that needs an RWX-capable provisioner (NFS/CSI), out of scope here.
rollbackStore:
  backend: pvc
  pvc:
    accessModes:
      - ReadWriteOnce
    size: 2Gi

# CI installs the chart once per values file; the CRDs are provisioned
# out-of-band (see verify.yml) so a kept cluster-scoped CRD owned by one
# release does not block re-adoption by the next.
crds:
  create: false
