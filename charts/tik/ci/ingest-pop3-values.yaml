mode: split

# The board plus a POP3 poller (CronJob).
ingest:
  enabled: true
  protocol: pop3
  schedule: "*/5 * * * *"
  signingKeySecret:
    name: tik-signing-key
  passwordSecret:
    name: tik-mailbox-password
