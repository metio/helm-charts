# The backend supervisor with a scheduled recur pipeline alongside the board.
# Self-contained: no signing key Secret (so recur mints UNSIGNED events and
# succeeds without a pre-created Secret) and no mailbox pipeline. Exercises the
# supervisor + a scheduled pipeline end-to-end in ct install.
backend:
  config: |
    {:pipelines
     [{:id :board :watch true :run ["serve" "--port" "7777"]}
      {:id :weekly :every "PT1H" :run ["recur" "track"]
       :period :iso-week :as "tik-backend"}]}
