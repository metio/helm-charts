# Zero-trust: a kubernetes NetworkPolicy with egress restricted to DNS.
networkPolicy:
  enabled: true
  engine: kubernetes
  http:
    from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: ingress-nginx
  egress:
    enabled: true
    dns: true
