apiVersion: v2
name: jaas
description: Jsonnet-as-a-Service (JaaS) is a webservice that evaluates Jsonnet snippets on the fly.
type: application
home: https://jaas.projects.metio.wtf/
icon: https://jaas.projects.metio.wtf/images/logo.svg
sources:
  - https://github.com/metio/jaas
  - https://github.com/metio/helm-charts
keywords:
  - jsonnet
  - flux
  - gitops
maintainers:
  # name must be the GitHub login — chart-testing's validate-maintainers checks
  # it against the GitHub users API.
  - name: sebhoss
    email: seb@xn--ho-hia.de
    url: https://github.com/sebhoss
annotations:
  artifacthub.io/license: 0BSD
  artifacthub.io/category: integration-delivery
  artifacthub.io/operator: "true"
  artifacthub.io/operatorCapabilities: seamless upgrades
  artifacthub.io/links: |
    - name: support
      url: https://github.com/metio/jaas/issues
    - name: documentation
      url: https://jaas.projects.metio.wtf/
  artifacthub.io/crds: |
    - kind: JsonnetSnippet
      version: v1
      name: jsonnetsnippets.jaas.metio.wtf
      displayName: Jsonnet Snippet
      description: A Jsonnet snippet evaluated and published as a Flux ExternalArtifact.
    - kind: JsonnetLibrary
      version: v1
      name: jsonnetlibraries.jaas.metio.wtf
      displayName: Jsonnet Library
      description: Reusable .libsonnet files referenced by snippets in the same namespace.
  artifacthub.io/recommendations: |
    - url: https://artifacthub.io/packages/helm/stageset-controller/stageset-controller
    - url: https://artifacthub.io/packages/helm/jsonnet-oci-images/joi
  artifacthub.io/crdsExamples: |
    - apiVersion: jaas.metio.wtf/v1
      kind: JsonnetSnippet
      metadata:
        name: api-latency-dashboard
        namespace: default
      spec:
        serviceAccountName: grafana-tenant
        entryFile: main.jsonnet
        files:
          main.jsonnet: |
            local dashboard = import 'grafana/dashboard.libsonnet';
            dashboard.new(std.extVar('title'))
        externalVariables:
          title: API Latency
        libraries:
          - kind: JsonnetLibrary
            name: grafana-helpers
            importPath: grafana
    - apiVersion: jaas.metio.wtf/v1
      kind: JsonnetLibrary
      metadata:
        name: grafana-helpers
        namespace: default
      spec:
        files:
          dashboard.libsonnet: |
            {
              new(title): {
                title: title,
                panels: [],
                schemaVersion: 38,
              },
            }
# version is the chart's own version; the release pipeline rewrites this
# placeholder to a calendar+time value (%Y.%-m.%-d+%H%M%S) at package time.
version: 0.0.0
# appVersion is the metio/jaas image this chart deploys; Renovate bumps it (and
# .github/workflows/bump.yml re-vendors the matching CRDs). image.tag defaults
# to this value. Tracked via the source repo's GitHub releases (not the ghcr
# image) so the bump only fires once the release/tag exists — see renovate.json.
# renovate: datasource=github-releases depName=metio/jaas
appVersion: "2026.6.22194633"
# CRD source image for hack/vendor-crds.sh — the bump.yml re-vendor and the
# verify.yml CRD-sync gate both read this marker to learn which image's CRDs to
# vendor at the appVersion above. Renovate does not act on it (no customManager
# matches `image=`); it is a plain marker for those scripts.
# renovate: image=ghcr.io/metio/jaas
