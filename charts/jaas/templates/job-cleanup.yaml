{{- if and .Values.operator.enabled .Values.operator.cleanupOnDelete.enabled -}}
# pre-delete hook: bulk-delete every JsonnetSnippet so the operator's
# finalizer runs (drops the ExternalArtifact CR, removes the tarball
# from storage) BEFORE Helm removes the operator itself. Otherwise the
# operator goes away first, its finalizer never runs, and downstream
# Flux consumers are left referencing orphaned ExternalArtifacts.
#
# Lives as a pre-delete hook so the operator pod is still alive when
# the snippets get deleted. The RBAC objects carry hook-weight -10 so
# they are created before the Job (weight 0) that consumes them; lower
# weights run first within the pre-delete batch.
#
# If the operator is already unreachable when uninstall runs, the
# kubectl delete waits out --timeout and the Job fails. A failed
# pre-delete hook blocks the uninstall, so the snippets keep their
# finalizers. Recover by stripping them, then re-run `helm uninstall`
# (the same procedure is printed in the chart NOTES):
#
#   kubectl get jsonnetsnippet --all-namespaces -o name | xargs -I{} \
#     kubectl patch {} --type=merge -p '{"metadata":{"finalizers":[]}}'
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-cleanup
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: cleanup
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
{{- if .Values.operator.watchNamespaces }}
{{- /* Watch-scoped install: grant + delete only in the watched namespaces, via a
       Role + RoleBinding per namespace. A cluster-wide grant here would let an
       uninstall of one scoped instance delete EVERY tenant's JsonnetSnippets and
       fire their finalizers — dropping other tenants' ExternalArtifacts and
       their published tarballs. */ -}}
{{- range $ns := .Values.operator.watchNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $.Release.Name }}-cleanup
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: {{ $.Chart.Name }}
    app.kubernetes.io/component: cleanup
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/part-of: {{ $.Chart.Name }}
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
    helm.sh/chart: {{ $.Chart.Name }}-{{ $.Chart.Version | replace "+" "_" }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
  - apiGroups:
      - jaas.metio.wtf
    resources:
      - jsonnetsnippets
    verbs:
      - get
      - list
      - delete
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $.Release.Name }}-cleanup
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: {{ $.Chart.Name }}
    app.kubernetes.io/component: cleanup
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/part-of: {{ $.Chart.Name }}
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
    helm.sh/chart: {{ $.Chart.Name }}-{{ $.Chart.Version | replace "+" "_" }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: {{ $.Release.Name }}-cleanup
    namespace: {{ $.Release.Namespace }}
roleRef:
  kind: Role
  name: {{ $.Release.Name }}-cleanup
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- else }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-cleanup
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: cleanup
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
  - apiGroups:
      - jaas.metio.wtf
    resources:
      - jsonnetsnippets
    verbs:
      - get
      - list
      - delete
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-cleanup
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: cleanup
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-cleanup
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Release.Name }}-cleanup
  apiGroup: rbac.authorization.k8s.io
{{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-cleanup
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: cleanup
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    # kube-score ignores:
    #   container-image-pull-policy — kubectl image is tagged; IfNotPresent
    #     avoids a registry round-trip on every uninstall.
    #   pod-networkpolicy — the cleanup Job runs briefly during uninstall
    #     and the chart's NetworkPolicy doesn't (and shouldn't) target it.
    kube-score/ignore: container-image-pull-policy,pod-networkpolicy
spec:
  backoffLimit: {{ .Values.operator.cleanupOnDelete.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.operator.cleanupOnDelete.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/component: cleanup
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: {{ .Chart.Name }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ .Release.Name }}-cleanup
      # Pod-level securityContext for PSS restricted compliance —
      # mirrors the container-level fields so admission controllers
      # validate the pod outright instead of recursing into the
      # container set.
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
          {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        # Writable cache for kubectl's discovery client. The container's root
        # filesystem is read-only, so without this kubectl cannot write
        # ~/.kube/cache and the run errors instead of cleaning up.
        - name: cache
          emptyDir: {}
      # registry.k8s.io/kubectl is distroless (no /bin/sh), so each container runs
      # exactly one kubectl invocation. --wait lets the operator's finalizer drop
      # each ExternalArtifact + tarball before Helm removes the operator;
      # --ignore-not-found makes the no-snippet case (and any re-run) a clean
      # no-op. If the operator is already unreachable the delete times out and the
      # Job fails — recover by stripping finalizers as documented in the chart
      # NOTES. A watch-scoped install runs one --namespace container per watched
      # namespace; a cluster-wide install uses a single --all-namespaces container.
      containers:
        {{- if .Values.operator.watchNamespaces }}
        {{- range $i, $ns := .Values.operator.watchNamespaces }}
        {{- include "jaas.cleanupContainer" (dict "root" $ "name" (printf "cleanup-%s" $ns | trunc 63 | trimSuffix "-") "scopeArg" (printf "--namespace=%s" $ns) "cacheDir" (printf "/tmp/kubecache-%d" $i)) | nindent 8 }}
        {{- end }}
        {{- else }}
        {{- include "jaas.cleanupContainer" (dict "root" . "name" "cleanup" "scopeArg" "--all-namespaces" "cacheDir" "/tmp/kubecache") | nindent 8 }}
        {{- end }}
{{- end }}
