{{- if and .Values.networkPolicy.enabled (eq .Values.networkPolicy.engine "clusterNetworkPolicy") }}
# Network Policy API (policy.networking.k8s.io/v1alpha2) equivalent of the vanilla
# NetworkPolicy. ClusterNetworkPolicy is cluster-scoped, so the subject pins the
# jaas pods via namespace + pod selectors. The Baseline tier yields to any
# developer NetworkPolicy. Ingress accepts the jsonnet HTTP and management ports
# always, plus the operator-gated storage, webhook, and metrics ports, from any
# peer. Tighten with native passthrough lists in
# networkPolicy.clusterNetworkPolicy.*.
apiVersion: policy.networking.k8s.io/v1alpha2
kind: ClusterNetworkPolicy
metadata:
  name: jaas-{{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: jaas
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
spec:
  tier: Baseline
  priority: {{ .Values.networkPolicy.clusterNetworkPolicy.priority }}
  subject:
    pods:
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Release.Namespace }}
      podSelector:
        matchLabels:
          app.kubernetes.io/name: {{ .Chart.Name }}
          app.kubernetes.io/component: jaas
          app.kubernetes.io/instance: {{ .Release.Name }}
          app.kubernetes.io/part-of: {{ .Chart.Name }}
  ingress:
    # Jsonnet HTTP endpoint — reachable from anywhere by default.
    - name: http
      action: Accept
      from:
        - namespaces: {}
      protocols:
        - tcp:
            destinationPort:
              number: {{ .Values.ports.http }}
    # Management probes — kubelet sources from the node IP.
    - name: management
      action: Accept
      from:
        - namespaces: {}
      protocols:
        - tcp:
            destinationPort:
              number: {{ .Values.ports.management }}
    {{- if .Values.operator.enabled }}
    # Storage HTTP server — serves published ExternalArtifact tarballs to Flux.
    - name: storage
      action: Accept
      from:
        - namespaces: {}
      protocols:
        - tcp:
            destinationPort:
              number: {{ .Values.ports.storage }}
    {{- end }}
    {{- if and .Values.operator.enabled .Values.operator.webhook.enabled }}
    # Validating webhook — kube-apiserver dials this.
    - name: webhook
      action: Accept
      from:
        - namespaces: {}
      protocols:
        - tcp:
            destinationPort:
              number: {{ .Values.ports.webhook }}
    {{- end }}
    {{- if and .Values.operator.enabled .Values.operator.metrics.enabled }}
    # Metrics endpoint — Prometheus scrapes the controller-runtime metrics here.
    - name: metrics
      action: Accept
      from:
        - namespaces: {}
      protocols:
        - tcp:
            destinationPort:
              number: {{ .Values.ports.metrics }}
    {{- end }}
    {{- with .Values.networkPolicy.clusterNetworkPolicy.ingress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- if .Values.networkPolicy.egress.enabled }}
  egress:
    {{- if .Values.networkPolicy.egress.dns }}
    # Cluster DNS — UDP and TCP 53 to the DNS namespace. Without this an egress
    # policy denies name resolution, breaking every outbound connection.
    - name: dns
      action: Accept
      to:
        - namespaces:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.egress.dnsNamespace }}
      protocols:
        - udp:
            destinationPort:
              number: 53
        - tcp:
            destinationPort:
              number: 53
    {{- end }}
    {{- with .Values.networkPolicy.clusterNetworkPolicy.egress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
