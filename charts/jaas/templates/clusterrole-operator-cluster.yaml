{{- if and .Values.operator.enabled .Values.operator.rbac.create -}}
# Cluster-scope verbs the operator needs regardless of how its tenant
# watches are scoped. Both `customresourcedefinitions` and (when
# self-signed webhook mode is enabled) `validatingwebhookconfigurations`
# are cluster-scoped — they cannot be granted via a RoleBinding, so
# they live here and bind via a single ClusterRoleBinding.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-operator-cluster
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: operator
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
rules:
  # CRD watch — the operator subscribes to the apiserver's CRD stream
  # to engage Flux source-controller watches dynamically (no pod
  # restart on late-installed CRDs).
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
      - list
      - watch
  {{- if and .Values.operator.webhook.enabled (eq .Values.operator.webhook.certMode "self-signed") }}
  # Self-signed webhook mode: operator generates its own CA + serving
  # cert at boot and stamps its own ValidatingWebhookConfiguration's
  # caBundle (via an optimistic-concurrency Update) so the apiserver
  # trusts the TLS handshake. Scoped to the named VWC so the operator
  # can only edit its own admission config.
  - apiGroups:
      - admissionregistration.k8s.io
    resources:
      - validatingwebhookconfigurations
    resourceNames:
      - {{ .Release.Name }}-jsonnetsnippet
    verbs:
      - get
      - update
  {{- end }}
{{- end }}
