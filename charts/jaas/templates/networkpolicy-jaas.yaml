{{- if and .Values.networkPolicy.enabled (or (not .Values.networkPolicy.engine) (eq .Values.networkPolicy.engine "kubernetes")) -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jaas
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: jaas
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/component: jaas
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/part-of: {{ .Chart.Name }}
  policyTypes:
    - Ingress
    {{- if .Values.networkPolicy.egress.enabled }}
    - Egress
    {{- end }}
  ingress:
    # Jsonnet HTTP endpoint — reachable from anywhere by default. Overridable
    # via .Values.networkPolicy.http.from for tighter scopes.
    - ports:
        - protocol: TCP
          port: {{ .Values.ports.http }}
      {{- with .Values.networkPolicy.http.from }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    # Management probes — kubelet sources from the node IP, which cannot
    # be expressed as a podSelector. Leaving this open is the only way the
    # readiness/liveness probes succeed; the management server itself only
    # exposes /start, /ready, /live.
    - ports:
        - protocol: TCP
          port: {{ .Values.ports.management }}
      {{- with .Values.networkPolicy.management.from }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- if .Values.operator.enabled }}
    # Storage HTTP server — serves the published ExternalArtifact tarballs to
    # the Flux controllers that dereference them (kustomize-controller,
    # helm-controller, and any custom consumer such as stageset-controller).
    # Default scope is flux-system; override .Values.networkPolicy.storage.from
    # to add other consumer namespaces.
    - ports:
        - protocol: TCP
          port: {{ .Values.ports.storage }}
      from:
        {{- toYaml .Values.networkPolicy.storage.from | nindent 8 }}
    {{- end }}
    {{- if and .Values.operator.enabled .Values.operator.webhook.enabled }}
    # Validating webhook — kube-apiserver dials this. The apiserver source
    # cannot be expressed as a podSelector either; webhook TLS + the CA
    # bundle on the ValidatingWebhookConfiguration enforce authenticity.
    - ports:
        - protocol: TCP
          port: {{ .Values.ports.webhook }}
      {{- with .Values.networkPolicy.webhook.from }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
    {{- if and .Values.operator.enabled .Values.operator.metrics.enabled }}
    # Metrics endpoint — Prometheus scrapes the controller-runtime metrics
    # server here. Default scope is open (any pod); restrict it to the
    # monitoring namespace via .Values.networkPolicy.metrics.from.
    - ports:
        - protocol: TCP
          port: {{ .Values.ports.metrics }}
      {{- with .Values.networkPolicy.metrics.from }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
    {{- if and .Values.operator.enabled .Values.operator.mcp.enabled }}
    # MCP server — read-only operator introspection over streamable-HTTP.
    # Default scope is open (any pod); restrict it via
    # .Values.networkPolicy.mcp.from.
    - ports:
        - protocol: TCP
          port: {{ .Values.ports.mcp }}
      {{- with .Values.networkPolicy.mcp.from }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
    {{- with .Values.networkPolicy.additionalIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- if .Values.networkPolicy.egress.enabled }}
  egress:
    {{- if .Values.networkPolicy.egress.dns }}
    # Cluster DNS — UDP and TCP 53 to the DNS namespace. Without this rule an
    # Egress policy denies name resolution, breaking every outbound connection.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.egress.dnsNamespace }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    {{- with .Values.networkPolicy.egress.to }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
