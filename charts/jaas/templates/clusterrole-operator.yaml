{{- if and .Values.operator.enabled .Values.operator.rbac.create -}}
# Tenant-scope verbs: every API the reconciler touches against a
# namespaced resource. Kept as a ClusterRole — NOT a Role — so the
# same role definition can be bound either cluster-wide (single
# ClusterRoleBinding) or per-namespace (one RoleBinding per watched
# namespace), depending on operator.watchNamespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-operator-tenants
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: operator
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
rules:
  # The operator reconciles its own CRDs.
  - apiGroups:
      - jaas.metio.wtf
    resources:
      - jsonnetsnippets
      - jsonnetlibraries
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  - apiGroups:
      - jaas.metio.wtf
    resources:
      - jsonnetsnippets/status
      - jsonnetlibraries/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - jaas.metio.wtf
    resources:
      - jsonnetsnippets/finalizers
      - jsonnetlibraries/finalizers
    verbs:
      - update
  # ExternalArtifact is the publish target.
  - apiGroups:
      - source.toolkit.fluxcd.io
    resources:
      - externalartifacts
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - source.toolkit.fluxcd.io
    resources:
      - externalartifacts/status
    verbs:
      - get
      - update
      - patch
  # SourceRef reads for the upcoming sourceRef pipeline.
  - apiGroups:
      - source.toolkit.fluxcd.io
    resources:
      - gitrepositories
      - ocirepositories
      - buckets
    verbs:
      - get
      - list
      - watch
  # Per-snippet impersonation via TokenRequest: the reconciler mints a
  # short-lived bearer token for the tenant's ServiceAccount and stamps it
  # on a clone of the manager's rest config. No `impersonate` verb is
  # needed — the operator SA simply mints tokens for SAs the snippet names.
  - apiGroups:
      - ""
    resources:
      - serviceaccounts
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - serviceaccounts/token
    verbs:
      - create
  # Event emission. The reconciler fires Normal/Warning events on
  # every Ready-condition transition so Flux notification-controller
  # (or any Event-sourced alerter) can route via Alert CRs.
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  - apiGroups:
      - events.k8s.io
    resources:
      - events
    verbs:
      - create
      - patch
{{- end }}
