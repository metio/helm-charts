{{- /* Render whenever more than one replica can run — either the HPA can
       scale above one (max > min) OR a fixed count is pinned above one
       (min > 1). Gating strictly on `max > min` would skip the PDB for a
       fixed two-replica install (min == max == 2), letting a node drain evict
       both at once. Mirrors validate-modes' multiReplica expression. */ -}}
{{- if or (gt (.Values.replicas.max | int) 1) (gt (.Values.replicas.min | int) 1) }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: jaas
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: jaas
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
spec:
  {{- with .Values.pdb.unhealthyPodEvictionPolicy }}
  unhealthyPodEvictionPolicy: {{ . }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/component: jaas
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/part-of: {{ .Chart.Name }}
  {{- /* Render whichever knob the operator set; setting both is a
         config error K8s itself rejects. `nil` (the YAML `null`
         value) is recognised by `if`/`hasKey` even on the deep
         path, so a clean override of either side picks up. */ -}}
  {{- if and (kindIs "invalid" .Values.pdb.maxUnavailable) (kindIs "invalid" .Values.pdb.minAvailable) }}
  maxUnavailable: 1
  {{- else if not (kindIs "invalid" .Values.pdb.maxUnavailable) }}
  maxUnavailable: {{ .Values.pdb.maxUnavailable }}
  {{- else }}
  minAvailable: {{ .Values.pdb.minAvailable }}
  {{- end }}
{{- end }}
