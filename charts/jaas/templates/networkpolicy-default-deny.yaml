{{- if and .Values.networkPolicy.enabled .Values.networkPolicy.defaultDeny.enabled }}
{{- $engine := .Values.networkPolicy.engine | default "kubernetes" }}
# Namespace-wide default-deny. Every pod in the install namespace is denied by
# default, so the per-workload allowlists above become the only exceptions
# (zero-trust namespace). Rendered in the selected engine's dialect at a lower
# precedence than the jaas allowlist, so the allowlist's accepts still win for
# the jaas pods while everything else is denied. Enable only when jaas owns its
# namespace — this also denies any co-located workload.
{{- if eq $engine "kubernetes" }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jaas-default-deny
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: jaas
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
spec:
  # Empty podSelector selects every pod in the namespace. With no ingress/egress
  # rules and both policy types declared, all traffic that no other policy admits
  # is denied.
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
{{- else if eq $engine "cilium" }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: jaas-default-deny
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: jaas
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
spec:
  # Empty endpointSelector selects every endpoint in the namespace. The presence
  # of an ingress (resp. egress) section switches that direction into default
  # deny-mode; empty sections (no rule entries) admit nothing, so all traffic the
  # additive jaas policy does not re-admit is denied. An empty rule ENTRY (- {})
  # would instead match all peers and allow everything, so the sections are kept
  # empty deliberately.
  endpointSelector: {}
  ingress: []
  egress: []
{{- else if eq $engine "calico" }}
apiVersion: projectcalico.org/v3
kind: NetworkPolicy
metadata:
  name: jaas-default-deny
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: jaas
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
spec:
  # all() selects every workload endpoint in the namespace. A high order keeps
  # this policy at lower precedence than the jaas allowlist (which carries no
  # order and therefore sorts first); with no rules and both types declared, it
  # denies whatever the allowlist did not admit.
  selector: all()
  order: {{ .Values.networkPolicy.defaultDeny.order }}
  types:
    - Ingress
    - Egress
{{- else if eq $engine "clusterNetworkPolicy" }}
apiVersion: policy.networking.k8s.io/v1alpha2
kind: ClusterNetworkPolicy
metadata:
  name: jaas-default-deny-{{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: jaas
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
spec:
  tier: Baseline
  # Lower priority numbers win. defaultDeny.order (2000) sits above the allowlist
  # priority (clusterNetworkPolicy.priority, 1000), so this catch-all stays
  # subordinate to the jaas Accept rules while denying everything else.
  priority: {{ .Values.networkPolicy.defaultDeny.order }}
  subject:
    namespaces:
      matchLabels:
        kubernetes.io/metadata.name: {{ .Release.Namespace }}
  ingress:
    - name: deny-all
      action: Deny
      from:
        - namespaces: {}
  egress:
    - name: deny-all
      action: Deny
      to:
        - namespaces: {}
{{- end }}
{{- end }}
