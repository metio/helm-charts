{{- if and .Values.operator.enabled .Values.operator.rbac.create -}}
{{- if .Values.operator.watchNamespaces }}
# Per-namespace tenant bindings. Renders one RoleBinding per entry in
# operator.watchNamespaces, each granting the operator SA the
# tenant-scope verbs (defined in clusterrole-operator.yaml) ONLY within
# that namespace. The cache-scoping in the binary ensures the
# operator never observes resources outside this list; this RBAC is
# defense-in-depth so the apiserver also refuses out-of-scope calls.
{{- range $i, $ns := .Values.operator.watchNamespaces }}
{{- if $i }}
---
{{- end }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $.Release.Name }}-operator-tenants
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: {{ $.Chart.Name }}
    app.kubernetes.io/component: operator
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/version: {{ $.Chart.AppVersion | quote }}
    app.kubernetes.io/part-of: {{ $.Chart.Name }}
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
    helm.sh/chart: {{ $.Chart.Name }}-{{ $.Chart.Version | replace "+" "_" }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $.Release.Name }}-operator-tenants
subjects:
  - kind: ServiceAccount
    name: {{ $.Values.operator.serviceAccount.name }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
{{- end }}
