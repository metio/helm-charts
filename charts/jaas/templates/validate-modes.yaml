{{- /*
SPDX-FileCopyrightText: The helm-charts Authors
SPDX-License-Identifier: 0BSD

The static `snippets` OCI mount and Flux integration (`operator.enabled`) are
mutually exclusive. `snippets` pre-bakes rendered units into the standalone HTTP
renderer; in Flux/operator mode the published units come from JsonnetSnippet CRs
instead, so two snippet sources in one release is a configuration mistake and is
rejected at render time rather than silently half-applied.

OCI library mounts (`additionalLibraries` and the well-known `libraries`) are NOT
mutually exclusive with the operator: it folds them into its --library-path
search additively after any JsonnetLibrary CR refs, and rejects an import-path
collision at admission. They are the supported way to ship shared libraries
(e.g. grafonnet) cluster-wide to the operator without a CR per tenant.
*/ -}}
{{- if and .Values.operator.enabled (not (empty .Values.snippets)) -}}
{{- fail "operator.enabled (Flux integration) is mutually exclusive with the static `snippets` OCI mount: in Flux mode the published units come from JsonnetSnippet CRs. Either clear `snippets`, or set operator.enabled=false (standalone renderer). OCI library mounts (`additionalLibraries`, `libraries`) are allowed in both modes." -}}
{{- end -}}

{{- /* Multi-replica jaas with a local artifact backend is a silent 404 trap.
       Only the leader writes tarballs, but the storage Service load-balances
       reads across every replica, so a downstream Flux consumer that hits a
       non-leader pod 404s on ExternalArtifact.status.artifact.url. A local
       backend is single-writer: an emptyDir is per-pod, and an RWO PVC attaches
       to one pod only. Multi-replica HA needs either the S3 backend (every
       replica reads the same bucket) or an RWX PVC (every replica mounts the
       same volume). Anything else is rejected at render time. */ -}}
{{- $multiReplica := or (gt (.Values.replicas.max | int) 1) (gt (.Values.replicas.min | int) 1) -}}
{{- if and .Values.operator.enabled $multiReplica (eq .Values.operator.storage.backend "local") -}}
{{- $persistence := .Values.operator.storage.persistence -}}
{{- $rwx := false -}}
{{- if $persistence.enabled -}}
{{- range $persistence.accessModes -}}
{{- if eq . "ReadWriteMany" -}}
{{- $rwx = true -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- if not $rwx -}}
{{- fail "operator.enabled with more than one replica and operator.storage.backend=local serves stale 404s from non-leader pods — only the leader writes tarballs while the storage Service reads from every replica. Use operator.storage.backend=s3 (every replica reads the same bucket), or set operator.storage.persistence.enabled=true with an accessMode of ReadWriteMany (RWX) so every replica mounts the same volume." -}}
{{- end -}}
{{- end -}}

{{- /* Scaling the operator with leader election off double-reconciles every
       JsonnetSnippet: each replica runs the reconciler independently, so two
       pods render and publish the same snippet at once, racing the
       ExternalArtifact write. Leader election MUST stay on whenever the
       Deployment can run more than one replica. */ -}}
{{- $scaling := or (gt (.Values.replicas.max | int) (.Values.replicas.min | int)) (gt (.Values.replicas.min | int) 1) -}}
{{- if and .Values.operator.enabled $scaling (not .Values.operator.leaderElection.enabled) -}}
{{- fail "operator.enabled with scaling (replicas.max > replicas.min, or replicas.min > 1) requires operator.leaderElection.enabled=true. Without leader election every replica reconciles every JsonnetSnippet independently, double-rendering and racing the ExternalArtifact write. Keep leader election on, or pin replicas.min=replicas.max=1." -}}
{{- end -}}

{{- /* Egress on in operator mode with no egress.to allow-list silently wedges
       the operator. An Egress policy denies everything not allowed, and the
       built-in rule only opens cluster DNS — but the operator MUST also reach
       the kube-apiserver (informers, status writes, TokenRequest), and usually
       source-controller and S3. With egress.to empty those are all denied and
       the cache never syncs, so the operator never goes ready. Block it at
       render time: the operator deployment can't recover from this at runtime.
       The apiserver isn't label-selectable, so the allow must be an ipBlock. */ -}}
{{- if and .Values.operator.enabled .Values.networkPolicy.enabled .Values.networkPolicy.egress.enabled (empty .Values.networkPolicy.egress.to) -}}
{{- fail "operator.enabled with networkPolicy.egress.enabled but an empty networkPolicy.egress.to denies the operator's egress to the kube-apiserver (and source-controller / S3), so its cache never syncs and it never becomes ready — only cluster DNS is auto-allowed. Populate networkPolicy.egress.to with the kube-apiserver (an ipBlock CIDR — it can't be selected by label), the flux-system namespace, and any S3/OTLP endpoints; or set networkPolicy.egress.enabled=false." -}}
{{- end -}}

{{- /* terminationGracePeriodSeconds is derived from arguments.shutdownDelay by
       stripping the trailing "s" — so a value that isn't a whole number of
       seconds ("500ms", "1m30s", "2m") parses to 0 and silently collapses the
       grace period to the 65s floor instead of shutdownDelay + 65, cutting the
       drain short. Reject anything but an integer-seconds form at render time. */ -}}
{{- if not (regexMatch "^[0-9]+s$" .Values.arguments.shutdownDelay) -}}
{{- fail (printf "arguments.shutdownDelay must be a whole number of seconds like \"5s\" or \"30s\" (got %q): the Deployment derives terminationGracePeriodSeconds from it by stripping the trailing \"s\", and a sub-second or minute form would silently collapse the grace period to the 65s floor." .Values.arguments.shutdownDelay) -}}
{{- end -}}
