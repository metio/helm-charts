{{- if and .Values.serviceMesh.enabled (eq .Values.serviceMesh.engine "istio") .Values.serviceMesh.mtls -}}
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: jaas
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: jaas
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/component: jaas
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/part-of: {{ .Chart.Name }}
  {{- if eq .Values.serviceMesh.mtls "strict" }}
  mtls:
    mode: STRICT
  # Port-level carve-out. STRICT would reject the plaintext / non-mesh
  # connections the kube-apiserver (webhook) and kubelet (management/probe) open,
  # since neither presents a mesh client cert. PERMISSIVE on exactly those ports
  # keeps them reachable while every other port stays mTLS-only. portLevelMtls
  # keys are workload (container) ports, not Service ports.
  portLevelMtls:
    {{ .Values.ports.management | int }}:
      mode: PERMISSIVE
    {{- if and .Values.operator.enabled .Values.operator.webhook.enabled }}
    {{ .Values.ports.webhook | int }}:
      mode: PERMISSIVE
    {{- end }}
  {{- else }}
  mtls:
    mode: PERMISSIVE
  {{- end }}
{{- end }}
