suite: test jaas ClusterNetworkPolicy
templates:
  - clusternetworkpolicy.yaml
tests:
  - it: is empty by default
    asserts:
      - hasDocuments:
          count: 0

  - it: is empty for the default kubernetes engine even when enabled
    set:
      networkPolicy:
        enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a ClusterNetworkPolicy for the clusterNetworkPolicy engine
    set:
      networkPolicy:
        enabled: true
        engine: clusterNetworkPolicy
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ClusterNetworkPolicy
      - equal:
          path: apiVersion
          value: policy.networking.k8s.io/v1alpha2

  - it: is cluster-scoped (no namespace in metadata)
    set:
      networkPolicy:
        enabled: true
        engine: clusterNetworkPolicy
    asserts:
      - notExists:
          path: metadata.namespace

  - it: pins the Baseline tier and the configured priority
    set:
      networkPolicy:
        enabled: true
        engine: clusterNetworkPolicy
        clusterNetworkPolicy:
          priority: 1500
    asserts:
      - equal:
          path: spec.tier
          value: Baseline
      - equal:
          path: spec.priority
          value: 1500

  - it: scopes the subject to the jaas pods
    set:
      networkPolicy:
        enabled: true
        engine: clusterNetworkPolicy
    release:
      namespace: jaas-system
    asserts:
      - equal:
          path: spec.subject.pods.namespaceSelector.matchLabels["kubernetes.io/metadata.name"]
          value: jaas-system
      - equal:
          path: spec.subject.pods.podSelector.matchLabels["app.kubernetes.io/name"]
          value: jaas

  - it: names the policy after the chart and namespace
    set:
      networkPolicy:
        enabled: true
        engine: clusterNetworkPolicy
    release:
      namespace: jaas-system
    asserts:
      - equal:
          path: metadata.name
          value: jaas-jaas-system

  - it: accepts the http and management ports from any peer
    set:
      networkPolicy:
        enabled: true
        engine: clusterNetworkPolicy
    asserts:
      - contains:
          path: spec.ingress
          content:
            name: http
            action: Accept
            from:
              - namespaces: {}
            protocols:
              - tcp:
                  destinationPort:
                    number: 8080
      - contains:
          path: spec.ingress
          content:
            name: management
            action: Accept
            from:
              - namespaces: {}
            protocols:
              - tcp:
                  destinationPort:
                    number: 8081

  - it: omits the storage port when operator is disabled
    set:
      networkPolicy:
        enabled: true
        engine: clusterNetworkPolicy
    asserts:
      - notContains:
          path: spec.ingress
          content:
            name: storage

  - it: accepts the storage port when operator is enabled
    set:
      networkPolicy:
        enabled: true
        engine: clusterNetworkPolicy
      operator:
        enabled: true
    asserts:
      - contains:
          path: spec.ingress
          content:
            name: storage
            action: Accept
            from:
              - namespaces: {}
            protocols:
              - tcp:
                  destinationPort:
                    number: 8082

  - it: includes the webhook port only when operator and webhook are enabled
    set:
      networkPolicy:
        enabled: true
        engine: clusterNetworkPolicy
      operator:
        enabled: true
        webhook:
          enabled: true
          certManager:
            issuerRef:
              name: jaas-ca
    asserts:
      - contains:
          path: spec.ingress
          content:
            name: webhook
            action: Accept
            from:
              - namespaces: {}
            protocols:
              - tcp:
                  destinationPort:
                    number: 9443

  - it: omits the webhook port when the webhook is disabled
    set:
      networkPolicy:
        enabled: true
        engine: clusterNetworkPolicy
      operator:
        enabled: true
    asserts:
      - notContains:
          path: spec.ingress
          content:
            name: webhook

  - it: includes the metrics port when operator and metrics are enabled
    set:
      networkPolicy:
        enabled: true
        engine: clusterNetworkPolicy
      operator:
        enabled: true
        metrics:
          enabled: true
    asserts:
      - contains:
          path: spec.ingress
          content:
            name: metrics
            action: Accept
            from:
              - namespaces: {}
            protocols:
              - tcp:
                  destinationPort:
                    number: 8083

  - it: has no egress by default
    set:
      networkPolicy:
        enabled: true
        engine: clusterNetworkPolicy
    asserts:
      - notExists:
          path: spec.egress

  - it: adds a DNS Accept egress rule when egress is enabled
    set:
      networkPolicy:
        enabled: true
        engine: clusterNetworkPolicy
        egress:
          enabled: true
    asserts:
      - contains:
          path: spec.egress
          content:
            name: dns
            action: Accept
            to:
              - namespaces:
                  matchLabels:
                    kubernetes.io/metadata.name: kube-system
            protocols:
              - udp:
                  destinationPort:
                    number: 53
              - tcp:
                  destinationPort:
                    number: 53

  - it: merges native ingress and egress passthrough lists
    set:
      networkPolicy:
        enabled: true
        engine: clusterNetworkPolicy
        egress:
          enabled: true
        clusterNetworkPolicy:
          ingress:
            - name: extra
              action: Accept
              from:
                - namespaces:
                    matchLabels:
                      kubernetes.io/metadata.name: monitoring
          egress:
            - name: apiserver
              action: Accept
              to:
                - networks:
                    - 10.0.0.0/8
    asserts:
      - contains:
          path: spec.ingress
          content:
            name: extra
            action: Accept
            from:
              - namespaces:
                  matchLabels:
                    kubernetes.io/metadata.name: monitoring
      - contains:
          path: spec.egress
          content:
            name: apiserver
            action: Accept
            to:
              - networks:
                  - 10.0.0.0/8
