suite: test jaas deployment
templates:
  - deployment-jaas.yaml
tests:
  # ------------------------------------------------------------------
  # Snapshots — large structural assertions kept from the original suite.
  # ------------------------------------------------------------------
  - it: matches its volumes snapshot
    documentSelector:
      path: metadata.name
      value: jaas
    asserts:
      - isKind:
          of: Deployment
      - matchSnapshot:
          path: spec.template.spec.volumes
  - it: matches its volume mounts snapshot
    documentSelector:
      path: metadata.name
      value: jaas
      skipEmptyTemplates: true
    asserts:
      - isKind:
          of: Deployment
      - matchSnapshot:
          path: spec.template.spec.containers[0].volumeMounts
  - it: matches its security context snapshot
    documentSelector:
      path: metadata.name
      value: jaas
      skipEmptyTemplates: true
    asserts:
      - isKind:
          of: Deployment
      - matchSnapshot:
          path: spec.template.spec.containers[0].securityContext
  - it: matches its arguments snapshot
    documentSelector:
      path: metadata.name
      value: jaas
      skipEmptyTemplates: true
    asserts:
      - isKind:
          of: Deployment
      - matchSnapshot:
          path: spec.template.spec.containers[0].args
  - it: supports private pull secrets
    set:
      imagePullSecrets:
        - name: something
    documentSelector:
      path: metadata.name
      value: jaas
      skipEmptyTemplates: true
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: something
  - it: supports additional env variables
    set:
      externalVariables:
        some: value
        other: thing
    documentSelector:
      path: metadata.name
      value: jaas
      skipEmptyTemplates: true
    asserts:
      - isKind:
          of: Deployment
      - matchSnapshot:
          path: spec.template.spec.containers[0].env
  - it: supports loading env variables from config maps and secrets
    set:
      externalVariablesFrom:
        configMaps:
          - some-config-map
        secrets:
          - some-secret
    documentSelector:
      path: metadata.name
      value: jaas
      skipEmptyTemplates: true
    asserts:
      - isKind:
          of: Deployment
      - matchSnapshot:
          path: spec.template.spec.containers[0].envFrom

  # ------------------------------------------------------------------
  # Metadata & top-level spec
  # ------------------------------------------------------------------
  - it: is named jaas
    asserts:
      - equal:
          path: metadata.name
          value: jaas
  - it: lives in the release namespace
    release:
      namespace: my-ns
    asserts:
      - equal:
          path: metadata.namespace
          value: my-ns
  - it: carries the standard Kubernetes app labels
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: jaas
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: jaas
      - equal:
          path: metadata.labels["app.kubernetes.io/part-of"]
          value: jaas
      - exists:
          path: metadata.labels["app.kubernetes.io/managed-by"]
      - exists:
          path: metadata.labels["app.kubernetes.io/version"]
      - exists:
          path: metadata.labels["helm.sh/chart"]
  - it: merges deployment.additionalLabels into the deployment metadata
    set:
      deployment:
        additionalLabels:
          team: platform
          tier: prod
    asserts:
      - equal:
          path: metadata.labels.team
          value: platform
      - equal:
          path: metadata.labels.tier
          value: prod
  - it: respects deployment.revisionHistoryLimit
    set:
      deployment:
        revisionHistoryLimit: 7
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 7
  - it: defaults revisionHistoryLimit to 1
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 1
  - it: pins spec.replicas to replicas.min at the non-autoscaling default
    asserts:
      # replicas.min is the fixed Deployment count unless an HPA is rendered
      # (replicas.max > replicas.min). At the 1/1 default that is one replica.
      - equal:
          path: spec.replicas
          value: 1
  - it: pins spec.replicas to replicas.min for a fixed multi-replica install
    set:
      replicas.min: 2
      replicas.max: 2
    asserts:
      # min == max: no HPA, so the Deployment owns a fixed count — the two pods
      # an HA (leader-election failover) install relies on.
      - equal:
          path: spec.replicas
          value: 2
  - it: omits spec.replicas when autoscaling so the HPA owns the count
    set:
      replicas.min: 2
      replicas.max: 5
    asserts:
      # max > min renders the HPA, which owns the replica count from
      # minReplicas; the Deployment must not set spec.replicas and fight it.
      - notExists:
          path: spec.replicas

  # ------------------------------------------------------------------
  # Selector — must not include managed-by, because spec.selector is immutable
  # and managed-by can change across install tools (Helm, Helmfile, ArgoCD).
  # ------------------------------------------------------------------
  - it: selector includes the expected stable labels only
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: jaas
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: jaas
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/part-of"]
          value: jaas
      - exists:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
  - it: selector deliberately omits managed-by
    asserts:
      - notExists:
          path: spec.selector.matchLabels["app.kubernetes.io/managed-by"]

  # ------------------------------------------------------------------
  # Pod template metadata
  # ------------------------------------------------------------------
  - it: merges pod.additionalLabels into the pod template metadata
    set:
      pod:
        additionalLabels:
          monitoring: enabled
    asserts:
      - equal:
          path: spec.template.metadata.labels.monitoring
          value: enabled

  # ------------------------------------------------------------------
  # Image
  # ------------------------------------------------------------------
  - it: composes the container image from registry, repository, and appVersion
    set:
      image:
        registry: example.com
        repository: my-org/my-jaas
    chart:
      appVersion: 9.9.9
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: example.com/my-org/my-jaas:9.9.9
  - it: uses ghcr defaults
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^ghcr\\.io/metio/jaas:"

  # ------------------------------------------------------------------
  # Container ports
  # ------------------------------------------------------------------
  - it: exposes the configured http port
    set:
      ports:
        http: 9090
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 9090
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: http
  - it: exposes the configured management port
    set:
      ports:
        management: 9091
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[1].containerPort
          value: 9091
      - equal:
          path: spec.template.spec.containers[0].ports[1].name
          value: management

  # ------------------------------------------------------------------
  # Container args
  # ------------------------------------------------------------------
  - it: passes ports.http via --port
    set:
      ports:
        http: 9090
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --port=9090
  - it: passes ports.management via --management-port
    set:
      ports:
        management: 9091
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --management-port=9091
  - it: passes arguments.logLevel via --log-level
    set:
      arguments:
        logLevel: debug
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --log-level=debug
  - it: passes paths.snippets via --snippet-directory
    set:
      paths:
        snippets: /custom/snippets
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --snippet-directory=/custom/snippets
  - it: passes the default arguments.readTimeout via --read-timeout
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --read-timeout=10s
  - it: passes a custom arguments.readTimeout via --read-timeout
    set:
      arguments:
        readTimeout: 30s
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --read-timeout=30s
  - it: passes the default arguments.writeTimeout via --write-timeout
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --write-timeout=10s
  - it: passes a custom arguments.writeTimeout via --write-timeout
    set:
      arguments:
        writeTimeout: 45s
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --write-timeout=45s
  - it: passes the default arguments.managementReadTimeout via --management-read-timeout
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --management-read-timeout=10s
  - it: passes a custom arguments.managementReadTimeout via --management-read-timeout
    set:
      arguments:
        managementReadTimeout: 5s
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --management-read-timeout=5s
  - it: passes the default arguments.managementWriteTimeout via --management-write-timeout
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --management-write-timeout=10s
  - it: passes a custom arguments.managementWriteTimeout via --management-write-timeout
    set:
      arguments:
        managementWriteTimeout: 15s
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --management-write-timeout=15s
  - it: passes the default arguments.jsonnetEndpointPath via --jsonnet-endpoint-path
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --jsonnet-endpoint-path=jsonnet
  - it: passes a custom arguments.jsonnetEndpointPath via --jsonnet-endpoint-path
    set:
      arguments:
        jsonnetEndpointPath: eval
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --jsonnet-endpoint-path=eval
  - it: passes the default arguments.evaluationTimeout via --evaluation-timeout
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --evaluation-timeout=5s
  - it: passes a custom arguments.evaluationTimeout via --evaluation-timeout
    set:
      arguments:
        evaluationTimeout: 30s
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --evaluation-timeout=30s
  - it: passes the default arguments.maxStack via --max-stack
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --max-stack=500
  - it: passes a custom arguments.maxStack via --max-stack
    set:
      arguments:
        maxStack: 2000
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --max-stack=2000
  - it: accepts disabling the evaluation timeout (0)
    set:
      arguments:
        evaluationTimeout: 0s
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --evaluation-timeout=0s
  - it: accepts disabling the max-stack limit (0)
    set:
      arguments:
        maxStack: 0
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --max-stack=0
  - it: passes the default arguments.shutdownDelay via --shutdown-delay
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --shutdown-delay=5s
  - it: passes a custom arguments.shutdownDelay via --shutdown-delay
    set:
      arguments:
        shutdownDelay: 20s
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --shutdown-delay=20s
  - it: accepts disabling the shutdown delay (0)
    set:
      arguments:
        shutdownDelay: 0s
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --shutdown-delay=0s

  # ------------------------------------------------------------------
  # Scheduling selectors must NOT include managed-by, but must still carry
  # the other expected stable labels — without those, the constraints would
  # match too little (or nothing) and stop influencing pod placement.
  # ------------------------------------------------------------------
  - it: podAntiAffinity labelSelector excludes managed-by
    asserts:
      - notExists:
          path: spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].podAffinityTerm.labelSelector.matchLabels["app.kubernetes.io/managed-by"]
  - it: podAntiAffinity labelSelector retains name, component, and part-of
    asserts:
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].podAffinityTerm.labelSelector.matchLabels["app.kubernetes.io/name"]
          value: jaas
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].podAffinityTerm.labelSelector.matchLabels["app.kubernetes.io/component"]
          value: jaas
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].podAffinityTerm.labelSelector.matchLabels["app.kubernetes.io/part-of"]
          value: jaas
  - it: topologySpreadConstraints labelSelector excludes managed-by
    asserts:
      - notExists:
          path: spec.template.spec.topologySpreadConstraints[0].labelSelector.matchLabels["app.kubernetes.io/managed-by"]
  - it: topologySpreadConstraints labelSelector retains the other expected labels
    asserts:
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].labelSelector.matchLabels["app.kubernetes.io/name"]
          value: jaas
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].labelSelector.matchLabels["app.kubernetes.io/component"]
          value: jaas
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].labelSelector.matchLabels["app.kubernetes.io/part-of"]
          value: jaas
      - exists:
          path: spec.template.spec.topologySpreadConstraints[0].labelSelector.matchLabels["app.kubernetes.io/instance"]
      - exists:
          path: spec.template.spec.topologySpreadConstraints[0].labelSelector.matchLabels["app.kubernetes.io/version"]
      - exists:
          path: spec.template.spec.topologySpreadConstraints[0].labelSelector.matchLabels["helm.sh/chart"]

  # ------------------------------------------------------------------
  # Resources
  # ------------------------------------------------------------------
  - it: applies resources to both requests and limits
    set:
      resources:
        cpu: 250m
        memory: 256Mi
        ephemeralStorage: 100Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 250m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 256Mi
      - equal:
          path: spec.template.spec.containers[0].resources.requests["ephemeral-storage"]
          value: 100Mi
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 250m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 256Mi
      - equal:
          path: spec.template.spec.containers[0].resources.limits["ephemeral-storage"]
          value: 100Mi

  # ------------------------------------------------------------------
  # Probes — wired against the management port
  # ------------------------------------------------------------------
  - it: wires startup probe at /start on the management port
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /start
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.port
          value: management
  - it: wires readiness probe at /ready
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /ready
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: management
  - it: wires liveness probe at /live
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /live
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: management

  # ------------------------------------------------------------------
  # Built-in libraries (grafonnet, docsonnet, xtd)
  # ------------------------------------------------------------------
  - it: omits grafonnet by default — no arg, mount, or OCI volume
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --library-path=/srv/libraries/grafonnet
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: library-grafonnet
            mountPath: /srv/libraries/grafonnet
            readOnly: true
  - it: enabling grafonnet adds its arg, mount and volume
    set:
      libraries:
        grafonnet:
          enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --library-path=/srv/libraries/grafonnet
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: library-grafonnet
            mountPath: /srv/libraries/grafonnet
            readOnly: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: library-grafonnet
            image:
              reference: ghcr.io/metio/joi-grafana-grafonnet:latest
              pullPolicy: IfNotPresent
  - it: customizes grafonnet OCI coordinates via registry/repository/version
    set:
      libraries:
        grafonnet:
          enabled: true
          registry: example.com
          repository: org/grafonnet
          version: v99.0.0
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: library-grafonnet
            image:
              reference: example.com/org/grafonnet:v99.0.0
              pullPolicy: IfNotPresent
  - it: omits docsonnet by default — no arg
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --library-path=/srv/libraries/docsonnet
  - it: omits xtd by default — no arg
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --library-path=/srv/libraries/xtd

  # ------------------------------------------------------------------
  # additionalLibraries (operator-supplied OCI library images)
  # ------------------------------------------------------------------
  - it: adds a library-path arg per entry in additionalLibraries
    set:
      additionalLibraries:
        mylib: example.com/org/mylib:v1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --library-path=/srv/libraries/mylib
  - it: adds a volume per entry in additionalLibraries
    set:
      additionalLibraries:
        mylib: example.com/org/mylib:v1
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: library-mylib
            image:
              reference: example.com/org/mylib:v1
              pullPolicy: IfNotPresent
  - it: adds a read-only volumeMount per entry in additionalLibraries
    set:
      additionalLibraries:
        mylib: example.com/org/mylib:v1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: library-mylib
            mountPath: /srv/libraries/mylib
            readOnly: true
  - it: substitutes underscores with dashes in the additionalLibraries volume name
    set:
      additionalLibraries:
        my_lib_name: example.com/org/mylib:v1
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: library-my-lib-name
            image:
              reference: example.com/org/mylib:v1
              pullPolicy: IfNotPresent
  - it: honours paths.libraries for the additionalLibraries mount path
    set:
      paths:
        libraries: /opt/libs
      additionalLibraries:
        mylib: example.com/org/mylib:v1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: library-mylib
            mountPath: /opt/libs/mylib
            readOnly: true

  # ------------------------------------------------------------------
  # snippets (operator-supplied OCI snippet images)
  # ------------------------------------------------------------------
  - it: adds a volume per entry in snippets
    set:
      snippets:
        my-dash: example.com/org/dash:v1
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: snippet-my-dash
            image:
              reference: example.com/org/dash:v1
              pullPolicy: IfNotPresent
  - it: adds a read-only volumeMount per entry in snippets
    set:
      snippets:
        my-dash: example.com/org/dash:v1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: snippet-my-dash
            mountPath: /srv/snippets/my-dash
            readOnly: true
  - it: substitutes underscores with dashes in the snippet volume name
    set:
      snippets:
        my_dash: example.com/org/dash:v1
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: snippet-my-dash
            image:
              reference: example.com/org/dash:v1
              pullPolicy: IfNotPresent
  - it: honours paths.snippets for the snippet mount path
    set:
      paths:
        snippets: /opt/snippets
      snippets:
        my-dash: example.com/org/dash:v1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: snippet-my-dash
            mountPath: /opt/snippets/my-dash
            readOnly: true

  # ------------------------------------------------------------------
  # Pod security & scheduling invariants
  # ------------------------------------------------------------------
  - it: refuses automountServiceAccountToken
    asserts:
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false
  - it: prefers anti-affinity against other instances of the same chart
    asserts:
      - exists:
          path: spec.template.spec.affinity.podAntiAffinity
  - it: spreads pods across hosts via topologySpreadConstraints
    asserts:
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].topologyKey
          value: kubernetes.io/hostname
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].whenUnsatisfiable
          value: ScheduleAnyway

  # ------------------------------------------------------------------
  # Operator mode (--enable-flux-integration) — opt-in
  # ------------------------------------------------------------------

  - it: omits operator args when operator.enabled is false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --enable-flux-integration

  - it: omits the storage container port when operator.enabled is false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 8082
            name: storage
            protocol: TCP

  - it: keeps automountServiceAccountToken=false when operator.enabled is false
    asserts:
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false
      - notExists:
          path: spec.template.spec.serviceAccountName

  - it: adds --enable-flux-integration to args when operator.enabled
    set:
      operator:
        enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --enable-flux-integration

  - it: passes storage flags when operator.enabled
    set:
      operator:
        enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --storage-path=/var/lib/jaas/artifacts
      - contains:
          path: spec.template.spec.containers[0].args
          content: --storage-port=8082

  - it: defaults storage base URL to the in-cluster Service DNS name
    release:
      namespace: my-ns
    set:
      operator:
        enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --storage-base-url=http://jaas-storage.my-ns.svc.cluster.local:8082

  - it: honors a configured storage base URL override
    set:
      operator:
        enabled: true
        storage:
          baseURL: https://artifacts.example.com
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --storage-base-url=https://artifacts.example.com

  - it: passes --no-cross-namespace-refs verbatim
    set:
      operator:
        enabled: true
        noCrossNamespaceRefs: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --no-cross-namespace-refs=false

  - it: passes rerender-rate and rerender-burst
    set:
      operator:
        enabled: true
        rerenderRate: "30/sec"
        rerenderBurst: 60
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --rerender-rate=30/sec
      - contains:
          path: spec.template.spec.containers[0].args
          content: --rerender-burst=60

  - it: omits --default-service-account when value is empty
    set:
      operator:
        enabled: true
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --default-service-account=

  - it: passes --default-service-account when set
    set:
      operator:
        enabled: true
        defaultServiceAccount: tenant-a
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --default-service-account=tenant-a

  - it: omits --label-selector when empty
    set:
      operator:
        enabled: true
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --label-selector=

  - it: passes --label-selector when set
    set:
      operator:
        enabled: true
        labelSelector: tenant=team-a
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --label-selector=tenant=team-a

  - it: renders one --ext-var per entry
    set:
      operator:
        enabled: true
        extVars:
          cluster: prod
          region: eu-west-1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --ext-var=cluster=prod
      - contains:
          path: spec.template.spec.containers[0].args
          content: --ext-var=region=eu-west-1

  - it: exposes the storage containerPort when operator.enabled
    set:
      operator:
        enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 8082
            name: storage
            protocol: TCP

  - it: adds an emptyDir volume for the storage path
    set:
      operator:
        enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: storage
            emptyDir:
              sizeLimit: 256Mi

  - it: switches the storage volume to a PVC when persistence is enabled
    release:
      name: jaas-prod
    set:
      operator:
        enabled: true
        storage:
          persistence:
            enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: storage
            persistentVolumeClaim:
              claimName: jaas-prod-storage
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: storage
            emptyDir:
              sizeLimit: 256Mi

  - it: mounts the storage volume at the configured storage path
    set:
      operator:
        enabled: true
        storage:
          path: /custom/storage
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: storage
            mountPath: /custom/storage

  - it: enables ServiceAccount mounting when operator.enabled
    set:
      operator:
        enabled: true
        serviceAccount:
          name: my-sa
    asserts:
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: true
      - equal:
          path: spec.template.spec.serviceAccountName
          value: my-sa

  # ------------------------------------------------------------------
  # Webhook mode (operator.webhook.enabled) — opt-in
  # ------------------------------------------------------------------

  - it: omits webhook args when webhook is disabled
    set:
      operator:
        enabled: true
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --enable-webhook

  - it: adds webhook args when webhook is enabled
    set:
      operator:
        enabled: true
        webhook:
          enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --enable-webhook
      - contains:
          path: spec.template.spec.containers[0].args
          content: --webhook-port=9443
      - contains:
          path: spec.template.spec.containers[0].args
          content: --webhook-cert-dir=/tmp/k8s-webhook-server/serving-certs

  - it: exposes the webhook containerPort when webhook is enabled
    set:
      operator:
        enabled: true
        webhook:
          enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 9443
            name: webhook
            protocol: TCP

  - it: passes leader-election flags when operator.enabled (defaults on)
    release:
      name: jaas-prod
      namespace: jaas-system
    set:
      operator:
        enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --leader-election=true
      - contains:
          path: spec.template.spec.containers[0].args
          content: --leader-election-id=jaas-prod-operator
      - contains:
          path: spec.template.spec.containers[0].args
          content: --leader-election-namespace=jaas-system

  - it: honors operator.leaderElection.enabled=false
    set:
      operator:
        enabled: true
        leaderElection:
          enabled: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --leader-election=false

  - it: honors operator.leaderElection.id override
    set:
      operator:
        enabled: true
        leaderElection:
          id: my-custom-lease
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --leader-election-id=my-custom-lease

  - it: omits leader-election flags when operator is disabled
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --leader-election=true

  - it: passes --metrics-bind-address when operator + metrics are enabled (default)
    set:
      operator:
        enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --metrics-bind-address=:8083
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 8083
            name: metrics
            protocol: TCP

  - it: passes --metrics-bind-address=0 when metrics are disabled
    set:
      operator:
        enabled: true
        metrics:
          enabled: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --metrics-bind-address=0
      - notContains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 8083
            name: metrics
            protocol: TCP

  - it: honors a custom metrics port
    set:
      operator:
        enabled: true
      ports:
        metrics: 9090
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --metrics-bind-address=:9090
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 9090
            name: metrics
            protocol: TCP

  - it: omits the metrics arg + port when operator is disabled
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --metrics-bind-address=:8083

  - it: passes --storage-backend=local and --storage-path by default
    set:
      operator:
        enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --storage-backend=local
      - contains:
          path: spec.template.spec.containers[0].args
          content: --storage-path=/var/lib/jaas/artifacts
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --s3-endpoint=

  - it: switches to S3 args when backend=s3
    set:
      operator:
        enabled: true
        storage:
          backend: s3
          s3:
            endpoint: minio.minio.svc:9000
            bucket: my-jaas
            region: us-east-1
            useSSL: false
            prefix: tenants/jaas
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --storage-backend=s3
      - contains:
          path: spec.template.spec.containers[0].args
          content: --s3-endpoint=minio.minio.svc:9000
      - contains:
          path: spec.template.spec.containers[0].args
          content: --s3-bucket=my-jaas
      - contains:
          path: spec.template.spec.containers[0].args
          content: --s3-region=us-east-1
      - contains:
          path: spec.template.spec.containers[0].args
          content: --s3-use-ssl=false
      - contains:
          path: spec.template.spec.containers[0].args
          content: --s3-prefix=tenants/jaas
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --storage-path=/var/lib/jaas/artifacts

  # Credentials never reach the command line: there is no chart field
  # that emits a --s3-access-key / --s3-secret-key / --s3-session-token flag.
  # Credentials flow via credentialsSecret (envFrom) or the IAM/IRSA chain.
  - it: never emits inline S3 credential flags on the command line
    set:
      operator:
        enabled: true
        storage:
          backend: s3
          s3:
            endpoint: minio.minio.svc:9000
            bucket: my-jaas
            credentialsSecret:
              name: jaas-s3-creds
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --s3-access-key=
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --s3-secret-key=
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --s3-session-token=

  # IRSA / IAM path: no credentialsSecret, no credential flags, no envFrom
  # secretRef for S3 — minio-go discovers credentials from the environment.
  - it: emits no S3 credential flags on the IAM/IRSA path
    set:
      operator:
        enabled: true
        storage:
          backend: s3
          s3:
            endpoint: s3.amazonaws.com
            bucket: my-jaas
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --s3-access-key=
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --s3-secret-key=
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --s3-session-token=

  - it: omits the storage volume + mount when backend=s3
    set:
      operator:
        enabled: true
        storage:
          backend: s3
          s3:
            endpoint: s3.amazonaws.com
            bucket: b
    asserts:
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: storage
            emptyDir:
              sizeLimit: 256Mi
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: storage
            mountPath: /var/lib/jaas/artifacts

  - it: mounts an S3 credentials Secret via envFrom when configured
    set:
      operator:
        enabled: true
        storage:
          backend: s3
          s3:
            endpoint: s3.amazonaws.com
            bucket: b
            credentialsSecret:
              name: jaas-s3-creds
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: jaas-s3-creds
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --s3-access-key=
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --s3-secret-key=
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --s3-session-token=

  - it: fails fast if backend=s3 but endpoint is empty
    set:
      operator:
        enabled: true
        storage:
          backend: s3
    asserts:
      - failedTemplate:
          errorMessage: "operator.storage.s3.endpoint is required when backend is \"s3\""

  # ------------------------------------------------------------------
  # watchNamespaces
  # ------------------------------------------------------------------
  - it: omits --watch-namespaces when watchNamespaces is empty (cluster-wide)
    set:
      operator:
        enabled: true
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --watch-namespaces=

  - it: joins operator.watchNamespaces into a comma-separated --watch-namespaces
    set:
      operator:
        enabled: true
        watchNamespaces:
          - team-a
          - team-b
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --watch-namespaces=team-a,team-b

  # ------------------------------------------------------------------
  # max-concurrent-evals
  # ------------------------------------------------------------------
  - it: passes the default arguments.maxConcurrentEvals via --max-concurrent-evals
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --max-concurrent-evals=32

  - it: passes a custom arguments.maxConcurrentEvals via --max-concurrent-evals
    set:
      arguments:
        maxConcurrentEvals: 8
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --max-concurrent-evals=8

  # ------------------------------------------------------------------
  # s3-anonymous (rendered on the S3 backend path)
  # ------------------------------------------------------------------
  - it: defaults --s3-anonymous to false on the S3 backend
    set:
      operator:
        enabled: true
        storage:
          backend: s3
          s3:
            endpoint: s3.amazonaws.com
            bucket: b
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --s3-anonymous=false

  - it: passes --s3-anonymous=true when anonymous access is requested
    set:
      operator:
        enabled: true
        storage:
          backend: s3
          s3:
            endpoint: s3.amazonaws.com
            bucket: b
            anonymous: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --s3-anonymous=true

  # ------------------------------------------------------------------
  # OpenTelemetry tracing — args render only when an endpoint is set
  # ------------------------------------------------------------------
  - it: omits the tracing args when no endpoint is configured (default)
    set:
      operator:
        enabled: true
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --tracing-endpoint=
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --tracing-insecure=false
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --tracing-sample-ratio=1

  - it: renders all three tracing args when an endpoint is set
    set:
      operator:
        enabled: true
        tracing:
          endpoint: otel-collector.observability.svc:4317
          insecure: true
          sampleRatio: 0.25
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --tracing-endpoint=otel-collector.observability.svc:4317
      - contains:
          path: spec.template.spec.containers[0].args
          content: --tracing-insecure=true
      - contains:
          path: spec.template.spec.containers[0].args
          content: --tracing-sample-ratio=0.25

  - it: pod-level securityContext is PSS-restricted compliant
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.seccompProfile.type
          value: RuntimeDefault

  - it: defaults bind addresses to dual-stack-friendly `::`
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--listen-address=::"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--management-listen-address=::"

  - it: honors IPv4-only bind address overrides
    set:
      arguments:
        listenAddress: 0.0.0.0
        managementListenAddress: 0.0.0.0
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --listen-address=0.0.0.0
      - contains:
          path: spec.template.spec.containers[0].args
          content: --management-listen-address=0.0.0.0

  - it: storage server defaults to dual-stack-friendly `::`
    set:
      operator:
        enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--storage-listen-address=::"

  - it: defaults imagePullPolicy to IfNotPresent
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: IfNotPresent

  - it: honors a custom imagePullPolicy
    set:
      image:
        pullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always

  - it: defaults image tag to chart appVersion
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^ghcr.io/metio/jaas:[0-9.]+$"

  - it: honors an image.tag override
    set:
      image:
        tag: dev-abc123
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/metio/jaas:dev-abc123

  - it: fails fast if backend=s3 but bucket is empty
    set:
      operator:
        enabled: true
        storage:
          backend: s3
          s3:
            endpoint: s3.amazonaws.com
    asserts:
      - failedTemplate:
          errorMessage: "operator.storage.s3.bucket is required when backend is \"s3\""

  - it: defaults webhook.certMode to self-signed and passes that arg
    set:
      operator:
        enabled: true
        webhook:
          enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --webhook-cert-mode=self-signed
      - contains:
          path: spec.template.spec.containers[0].args
          content: --webhook-service-name=jaas-webhook

  - it: self-signed mode passes the self-signed args
    release:
      name: jaas-prod
      namespace: jaas-system
    set:
      operator:
        enabled: true
        webhook:
          enabled: true
          certMode: self-signed
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --webhook-cert-mode=self-signed
      - contains:
          path: spec.template.spec.containers[0].args
          content: --webhook-service-name=jaas-webhook
      - contains:
          path: spec.template.spec.containers[0].args
          content: --webhook-service-namespace=jaas-system
      - contains:
          path: spec.template.spec.containers[0].args
          content: --webhook-validating-config-name=jaas-prod-jsonnetsnippet
      - contains:
          path: spec.template.spec.containers[0].args
          content: --webhook-cert-validity=8760h

  - it: self-signed mode swaps the cert mount to a writable emptyDir
    set:
      operator:
        enabled: true
        webhook:
          enabled: true
          certMode: self-signed
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: webhook-cert
            emptyDir:
              sizeLimit: 1Mi
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: webhook-cert
            secret:
              secretName: jaas-webhook-cert
              defaultMode: 0444
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: webhook-cert
            mountPath: /tmp/k8s-webhook-server/serving-certs

  - it: cert-manager mode keeps the read-only Secret mount
    set:
      operator:
        enabled: true
        webhook:
          enabled: true
          certMode: cert-manager
          certManager:
            issuerRef:
              name: jaas-ca
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: webhook-cert
            secret:
              secretName: jaas-webhook-cert
              defaultMode: 0444
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: webhook-cert
            mountPath: /tmp/k8s-webhook-server/serving-certs
            readOnly: true

  - it: honors a custom self-signed validity
    set:
      operator:
        enabled: true
        webhook:
          enabled: true
          certMode: self-signed
          selfSignedValidity: 720h
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --webhook-cert-validity=720h

  - it: mounts the cert Secret read-only when webhook is enabled
    set:
      operator:
        enabled: true
        webhook:
          enabled: true
          certMode: cert-manager
          secretName: jaas-webhook-cert
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: webhook-cert
            secret:
              secretName: jaas-webhook-cert
              defaultMode: 0444
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: webhook-cert
            mountPath: /tmp/k8s-webhook-server/serving-certs
            readOnly: true
