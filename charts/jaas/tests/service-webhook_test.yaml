suite: test jaas webhook service
templates:
  - service-webhook.yaml
tests:
  - it: is empty when operator is disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: is empty when operator is enabled but webhook is not
    set:
      operator:
        enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: renders when both operator and webhook are enabled
    set:
      operator:
        enabled: true
        webhook:
          enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: jaas-webhook

  - it: exposes port 443 backed by the container's webhook port
    set:
      operator:
        enabled: true
        webhook:
          enabled: true
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 443
      - equal:
          path: spec.ports[0].targetPort
          value: webhook

  - it: selector points at the jaas pods
    set:
      operator:
        enabled: true
        webhook:
          enabled: true
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: jaas
