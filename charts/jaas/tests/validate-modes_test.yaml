suite: test OCI-mount vs Flux mutual exclusion
templates:
  - templates/validate-modes.yaml
tests:
  - it: allows the standalone renderer with OCI snippet/library mounts
    set:
      operator.enabled: false
      snippets:
        dashboards: ghcr.io/metio/joi-grafana-grafonnet:v11.4.0
      additionalLibraries:
        grafonnet: ghcr.io/metio/joi-grafana-grafonnet:v11.4.0
    asserts:
      - hasDocuments:
          count: 0
  - it: allows Flux mode with no OCI mounts
    set:
      operator.enabled: true
      operator.defaultServiceAccount: default
    asserts:
      - hasDocuments:
          count: 0
  - it: rejects Flux mode combined with snippet OCI mounts
    set:
      operator.enabled: true
      operator.defaultServiceAccount: default
      snippets:
        dashboards: ghcr.io/metio/joi-grafana-grafonnet:v11.4.0
    asserts:
      - failedTemplate:
          errorMessage: "operator.enabled (Flux integration) is mutually exclusive with the static `snippets` OCI mount: in Flux mode the published units come from JsonnetSnippet CRs. Either clear `snippets`, or set operator.enabled=false (standalone renderer). OCI library mounts (`additionalLibraries`, `libraries`) are allowed in both modes."
  - it: allows Flux mode combined with library OCI mounts
    # The operator folds OCI-mounted libraries into its --library-path search
    # additively after JsonnetLibrary CR refs, so shared libraries can ship
    # cluster-wide via image volumes without a JsonnetLibrary CR per tenant.
    set:
      operator.enabled: true
      operator.defaultServiceAccount: default
      additionalLibraries:
        grafonnet: ghcr.io/metio/joi-grafana-grafonnet:v11.4.0
    asserts:
      - hasDocuments:
          count: 0
  - it: allows Flux mode combined with an enabled well-known library
    set:
      operator.enabled: true
      operator.defaultServiceAccount: default
      libraries.grafonnet.enabled: true
    asserts:
      - hasDocuments:
          count: 0
  - it: allows Flux mode with all well-known libraries disabled (default)
    set:
      operator.enabled: true
      operator.defaultServiceAccount: default
    asserts:
      - hasDocuments:
          count: 0
  # C3 — multi-replica + local storage fail-fast
  - it: rejects multi-replica operator on the local backend (emptyDir)
    set:
      operator.enabled: true
      operator.defaultServiceAccount: default
      replicas.max: 3
    asserts:
      - failedTemplate:
          errorMessage: "operator.enabled with more than one replica and operator.storage.backend=local serves stale 404s from non-leader pods — only the leader writes tarballs while the storage Service reads from every replica. Use operator.storage.backend=s3 (every replica reads the same bucket), or set operator.storage.persistence.enabled=true with an accessMode of ReadWriteMany (RWX) so every replica mounts the same volume."
  - it: rejects multi-replica operator on a local RWO PVC
    set:
      operator.enabled: true
      operator.defaultServiceAccount: default
      replicas.min: 2
      replicas.max: 2
      operator.storage.persistence.enabled: true
      operator.storage.persistence.accessModes:
        - ReadWriteOnce
    asserts:
      - failedTemplate:
          errorMessage: "operator.enabled with more than one replica and operator.storage.backend=local serves stale 404s from non-leader pods — only the leader writes tarballs while the storage Service reads from every replica. Use operator.storage.backend=s3 (every replica reads the same bucket), or set operator.storage.persistence.enabled=true with an accessMode of ReadWriteMany (RWX) so every replica mounts the same volume."
  - it: allows multi-replica operator on the S3 backend
    set:
      operator.enabled: true
      operator.defaultServiceAccount: default
      replicas.max: 3
      operator.storage.backend: s3
      operator.storage.s3.endpoint: minio.minio.svc:9000
      operator.storage.s3.bucket: jaas
    asserts:
      - hasDocuments:
          count: 0
  - it: allows multi-replica operator on a local RWX PVC
    set:
      operator.enabled: true
      operator.defaultServiceAccount: default
      replicas.max: 3
      operator.storage.persistence.enabled: true
      operator.storage.persistence.accessModes:
        - ReadWriteMany
    asserts:
      - hasDocuments:
          count: 0
  - it: allows single-replica operator on the local backend (default)
    set:
      operator.enabled: true
      operator.defaultServiceAccount: default
    asserts:
      - hasDocuments:
          count: 0
  # C4 — scaling with leader election off fail-fast
  - it: rejects scaling the operator with leader election off
    set:
      operator.enabled: true
      operator.defaultServiceAccount: default
      operator.storage.backend: s3
      operator.storage.s3.endpoint: minio.minio.svc:9000
      operator.storage.s3.bucket: jaas
      replicas.max: 3
      operator.leaderElection.enabled: false
    asserts:
      - failedTemplate:
          errorMessage: "operator.enabled with scaling (replicas.max > replicas.min, or replicas.min > 1) requires operator.leaderElection.enabled=true. Without leader election every replica reconciles every JsonnetSnippet independently, double-rendering and racing the ExternalArtifact write. Keep leader election on, or pin replicas.min=replicas.max=1."
  - it: rejects replicas.min > 1 with leader election off
    set:
      operator.enabled: true
      operator.defaultServiceAccount: default
      operator.storage.backend: s3
      operator.storage.s3.endpoint: minio.minio.svc:9000
      operator.storage.s3.bucket: jaas
      replicas.min: 2
      replicas.max: 2
      operator.leaderElection.enabled: false
    asserts:
      - failedTemplate:
          errorMessage: "operator.enabled with scaling (replicas.max > replicas.min, or replicas.min > 1) requires operator.leaderElection.enabled=true. Without leader election every replica reconciles every JsonnetSnippet independently, double-rendering and racing the ExternalArtifact write. Keep leader election on, or pin replicas.min=replicas.max=1."
  - it: allows scaling the operator with leader election on (default)
    set:
      operator.enabled: true
      operator.defaultServiceAccount: default
      operator.storage.backend: s3
      operator.storage.s3.endpoint: minio.minio.svc:9000
      operator.storage.s3.bucket: jaas
      replicas.max: 3
    asserts:
      - hasDocuments:
          count: 0
