suite: test OCI-mount vs Flux mutual exclusion
templates:
  - templates/validate-modes.yaml
tests:
  - it: allows the standalone renderer with OCI snippet/library mounts
    set:
      operator.enabled: false
      snippets:
        dashboards: ghcr.io/metio/joi-grafana-grafonnet:v11.4.0
      additionalLibraries:
        grafonnet: ghcr.io/metio/joi-grafana-grafonnet:v11.4.0
    asserts:
      - hasDocuments:
          count: 0
  - it: allows Flux mode with no OCI mounts
    set:
      operator.enabled: true
      operator.defaultServiceAccount: default
    asserts:
      - hasDocuments:
          count: 0
  - it: rejects Flux mode combined with snippet OCI mounts
    set:
      operator.enabled: true
      operator.defaultServiceAccount: default
      snippets:
        dashboards: ghcr.io/metio/joi-grafana-grafonnet:v11.4.0
    asserts:
      - failedTemplate:
          errorMessage: "operator.enabled (Flux integration) is mutually exclusive with static OCI volume mounts. Either clear `snippets`, `additionalLibraries`, and any enabled `libraries` (Flux mode: snippets/libraries come from CRs), or set operator.enabled=false (standalone renderer: use the OCI mounts)."
  - it: rejects Flux mode combined with library OCI mounts
    set:
      operator.enabled: true
      operator.defaultServiceAccount: default
      additionalLibraries:
        grafonnet: ghcr.io/metio/joi-grafana-grafonnet:v11.4.0
    asserts:
      - failedTemplate: {}
  - it: rejects Flux mode combined with an enabled well-known library
    set:
      operator.enabled: true
      operator.defaultServiceAccount: default
      libraries.grafonnet.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "operator.enabled (Flux integration) is mutually exclusive with static OCI volume mounts. Either clear `snippets`, `additionalLibraries`, and any enabled `libraries` (Flux mode: snippets/libraries come from CRs), or set operator.enabled=false (standalone renderer: use the OCI mounts)."
  - it: allows Flux mode with all well-known libraries disabled (default)
    set:
      operator.enabled: true
      operator.defaultServiceAccount: default
    asserts:
      - hasDocuments:
          count: 0
