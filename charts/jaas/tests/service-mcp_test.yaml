suite: test jaas mcp service
templates:
  - service-mcp.yaml
tests:
  - it: is empty when operator is disabled
    set:
      operator:
        mcp:
          enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: is empty when operator is enabled but mcp is disabled
    set:
      operator:
        enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: is empty when mcp is enabled but its Service is disabled
    set:
      operator:
        enabled: true
        mcp:
          enabled: true
          service:
            enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders when operator and mcp are enabled
    set:
      operator:
        enabled: true
        mcp:
          enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: jaas-mcp

  - it: exposes the mcp port pointed at the named container port
    set:
      operator:
        enabled: true
        mcp:
          enabled: true
      ports:
        mcp: 9099
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 9099
      - equal:
          path: spec.ports[0].targetPort
          value: mcp
      - equal:
          path: spec.ports[0].name
          value: mcp

  - it: selects the jaas pod
    set:
      operator:
        enabled: true
        mcp:
          enabled: true
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: jaas
      - notExists:
          path: spec.selector["app.kubernetes.io/managed-by"]
