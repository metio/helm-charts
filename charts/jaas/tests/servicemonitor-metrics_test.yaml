suite: test jaas ServiceMonitor
templates:
  - servicemonitor-metrics.yaml
tests:
  - it: is empty when operator is disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: is empty when ServiceMonitor is disabled (default)
    set:
      operator:
        enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: is empty when metrics are off, even if ServiceMonitor is on
    set:
      operator:
        enabled: true
        metrics:
          enabled: false
          serviceMonitor:
            enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: renders when operator, metrics, and ServiceMonitor are all enabled
    set:
      operator:
        enabled: true
        metrics:
          serviceMonitor:
            enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceMonitor
      - equal:
          path: metadata.name
          value: jaas

  - it: selects only the metrics service
    set:
      operator:
        enabled: true
        metrics:
          serviceMonitor:
            enabled: true
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: metrics

  - it: scrapes /metrics at the configured interval
    set:
      operator:
        enabled: true
        metrics:
          serviceMonitor:
            enabled: true
            interval: 15s
            scrapeTimeout: 5s
    asserts:
      - equal:
          path: spec.endpoints[0].path
          value: /metrics
      - equal:
          path: spec.endpoints[0].interval
          value: 15s
      - equal:
          path: spec.endpoints[0].scrapeTimeout
          value: 5s
      - equal:
          path: spec.endpoints[0].port
          value: metrics

  - it: namespace-scoped to the release namespace
    release:
      namespace: jaas-prod
    set:
      operator:
        enabled: true
        metrics:
          serviceMonitor:
            enabled: true
    asserts:
      - contains:
          path: spec.namespaceSelector.matchNames
          content: jaas-prod

  - it: honors extra labels and annotations
    set:
      operator:
        enabled: true
        metrics:
          serviceMonitor:
            enabled: true
            labels:
              release: kube-prom
            annotations:
              prometheus.io/scrape: "true"
    asserts:
      - equal:
          path: metadata.labels.release
          value: kube-prom
      - equal:
          path: metadata.annotations["prometheus.io/scrape"]
          value: "true"
