suite: test jaas operator tenants clusterrolebinding
templates:
  - clusterrolebinding-operator.yaml
tests:
  - it: is empty when operator is disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: renders when operator is enabled and watchNamespaces is unset
    set:
      operator:
        enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ClusterRoleBinding

  - it: does NOT render when watchNamespaces is non-empty
    set:
      operator:
        enabled: true
        watchNamespaces: [team-a, team-b]
    asserts:
      - hasDocuments:
          count: 0

  - it: binds the configured ServiceAccount to the operator-tenants ClusterRole
    release:
      name: my-release
      namespace: jaas-system
    set:
      operator:
        enabled: true
        serviceAccount:
          name: custom-sa
    asserts:
      - equal:
          path: roleRef.name
          value: my-release-operator-tenants
      - equal:
          path: subjects[0].name
          value: custom-sa
      - equal:
          path: subjects[0].namespace
          value: jaas-system
      - equal:
          path: subjects[0].kind
          value: ServiceAccount

  - it: roleRef points at the ClusterRole API group
    set:
      operator:
        enabled: true
    asserts:
      - equal:
          path: roleRef.kind
          value: ClusterRole
      - equal:
          path: roleRef.apiGroup
          value: rbac.authorization.k8s.io
