suite: test jaas NOTES
templates:
  - NOTES.txt
tests:
  - it: operator mode links the tenancy/RBAC docs page and drops the dead README anchor
    set:
      operator:
        enabled: true
    asserts:
      - matchRegexRaw:
          pattern: https://jaas\.projects\.metio\.wtf/usage/tenancy-and-rbac/
      - notMatchRegexRaw:
          pattern: tenant-serviceaccount-rbac

  - it: the status command targets the "jaas" Deployment, not the release name
    release:
      name: my-jaas
    set:
      operator:
        enabled: true
    asserts:
      # The Deployment is named "jaas" regardless of release name, so a
      # release-name-based `get deploy` would print a command that 404s.
      - matchRegexRaw:
          pattern: 'get deploy jaas'
      - notMatchRegexRaw:
          pattern: 'get deploy my-jaas'

  - it: uses long-form --namespace, not -n
    set:
      operator:
        enabled: true
    asserts:
      - notMatchRegexRaw:
          pattern: "kubectl -n "
