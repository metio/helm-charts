suite: test jaas NetworkPolicy
templates:
  - networkpolicy-jaas.yaml
tests:
  - it: is empty when networkPolicy is disabled (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: renders when networkPolicy is enabled
    set:
      networkPolicy:
        enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: NetworkPolicy

  - it: renders for the explicit kubernetes engine
    set:
      networkPolicy:
        enabled: true
        engine: kubernetes
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: apiVersion
          value: networking.k8s.io/v1

  - it: is absent for the cilium engine
    set:
      networkPolicy:
        enabled: true
        engine: cilium
    asserts:
      - hasDocuments:
          count: 0

  - it: is absent for the calico engine
    set:
      networkPolicy:
        enabled: true
        engine: calico
    asserts:
      - hasDocuments:
          count: 0

  - it: is absent for the clusterNetworkPolicy engine
    set:
      networkPolicy:
        enabled: true
        engine: clusterNetworkPolicy
    asserts:
      - hasDocuments:
          count: 0

  - it: selects only the jaas pod
    set:
      networkPolicy:
        enabled: true
    release:
      name: prod-jaas
    asserts:
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/name"]
          value: jaas
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/instance"]
          value: prod-jaas
      - notExists:
          path: spec.podSelector.matchLabels["app.kubernetes.io/managed-by"]

  - it: declares Ingress policy type
    set:
      networkPolicy:
        enabled: true
    asserts:
      - equal:
          path: spec.policyTypes[0]
          value: Ingress

  - it: leaves http and management ports open by default
    set:
      networkPolicy:
        enabled: true
    asserts:
      - contains:
          path: spec.ingress
          content:
            ports:
              - protocol: TCP
                port: 8080
      - contains:
          path: spec.ingress
          content:
            ports:
              - protocol: TCP
                port: 8081

  - it: omits the storage rule when operator is disabled
    set:
      networkPolicy:
        enabled: true
    asserts:
      - notContains:
          path: spec.ingress
          content:
            ports:
              - protocol: TCP
                port: 8082
            from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: flux-system

  - it: admits flux-system consumers AND the operator's own pod on the storage port
    release:
      name: jaas
    set:
      networkPolicy:
        enabled: true
      operator:
        enabled: true
    asserts:
      # The operator dials its own storage service for chained-snippet fetches,
      # so its own pod is admitted alongside the flux-system consumers.
      - contains:
          path: spec.ingress
          content:
            ports:
              - protocol: TCP
                port: 8082
            from:
              - podSelector:
                  matchLabels:
                    app.kubernetes.io/name: jaas
                    app.kubernetes.io/component: jaas
                    app.kubernetes.io/instance: jaas
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: flux-system

  - it: honors a custom storage.from selector
    set:
      networkPolicy:
        enabled: true
        storage:
          from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: my-flux
              podSelector:
                matchLabels:
                  app: my-source-controller
      operator:
        enabled: true
    release:
      name: jaas
    asserts:
      # The self-peer is always present; the configured consumer is appended.
      - contains:
          path: spec.ingress
          content:
            ports:
              - protocol: TCP
                port: 8082
            from:
              - podSelector:
                  matchLabels:
                    app.kubernetes.io/name: jaas
                    app.kubernetes.io/component: jaas
                    app.kubernetes.io/instance: jaas
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: my-flux
                podSelector:
                  matchLabels:
                    app: my-source-controller

  - it: tightens the http port when http.from is configured
    set:
      networkPolicy:
        enabled: true
        http:
          from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: ingress-nginx
    asserts:
      - contains:
          path: spec.ingress
          content:
            ports:
              - protocol: TCP
                port: 8080
            from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: ingress-nginx

  - it: includes the webhook port only when the webhook is enabled
    set:
      networkPolicy:
        enabled: true
      operator:
        enabled: true
        webhook:
          enabled: true
          certManager:
            issuerRef:
              name: jaas-ca
    asserts:
      - contains:
          path: spec.ingress
          content:
            ports:
              - protocol: TCP
                port: 9443

  - it: omits the webhook port when the webhook is disabled
    set:
      networkPolicy:
        enabled: true
      operator:
        enabled: true
    asserts:
      - notContains:
          path: spec.ingress
          content:
            ports:
              - protocol: TCP
                port: 9443

  - it: includes the metrics port when operator and metrics are enabled
    set:
      networkPolicy:
        enabled: true
      operator:
        enabled: true
        metrics:
          enabled: true
    asserts:
      - contains:
          path: spec.ingress
          content:
            ports:
              - protocol: TCP
                port: 8083

  - it: omits the metrics port when operator is disabled
    set:
      networkPolicy:
        enabled: true
    asserts:
      - notContains:
          path: spec.ingress
          content:
            ports:
              - protocol: TCP
                port: 8083

  - it: tightens the metrics port when metrics.from is configured
    set:
      networkPolicy:
        enabled: true
        metrics:
          from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: monitoring
      operator:
        enabled: true
        metrics:
          enabled: true
    asserts:
      - contains:
          path: spec.ingress
          content:
            ports:
              - protocol: TCP
                port: 8083
            from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: monitoring

  - it: declares no Egress policy type by default
    set:
      networkPolicy:
        enabled: true
    asserts:
      - equal:
          path: spec.policyTypes
          value:
            - Ingress
      - notExists:
          path: spec.egress

  - it: adds Egress to policyTypes and a DNS rule when egress is enabled
    set:
      networkPolicy:
        enabled: true
        egress:
          enabled: true
    asserts:
      - contains:
          path: spec.policyTypes
          content: Egress
      - contains:
          path: spec.egress
          content:
            to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: kube-system
            ports:
              - protocol: UDP
                port: 53
              - protocol: TCP
                port: 53

  - it: honors a custom egress dnsNamespace
    set:
      networkPolicy:
        enabled: true
        egress:
          enabled: true
          dnsNamespace: openshift-dns
    asserts:
      - contains:
          path: spec.egress
          content:
            to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: openshift-dns
            ports:
              - protocol: UDP
                port: 53
              - protocol: TCP
                port: 53

  - it: omits the DNS rule when egress.dns is false
    set:
      networkPolicy:
        enabled: true
        egress:
          enabled: true
          dns: false
    asserts:
      - contains:
          path: spec.policyTypes
          content: Egress
      # With DNS off and no egress.to peers, the egress key renders empty —
      # Egress in policyTypes with no rules denies all outbound traffic.
      - equal:
          path: spec.egress
          value: null

  - it: merges egress.to peers into spec.egress verbatim
    set:
      networkPolicy:
        enabled: true
        egress:
          enabled: true
          to:
            - to:
                - ipBlock:
                    cidr: 10.96.0.1/32
              ports:
                - protocol: TCP
                  port: 443
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: flux-system
    asserts:
      - contains:
          path: spec.egress
          content:
            to:
              - ipBlock:
                  cidr: 10.96.0.1/32
            ports:
              - protocol: TCP
                port: 443
      - contains:
          path: spec.egress
          content:
            to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: flux-system

  - it: renders no egress section when egress is disabled
    set:
      networkPolicy:
        enabled: true
        egress:
          enabled: false
          to:
            - to:
                - ipBlock:
                    cidr: 10.0.0.0/8
    asserts:
      - notExists:
          path: spec.egress
      - notContains:
          path: spec.policyTypes
          content: Egress

  - it: appends additionalIngress entries verbatim
    set:
      networkPolicy:
        enabled: true
        additionalIngress:
          - ports:
              - protocol: TCP
                port: 8080
            from:
              - ipBlock:
                  cidr: 10.0.0.0/8
    asserts:
      - contains:
          path: spec.ingress
          content:
            ports:
              - protocol: TCP
                port: 8080
            from:
              - ipBlock:
                  cidr: 10.0.0.0/8
