suite: test jaas operator serviceaccount
templates:
  - serviceaccount-operator.yaml
tests:
  - it: is empty when operator is disabled (the default)
    asserts:
      - hasDocuments:
          count: 0

  - it: renders when operator is enabled and create is true
    set:
      operator:
        enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount

  - it: uses the configured ServiceAccount name
    set:
      operator:
        enabled: true
        serviceAccount:
          create: true
          name: my-operator-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-operator-sa

  - it: defaults the ServiceAccount name to jaas
    set:
      operator:
        enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: jaas

  - it: is not rendered when create is false
    set:
      operator:
        enabled: true
        serviceAccount:
          create: false
          name: external-sa
    asserts:
      - hasDocuments:
          count: 0

  - it: lives in the release namespace
    release:
      namespace: jaas-system
    set:
      operator:
        enabled: true
    asserts:
      - equal:
          path: metadata.namespace
          value: jaas-system

  - it: carries the operator component label
    set:
      operator:
        enabled: true
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: operator
