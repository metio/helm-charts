# Operator mode (Flux integration), single replica.
#
# ct install runs in a kind cluster with neither an S3 endpoint nor an RWX
# StorageClass, so multi-replica HA — which the mode guard requires one of (a
# local backend is single-writer) — can't be installed here. Multi-replica
# rendering is covered by the validate-modes helm-unittest suite, and real
# multi-replica HA by the operator-smoke scale scenario against actual infra.
operator:
  enabled: true
  defaultServiceAccount: default

# CI installs the chart once per values file; the CRDs are provisioned
# out-of-band (see verify.yml) so a kept cluster-scoped CRD owned by one
# release does not block re-adoption by the next.
crds:
  create: false
