# git-cliff config for per-chart release notes. The release workflow runs
# `git-cliff --config cliff.toml --include-path "charts/<name>/**"
#   --tag "<name>-<version>" --tag-pattern "^<name>-" <prev>..HEAD`
# so only commits touching the released chart appear, the header carries this
# chart+version (via --tag), and only this chart's tags act as release
# boundaries (via --tag-pattern, overriding the static one below) — another
# chart's tag inside the range can't split the notes. The body is the GitHub
# Release content; a static footer (cosign verify + MIGRATIONS link) is
# appended by the workflow, not here.

[changelog]
header = ""
# Conventional-commit grouping when present; a flat list otherwise. The chart
# name + version are injected by the workflow via the CHART/VERSION env, read
# through the `{{ get_env ... }}` calls below.
body = """
{% if version %}## {{ get_env(name="CHART") }} {{ get_env(name="VERSION") }}{% else %}## Unreleased{% endif %}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | trim }}{% if commit.remote.pr_number %} (#{{ commit.remote.pr_number }}){% endif %}
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^doc", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Changed" },
    { message = "^chore\\(deps\\)", group = "Dependencies" },
    { message = "^chore", group = "Changed" },
    { message = "^revert", group = "Reverted" },
    { message = ".*", group = "Changed" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = ".*-[0-9].*"
topo_order = false
sort_commits = "newest"
